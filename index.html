function computeOptions(cfg) {
  const vals = new Set();
  for (let i = 0, len = RAW.length; i < len; i++) {
    const r = RAW[i];
    let ok = true;
    for (const p of cfg.parents) { const sel = selected[p]; if (sel.size > 0 && !sel.has(r[FMAP[p].field])) { ok = false; break; } }
    if (!ok) continue;
    const v = r[cfg.field];
    if (v) vals.add(v);
  }
  const arr = [...vals];
  if (cfg.key === 'month')        arr.sort((a,b) => { const ka=monthSortKey(a),kb=monthSortKey(b); if (ka==null&&kb==null) return String(a).localeCompare(String(b)); if (ka==null) return 1; if (kb==null) return -1; return ka-kb; });
  else if (cfg.key === 'quarter') arr.sort((a,b) => { const ka=quarterSortKey(a),kb=quarterSortKey(b); if (ka==null&&kb==null) return String(a).localeCompare(String(b)); if (ka==null) return 1; if (kb==null) return -1; return ka-kb; });
  else                            arr.sort((a,b) => String(a).localeCompare(String(b), 'en', { numeric:true }));
  return arr.map(v => ({ value: v, label: v }));
}

function visibleOptions(cfg) {
  const sb = document.getElementById('mc-search-' + cfg.key);
  const q = (sb && sb.value ? sb.value : '').toLowerCase();
  const opts = computeOptions(cfg);
  if (!q) return opts;
  return opts.filter(o => o.label.toLowerCase().includes(q));
}

function renderList(cfg, search) {
  const opts = computeOptions(cfg);
  const sel = selected[cfg.key];
  const q = (search || '').toLowerCase();
  const shown = q ? opts.filter(o => o.label.toLowerCase().includes(q)) : opts;
  lastOpts[cfg.key] = shown;
  const el = document.getElementById('mc-list-' + cfg.key);
  if (!el) return;
  el.innerHTML = shown.map((o, i) => `<label class="ms-item"><input type="checkbox" data-i="${i}" ${sel.has(o.value) ? 'checked' : ''}><span>${escapeHtml(o.label)}</span></label>`).join('')
    || '<div style="padding:10px 13px;color:var(--text3);font-size:12px;">No matches</div>';
  el.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      const o = lastOpts[cfg.key][+cb.dataset.i]; if (!o) return;
      if (cb.checked) sel.add(o.value); else sel.delete(o.value);
      updateTrigger(cfg); onFilterChanged(cfg.key);
    });
  });
}

function updateTrigger(cfg) {
  const btn = document.getElementById('mc-btn-' + cfg.key);
  const badge = document.getElementById('mc-badge-' + cfg.key);
  if (!btn || !badge) return;
  const n = selected[cfg.key].size;
  badge.textContent = n; badge.classList.toggle('show', n > 0); btn.classList.toggle('active', n > 0);
}
function updateDateActive() {
  const df = document.getElementById('dateFrom'), dt = document.getElementById('dateTo');
  if (df) df.classList.toggle('active', !!(df.value && df.value !== dataMinDate));
  if (dt) dt.classList.toggle('active', !!(dt.value && dt.value !== dataMaxDate));
}
function onFilterChanged(key) { refreshDependents(key); applyFilters(); }
function refreshDependents(key) {
  const deps = DEPENDENTS[key] || [];
  for (const dk of deps) {
    const cfg = FMAP[dk];
    const valid = new Set(computeOptions(cfg).map(o => o.value));
    for (const v of [...selected[dk]]) if (!valid.has(v)) selected[dk].delete(v);
    const sb = document.getElementById('mc-search-' + dk);
    renderList(cfg, sb ? sb.value : ''); updateTrigger(cfg);
    refreshDependents(dk);
  }
}
function selectAllOptions(cfg) { visibleOptions(cfg).forEach(o => selected[cfg.key].add(o.value)); const sb=document.getElementById('mc-search-'+cfg.key); renderList(cfg, sb?sb.value:''); updateTrigger(cfg); onFilterChanged(cfg.key); }
function clearAllOptions(cfg) { selected[cfg.key].clear(); const sb=document.getElementById('mc-search-'+cfg.key); if (sb) sb.value=''; renderList(cfg); updateTrigger(cfg); onFilterChanged(cfg.key); }
function closeAllPanels() { document.querySelectorAll('.mc-panel.open').forEach(p=>p.classList.remove('open')); document.querySelectorAll('.mc-btn.open').forEach(b=>b.classList.remove('open')); }

function buildFilterBar() {
  const mcChip = cfg => `
    <div class="mc">
      <button class="mc-btn" id="mc-btn-${cfg.key}" type="button">
        <span>${cfg.label}</span>
        <span class="mc-badge" id="mc-badge-${cfg.key}">0</span>
        <span class="mc-chev">▾</span>
      </button>
      <div class="mc-panel" id="mc-panel-${cfg.key}">
        <input type="text" class="ms-search" id="mc-search-${cfg.key}" placeholder="Search ${cfg.label.toLowerCase()}…">
        <div class="ms-list" id="mc-list-${cfg.key}"></div>
        <div class="ms-actions">
          <button class="ms-action-btn" data-act="all" data-key="${cfg.key}">Select All</button>
          <button class="ms-action-btn" data-act="clear" data-key="${cfg.key}">Clear All</button>
        </div>
      </div>
    </div>`;
  const dateControls = `
    <span class="mc-dlbl">From</span><input type="date" class="mc-date" id="dateFrom" title="From (Order Received Date)">
    <span class="mc-dash">–</span>
    <span class="mc-dlbl">To</span><input type="date" class="mc-date" id="dateTo" title="To (Order Received Date)">`;
  const segHtml = g => {
    const chips = FILTERS.filter(f => f.group === g.key).map(mcChip).join('');
    const inner = (g.key === 'period' ? dateControls : '') + chips;
    return `<div class="seg seg-${g.key}"><span class="seg-label">${g.label}</span><div class="seg-filters">${inner}</div></div>`;
  };
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<div class="fbar">${GROUPS.map(segHtml).join('')}<div class="fbar-spacer"></div><span class="fbar-records" id="fbarRecords"></span><button class="btn-reset" id="resetBtn">↺ Reset</button></div>`;

  FILTERS.forEach(cfg => {
    const btn = document.getElementById('mc-btn-' + cfg.key);
    const panel = document.getElementById('mc-panel-' + cfg.key);
    btn.addEventListener('click', () => {
      const isOpen = panel.classList.contains('open');
      closeAllPanels();
      if (!isOpen) { panel.classList.add('open'); btn.classList.add('open'); const sb=document.getElementById('mc-search-'+cfg.key); if (sb) setTimeout(()=>sb.focus(),0); }
    });
    const sb = document.getElementById('mc-search-' + cfg.key);
    if (sb) sb.addEventListener('input', () => renderList(cfg, sb.value));
  });
  bar.querySelectorAll('.ms-action-btn').forEach(btn => {
    btn.addEventListener('click', () => { const cfg = FMAP[btn.dataset.key]; if (btn.dataset.act === 'all') selectAllOptions(cfg); else clearAllOptions(cfg); });
  });
  document.getElementById('dateFrom').addEventListener('change', () => { updateDateActive(); debouncedApply(); });
  document.getElementById('dateTo').addEventListener('change', () => { updateDateActive(); debouncedApply(); });
  document.getElementById('resetBtn').addEventListener('click', resetFilters);
  document.addEventListener('click', e => { if (!e.target.closest('.mc')) closeAllPanels(); });
}

// ═══════════════════════════════════════════════════════════════
// APPLY FILTERS  (global date filter is on ORDER RECEIVED DATE)
// ═══════════════════════════════════════════════════════════════
function matchesSelected(r, skipPeriod) {
  for (let k = 0; k < FILTERS.length; k++) {
    const cfg = FILTERS[k];
    if (skipPeriod && PERIOD_KEYS.includes(cfg.key)) continue;
    const sel = selected[cfg.key];
    if (sel.size > 0 && !sel.has(r[cfg.field])) return false;
  }
  return true;
}
function applyFilters() {
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo   = document.getElementById('dateTo').value;
  filtered = [];
  for (let i = 0, len = RAW.length; i < len; i++) {
    const r = RAW[i];
    if (dateFrom && r.order_dt < dateFrom) continue;
    if (dateTo   && r.order_dt > dateTo)   continue;
    if (!matchesSelected(r, false)) continue;
    filtered.push(r);
  }
  updateDateActive();
  renderAll();
}
function resetFilters() {
  FILTERS.forEach(cfg => { selected[cfg.key].clear(); const sb=document.getElementById('mc-search-'+cfg.key); if (sb) sb.value=''; renderList(cfg); updateTrigger(cfg); });
  if (dataMinDate) document.getElementById('dateFrom').value = dataMinDate;
  if (dataMaxDate) document.getElementById('dateTo').value   = dataMaxDate;
  applyFilters();
}

// ═══════════════════════════════════════════════════════════════
// INITIALIZE
// ═══════════════════════════════════════════════════════════════
function initializeDashboard() {
  FILTERS.forEach(f => selected[f.key].clear());
  FILTERS.forEach(cfg => { renderList(cfg); updateTrigger(cfg); });
  const dates = RAW.map(r => r.order_dt).filter(Boolean).sort();
  if (dates.length) {
    dataMinDate = dates[0]; dataMaxDate = dates[dates.length - 1];
    document.getElementById('dateFrom').value = dataMinDate;
    document.getElementById('dateTo').value   = dataMaxDate;
  }
  applyFilters();
  renderReport1();
  renderReport2();
  renderReport3();
  adjustStickyTops();
  requestAnimationFrame(adjustStickyTops);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  const rec = document.getElementById('fbarRecords');
  if (rec) rec.textContent = filtered.length.toLocaleString('en-US') + ' of ' + RAW.length.toLocaleString('en-US') + ' rows';
  try { if (typeof renderDashboard === 'function') renderDashboard(); } catch (e) { console.error('renderDashboard failed', e); }
}

// ── Date helpers for the trend grid (shift month key, label) ──
function zmomKeyShift(key, dMonths) {
  let [y, m] = key.split('-').map(Number);
  m += dMonths;
  while (m < 1) { m += 12; y--; }
  while (m > 12) { m -= 12; y++; }
  return y + '-' + String(m).padStart(2, '0');
}
function zmomMonLabel(key) {
  const [y, m] = key.split('-').map(Number);
  return new Date(Date.UTC(y, m - 1, 1)).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

// ═══════════════════════════════════════════════════════════════
// REPORT 1 — Performance Trends  (modeled on GT "Product Trends")
//   Independent of the global filters. Each dimension defines one or more
//   lead columns (keys[]); rows are grouped by the joined key, so only
//   combinations that actually have orders appear (no cartesian blow-up).
//   Search / Year / View(Month·Quarter) / Measure(All·Qty·Value) /
//   Date-Basis(Order·Dispatch). Click any header to sort (default: total, desc).
// ═══════════════════════════════════════════════════════════════
const R1_SEP = '\u0001';
function r1MetricSub() { return r1Metric === 'qty' ? 'Qty' : r1Metric === 'value' ? 'Value' : 'Value · Qty'; }

function renderReport1() {
  const host = document.getElementById('secReport1');
  if (!host) return;
  if (!RAW || !RAW.length) { host.innerHTML = '<div class="no-data">No data loaded.</div>'; return; }

  if (!['month', 'quarter'].includes(r1View))     r1View = 'month';
  if (!['all', 'qty', 'value'].includes(r1Metric)) r1Metric = 'all';
  if (!['order', 'dispatch'].includes(r1Basis))    r1Basis = 'order';
  const dimCfg   = R1_DIMS.find(d => d.k === r1Dim) || R1_DIMS[0];
  const keys     = dimCfg.keys;
  const nLead    = keys.length;
  const dateCols = !!dimCfg.dateCols;
  const hideZero = !!dimCfg.hideZero;
  const orderCols = !!dimCfg.orderCols;
  const ordersOnly = !!dimCfg.ordersCol;  // Sales Rep: single #Orders column (count = distinct PO per Distributor + Sales Rep)
  const showOrders = orderCols || ordersOnly;
  const splitKey = k => k.split(R1_SEP);
  const cleanVal = v => (v == null || v === '') ? '\u2014' : String(v);

  // Frozen lead-column widths & cumulative left offsets
  const widths = nLead === 1 ? [200] : nLead === 2 ? [165, 200] : [150, 110, 180];
  const offs = [0]; for (let i = 1; i < nLead; i++) offs[i] = offs[i - 1] + widths[i - 1];
  const lastLead = nLead - 1;

  // Aggregate qty (po_total_qty) & value by groupKey × monthKey (per chosen date basis)
  const qty = {}, val = {}, monthsSet = new Set(), keysSet = new Set();
  const firstD = {}, lastD = {};
  const ordPO = {};   // distinct po_no per groupKey per monthKey (only populated when orderCols)
  for (let i = 0; i < RAW.length; i++) {
    const r = RAW[i];
    const dfull = (r1Basis === 'order') ? r.order_dt : r.dispatch_dt;
    const mk = (dfull && dfull.length >= 7) ? dfull.slice(0, 7) : '';
    if (!mk) continue;
    let key = cleanVal(r[keys[0].field]);
    for (let c = 1; c < nLead; c++) key += R1_SEP + cleanVal(r[keys[c].field]);
    keysSet.add(key); monthsSet.add(mk);
    (qty[key] || (qty[key] = {}))[mk] = (qty[key][mk] || 0) + (r.total_qty || 0);
    (val[key] || (val[key] = {}))[mk] = (val[key][mk] || 0) + (r.value || 0);
    if (dateCols) { if (!firstD[key] || dfull < firstD[key]) firstD[key] = dfull; if (!lastD[key] || dfull > lastD[key]) lastD[key] = dfull; }
    if (showOrders) { const po = r.po_no; if (po != null && po !== '') { const m = ordPO[key] || (ordPO[key] = {}); (m[mk] || (m[mk] = new Set())).add(po); } }
  }

  // Years (calendar)
  const ySet = new Set(); monthsSet.forEach(mk => ySet.add(+mk.slice(0, 4)));
  const yList = [...ySet].sort((a, b) => b - a);
  let selY = r1Year;
  if (selY == null || !ySet.has(selY)) { selY = yList.length ? yList[0] : new Date().getUTCFullYear(); r1Year = selY; }
  const yMonths = []; for (let i = 0; i < 12; i++) yMonths.push(zmomKeyShift(selY + '-01', i));

  const qAt = (k, mk) => (qty[k] && qty[k][mk]) || 0, vAt = (k, mk) => (val[k] && val[k][mk]) || 0;

  // Columns
  let cols, getv;
  if (r1View === 'quarter') {
    const quarters = [
      { id: 'Q1', label: 'Q1', sub: 'Jan–Mar', mons: yMonths.slice(0, 3)  },
      { id: 'Q2', label: 'Q2', sub: 'Apr–Jun', mons: yMonths.slice(3, 6)  },
      { id: 'Q3', label: 'Q3', sub: 'Jul–Sep', mons: yMonths.slice(6, 9)  },
      { id: 'Q4', label: 'Q4', sub: 'Oct–Dec', mons: yMonths.slice(9, 12) },
    ];
    cols = quarters.slice().reverse();
    getv = (k, c) => { let q = 0, s = 0; c.mons.forEach(mk => { q += qAt(k, mk); s += vAt(k, mk); }); return { q, s }; };
  } else {
    cols = yMonths.slice().sort().reverse().map(mk => ({ id: mk, label: zmomMonLabel(mk), sub: r1MetricSub() }));
    getv = (k, c) => ({ q: qAt(k, c.id), s: vAt(k, c.id) });
  }

  // Year totals per row
  const yQ = {}, yV = {};
  keysSet.forEach(k => { let q = 0, s = 0; yMonths.forEach(mk => { q += qAt(k, mk); s += vAt(k, mk); }); yQ[k] = q; yV[k] = s; });

  // Distinct orders (po_no) for the selected year, per row, and AOV = year value ÷ #orders
  const yearOrders = k => {
    const m = ordPO[k]; if (!m) return 0;
    const s = new Set();
    yMonths.forEach(mk => { const ss = m[mk]; if (ss) ss.forEach(po => s.add(po)); });
    return s.size;
  };
  const aovOf = k => { const n = yearOrders(k); return n ? (yV[k] / n) : 0; };

  // Rows: hide zero-order rows (if configured), search filter, then sort
  let rowsArr = [...keysSet];
  if (hideZero) rowsArr = rowsArr.filter(k => (yQ[k] || 0) !== 0 || (yV[k] || 0) !== 0);
  const sq = (r1Search || '').trim().toLowerCase();
  if (sq) rowsArr = rowsArr.filter(k => splitKey(k).some(p => String(p).toLowerCase().includes(sq)));

  const leadSortCols = keys.map((_, ci) => '__K' + ci + '__');
  const validSort = new Set(['__TOTAL__', ...leadSortCols, ...(dateCols ? ['__FIRST__', '__LAST__'] : []), ...(showOrders ? ['__ORDERS__'] : []), ...(orderCols ? ['__AOV__'] : []), ...cols.map(c => c.id)]);
  if (!validSort.has(r1Sort.col)) r1Sort = { col: '__TOTAL__', dir: 'desc' };
  function rowSortVal(k) {
    if (r1Sort.col === '__TOTAL__') return r1Metric === 'qty' ? yQ[k] : yV[k];
    const c = cols.find(x => x.id === r1Sort.col); if (!c) return r1Metric === 'qty' ? yQ[k] : yV[k];
    const v = getv(k, c); return r1Metric === 'qty' ? v.q : v.s;
  }
  const leadMatch = r1Sort.col.match(/^__K(\d+)__$/);
  rowsArr.sort((a, b) => {
    let res;
    if (leadMatch) { const ci = +leadMatch[1], pa = splitKey(a), pb = splitKey(b); res = 0; for (let x = ci; x < nLead; x++) { res = String(pa[x] || '').localeCompare(String(pb[x] || '')); if (res) break; } }
    else if (r1Sort.col === '__FIRST__') res = String(firstD[a] || '').localeCompare(String(firstD[b] || ''));
    else if (r1Sort.col === '__LAST__')  res = String(lastD[a] || '').localeCompare(String(lastD[b] || ''));
    else if (r1Sort.col === '__ORDERS__') { const d = yearOrders(a) - yearOrders(b); res = d !== 0 ? d : String(splitKey(a)[lastLead] || '').localeCompare(String(splitKey(b)[lastLead] || '')); }
    else if (r1Sort.col === '__AOV__')    { const d = aovOf(a) - aovOf(b);             res = d !== 0 ? d : String(splitKey(a)[lastLead] || '').localeCompare(String(splitKey(b)[lastLead] || '')); }
    else { const d = rowSortVal(a) - rowSortVal(b); res = d !== 0 ? d : String(splitKey(a)[lastLead] || '').localeCompare(String(splitKey(b)[lastLead] || '')); }
    return r1Sort.dir === 'desc' ? -res : res;
  });

  // Heatmap scaled by the primary metric (qty when Qty view, else value)
  const prim = v => r1Metric === 'qty' ? v.q : v.s;
  let maxP = 0; rowsArr.forEach(k => cols.forEach(c => { maxP = Math.max(maxP, prim(getv(k, c))); }));

  const TOTAL = '__ALL__';
  yQ[TOTAL] = rowsArr.reduce((a, k) => a + yQ[k], 0); yV[TOTAL] = rowsArr.reduce((a, k) => a + yV[k], 0);
  if (dateCols) { let gf = null, gl = null; rowsArr.forEach(k => { if (firstD[k] && (!gf || firstD[k] < gf)) gf = firstD[k]; if (lastD[k] && (!gl || lastD[k] > gl)) gl = lastD[k]; }); firstD[TOTAL] = gf; lastD[TOTAL] = gl; }
  const ordTOTAL = !showOrders ? 0
    : ordersOnly ? rowsArr.reduce((a, k) => a + yearOrders(k), 0)
    : (() => { const s = new Set(); rowsArr.forEach(k => { const m = ordPO[k]; if (m) yMonths.forEach(mk => { const ss = m[mk]; if (ss) ss.forEach(po => s.add(po)); }); }); return s.size; })();
  const colTotal = c => { let q = 0, s = 0; rowsArr.forEach(k => { const v = getv(k, c); q += v.q; s += v.s; }); return { q, s }; };

  function cellInner(v) {
    const has = v.q || v.s;
    if (!has) return '<div class="pt-cell"><div class="pt-sale">—</div><div class="pt-qty"></div></div>';
    if (r1Metric === 'qty')   return `<div class="pt-cell"><div class="pt-sale">${fmt(v.q)}</div><div class="pt-qty"></div></div>`;
    if (r1Metric === 'value') return `<div class="pt-cell"><div class="pt-sale">${fmtV(v.s)}</div><div class="pt-qty"></div></div>`;
    return `<div class="pt-cell"><div class="pt-sale">${fmtV(v.s)}</div><div class="pt-qty">${fmt(v.q)} qty</div></div>`;
  }
  const cellHtml = v => { const p = prim(v); const style = p ? `background:rgba(45,122,78,${(0.05 + 0.30 * (maxP ? Math.min(1, p / maxP) : 0)).toFixed(3)});` : ''; return `<td class="zcell" style="${style}">${cellInner(v)}</td>`; };
  const fyCellHtml = (q, s) => {
    if (r1Metric === 'qty')   return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmt(q)}</div><div class="pt-qty"></div></div></td>`;
    if (r1Metric === 'value') return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmtV(s)}</div><div class="pt-qty"></div></div></td>`;
    return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmtV(s)}</div><div class="pt-qty">${fmt(q)} qty</div></div></td>`;
  };
  const dateCellHtml = (k) => { if (!dateCols) return ''; const f = firstD[k], l = lastD[k]; return `<td class="zcell r1-datecell">${f ? fmtDate(f) : '—'}</td><td class="zcell r1-datecell">${l ? fmtDate(l) : '—'}</td>`; };
  // #Orders (distinct po_no for the year) + Average Order Value (year value ÷ #orders)
  const orderCellsHtml = (nOrders, aov) => {
    if (!showOrders) return '';
    const ordTxt = nOrders ? fmt(nOrders) : '—';
    let html = `<td class="r1-sumcol"><div class="pt-cell"><div class="pt-sale">${ordTxt}</div><div class="pt-qty"></div></div></td>`;
    if (orderCols) {
      const aovTxt = nOrders ? fmtMoney(aov) : '—';
      html += `<td class="r1-sumcol"><div class="pt-cell"><div class="pt-sale">${aovTxt}</div><div class="pt-qty"></div></div></td>`;
    }
    return html;
  };

  const leadCells = (key, isTotal) => {
    if (isTotal) return keys.map((kc, ci) => `<td class="zcol${ci === lastLead ? ' zlast' : ''}" style="left:${offs[ci]}px;min-width:${widths[ci]}px">${ci === 0 ? 'TOTAL' : ''}</td>`).join('');
    const parts = splitKey(key);
    return keys.map((kc, ci) => `<td class="zcol${ci === lastLead ? ' zlast' : ''} zwrap" style="left:${offs[ci]}px;min-width:${widths[ci]}px;max-width:${widths[ci]}px;width:${widths[ci]}px" title="${escapeHtml(parts[ci] || '')}">${escapeHtml(parts[ci] || '')}</td>`).join('');
  };
  const rowFor = (k, isTotal) => {
    const cells = cols.map(c => cellHtml(isTotal ? colTotal(c) : getv(k, c))).join('');
    const fq = isTotal ? yQ[TOTAL] : yQ[k], fs = isTotal ? yV[TOTAL] : yV[k];
    const nOrd = isTotal ? ordTOTAL : yearOrders(k);
    const aovV = nOrd ? (fs / nOrd) : 0;
    return `<tr class="${isTotal ? 'total-row' : ''}">${leadCells(k, isTotal)}${dateCellHtml(k)}${fyCellHtml(fq, fs)}${orderCellsHtml(nOrd, aovV)}${cells}</tr>`;
  };

  function sortIcon(col) {
    if (r1Sort.col === col) return `<span class="sort-ic on">${r1Sort.dir === 'desc' ? '▼' : '▲'}</span>`;
    return '<span class="sort-ic">⇅</span>';
  }
  const leadHeads = keys.map((kc, ci) => `<th class="zcol${ci === lastLead ? ' zlast' : ''}" data-sortcol="__K${ci}__" style="left:${offs[ci]}px;min-width:${widths[ci]}px">${escapeHtml(kc.label)}${sortIcon('__K' + ci + '__')}</th>`).join('');
  const dateHeads = dateCols
    ? `<th data-sortcol="__FIRST__" style="min-width:96px">${r1Basis === 'order' ? '1st Order' : '1st Dispatch'}${sortIcon('__FIRST__')}<span class="th-sub">Date</span></th>`
      + `<th data-sortcol="__LAST__" style="min-width:96px">${r1Basis === 'order' ? 'Last Order' : 'Last Dispatch'}${sortIcon('__LAST__')}<span class="th-sub">Date</span></th>`
    : '';
  const headCells = cols.map(c => `<th data-sortcol="${escapeHtml(c.id)}">${escapeHtml(c.label)}${sortIcon(c.id)}<span class="th-sub">${escapeHtml(c.sub)}</span></th>`).join('');
  const orderHeads =
    (showOrders ? `<th class="r1-sumcol" data-sortcol="__ORDERS__"># Orders${sortIcon('__ORDERS__')}<span class="th-sub">${selY}</span></th>` : '')
    + (orderCols ? `<th class="r1-sumcol" data-sortcol="__AOV__">Avg Order Value${sortIcon('__AOV__')}<span class="th-sub">Value ÷ Orders</span></th>` : '');
  const thead = `<thead><tr>
    ${leadHeads}
    ${dateHeads}
    <th class="fycol" data-sortcol="__TOTAL__">${selY}${sortIcon('__TOTAL__')}<span class="th-sub">${escapeHtml(r1MetricSub())}</span></th>
    ${orderHeads}
    ${headCells}
  </tr></thead>`;
  const leadEmpty = keys.map((kc, ci) => `<td class="zcol${ci === lastLead ? ' zlast' : ''}" style="left:${offs[ci]}px;min-width:${widths[ci]}px">${ci === 0 ? '—' : ''}</td>`).join('');
  const body = rowsArr.length
    ? rowsArr.map(k => rowFor(k, false)).join('') + rowFor(TOTAL, true)
    : `<tr>${leadEmpty}<td colspan="${(dateCols ? 2 : 0) + (orderCols ? 2 : 0) + (ordersOnly ? 1 : 0) + cols.length + 1}" style="padding:18px;text-align:center;color:var(--text3)">No ${escapeHtml(dimCfg.label.toLowerCase())} with orders in ${selY}.</td></tr>`;

  // ── Toolbar (two lines) ──
  const yPills    = yList.map(f => `<button class="zmom-pill fy-pill${f === selY ? ' active' : ''}" data-r1y="${f}">${f}</button>`).join('');
  const dimPills  = R1_DIMS.map(d => `<button class="zmom-pill m-pill${d.k === r1Dim ? ' active' : ''}" data-r1dim="${d.k}">${escapeHtml(d.label)}</button>`).join('');
  const viewPills = [{ k: 'month', label: 'Month' }, { k: 'quarter', label: 'Quarter' }].map(v => `<button class="zmom-pill v-pill${v.k === r1View ? ' active' : ''}" data-r1view="${v.k}">${v.label}</button>`).join('');
  const metPills  = [{ k: 'all', label: 'All' }, { k: 'qty', label: 'Qty' }, { k: 'value', label: 'Value' }].map(m => `<button class="zmom-pill met-pill${m.k === r1Metric ? ' active' : ''}" data-r1met="${m.k}">${m.label}</button>`).join('');

  const basisLabel = r1Basis === 'order' ? 'Order Received Date' : 'Dispatch Date';
  const grouped = keys.map(kc => escapeHtml(kc.label)).join(' › ');
  const note = (r1View === 'quarter'
      ? `Quarters of ${selY} (Q1 Jan–Mar … Q4 Oct–Dec), newest first`
      : `Months Jan→Dec of ${selY}, newest first`)
    + ` · grouped by ${grouped} · period derived from <b>${escapeHtml(basisLabel)}</b>`
    + (hideZero ? ` · only ${escapeHtml(dimCfg.label.toLowerCase())} combinations with orders in ${selY} are shown` : '')
    + (showOrders ? ` · <b>#Orders</b> = distinct PO (po_no) count for ${selY}${ordersOnly ? ' per Distributor + Sales Rep combination' : ''}` : '')
    + (orderCols ? `, <b>Avg Order Value</b> = ${selY} value ÷ #Orders` : '')
    + (r1Basis === 'dispatch' ? ' · rows without a dispatch date are excluded' : '')
    + ` · click a header to sort · independent of the global filters.`;

  host.innerHTML = `
    <div class="bt-bar">
      <div class="bt-fg"><label class="bt-flabel">Search</label>
        <div class="kpi-search-wrap" style="max-width:200px"><span class="kpi-search-ic">⌕</span>
          <input type="text" class="kpi-searchbox r1-search" placeholder="Search ${escapeHtml(dimCfg.label.toLowerCase())}…" value="${escapeHtml(r1Search)}" autocomplete="off"></div></div>
      <div class="bt-fg"><label class="bt-flabel">Year</label><div class="bt-chips">${yPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">View</label><div class="bt-chips">${viewPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">Measure</label><div class="bt-chips">${metPills}</div></div>
      <div class="bt-break"></div>
      <div class="bt-fg"><label class="bt-flabel">Filters</label><div class="bt-chips">${dimPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">Date Basis</label>
        <div class="db-seg"><button class="db-opt${r1Basis === 'order' ? ' active' : ''}" data-r1basis="order">Order Received</button><button class="db-opt${r1Basis === 'dispatch' ? ' active' : ''}" data-r1basis="dispatch">Dispatch Date</button></div></div>
      <button class="kpi-reset" id="r1Reset" title="Reset search & sort">↺ Reset</button>
      <div class="bt-period" style="margin-left:auto;">
        <span class="bt-period-rng"><b>${selY}</b> · Jan–Dec</span>
        <span class="bt-period-tag">${escapeHtml(R1_TITLE)}</span>
      </div>
    </div>
    <div class="zmom-wrap"><table class="zmom">${thead}<tbody>${body}</tbody></table></div>
    <div style="margin-top:7px;font-size:11px;color:var(--text2);">${note}</div>`;

  // ── Wire controls ──
  host.querySelectorAll('.fy-pill').forEach(b => b.addEventListener('click', () => { r1Year = +b.dataset.r1y; renderReport1(); }));
  host.querySelectorAll('.v-pill').forEach(b => b.addEventListener('click', () => { r1View = b.dataset.r1view; renderReport1(); }));
  host.querySelectorAll('.m-pill').forEach(b => b.addEventListener('click', () => { r1Dim = b.dataset.r1dim; r1Search = ''; r1SearchActive = false; renderReport1(); }));
  host.querySelectorAll('.met-pill').forEach(b => b.addEventListener('click', () => { r1Metric = b.dataset.r1met; renderReport1(); }));
  host.querySelectorAll('.db-opt').forEach(b => b.addEventListener('click', () => { r1Basis = b.dataset.r1basis; r1Year = null; renderReport1(); }));
  host.querySelectorAll('th[data-sortcol]').forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.sortcol;
    if (r1Sort.col === col) r1Sort.dir = (r1Sort.dir === 'desc') ? 'asc' : 'desc';
    else r1Sort = { col, dir: 'desc' };
    renderReport1();
  }));

  const si = host.querySelector('.r1-search');
  if (si) {
    si.addEventListener('input', () => { r1Search = si.value; r1SearchActive = true; renderReport1(); });
    si.addEventListener('focus', () => { r1SearchActive = true; });
    si.addEventListener('blur',  () => { r1SearchActive = false; });
    if (r1SearchActive) { si.focus(); const L = si.value.length; si.setSelectionRange(L, L); }
  }
  const rst = host.querySelector('#r1Reset');
  if (rst) rst.addEventListener('click', () => { r1Search = ''; r1SearchActive = false; r1Sort = { col: '__TOTAL__', dir: 'desc' }; renderReport1(); });
}

// ═══════════════════════════════════════════════════════════════
// REPORT 2 — Order Pipeline  (Back Order & Future Dated)
//   Independent of the global filters. Always grouped by Brand › Product.
//   Search / Year / View(Month·Quarter) / Measure(Back Order·Future Dated)
//   / Metric(All·Qty·Value). Date axis & value per (Measure, Metric):
//     Back Order  · Qty   → order date,         back_order_qty
//     Back Order  · Value → order date,         back_order_rate (already qty × value)
//     Future Dated· Qty   → expected ship date, po_total_qty
//     Future Dated· Value → order date,         total PO value
//   All → shows Value + Qty together, bucketed by order date (the shared axis).
// ═══════════════════════════════════════════════════════════════
function renderReport2() {
  const host = document.getElementById('secReport2');
  if (!host) return;
  if (!RAW || !RAW.length) { host.innerHTML = '<div class="no-data">No data loaded.</div>'; return; }

  if (!['month', 'quarter'].includes(r2View))            r2View = 'month';
  if (!['backorder', 'future'].includes(r2Measure))      r2Measure = 'backorder';
  if (!['all', 'qty', 'value'].includes(r2Metric))       r2Metric = 'all';
  const isBO  = r2Measure === 'backorder';
  const isAll = r2Metric === 'all', isQty = r2Metric === 'qty', isVal = r2Metric === 'value';

  // Row universe; date axis (expected ship date only for Future Dated + Qty-only; else order date)
  const inUniverse = r => isBO ? ((r.back_order_qty || 0) > 0) : !!r.expected_ship_dt;
  const useShip = (!isBO && isQty);
  const dateOf = r => useShip ? r.expected_ship_dt : r.order_dt;
  const qOf = r => isBO ? (r.back_order_qty || 0) : (r.total_qty || 0);
  const sOf = r => isBO ? (r.back_order_rate || 0) : (r.value || 0);

  // Aggregate qty & value by (Brand SEP Product) × monthKey
  const SEP = R1_SEP;
  const aggQ = {}, aggS = {}, monthsSet = new Set(), keysSet = new Set();
  for (let i = 0; i < RAW.length; i++) {
    const r = RAW[i];
    if (!inUniverse(r)) continue;
    const d = dateOf(r);
    const mk = (d && d.length >= 7) ? d.slice(0, 7) : '';
    if (!mk) continue;
    const product = (r.product_code == null || r.product_code === '') ? '\u2014' : String(r.product_code);
    const brand   = (r.brand_name   == null || r.brand_name   === '') ? '\u2014' : String(r.brand_name);
    const key = brand + SEP + product;
    keysSet.add(key); monthsSet.add(mk);
    (aggQ[key] || (aggQ[key] = {}))[mk] = (aggQ[key][mk] || 0) + qOf(r);
    (aggS[key] || (aggS[key] = {}))[mk] = (aggS[key][mk] || 0) + sOf(r);
  }
  const splitKey = key => { const i = key.indexOf(SEP); return { parent: key.slice(0, i), child: key.slice(i + 1) }; };

  // Years (calendar) from the active axis
  const ySet = new Set(); monthsSet.forEach(mk => ySet.add(+mk.slice(0, 4)));
  const yList = [...ySet].sort((a, b) => b - a);
  let selY = r2Year;
  if (selY == null || !ySet.has(selY)) { selY = yList.length ? yList[0] : new Date().getUTCFullYear(); r2Year = selY; }
  const yMonths = []; for (let i = 0; i < 12; i++) yMonths.push(zmomKeyShift(selY + '-01', i));

  const qAt = (k, mk) => (aggQ[k] && aggQ[k][mk]) || 0, sAt = (k, mk) => (aggS[k] && aggS[k][mk]) || 0;

  // Columns
  let cols, getv;
  const colSub = isAll ? 'Value · Qty' : isQty ? 'Qty' : 'Value';
  if (r2View === 'quarter') {
    const quarters = [
      { id: 'Q1', label: 'Q1', sub: 'Jan–Mar', mons: yMonths.slice(0, 3)  },
      { id: 'Q2', label: 'Q2', sub: 'Apr–Jun', mons: yMonths.slice(3, 6)  },
      { id: 'Q3', label: 'Q3', sub: 'Jul–Sep', mons: yMonths.slice(6, 9)  },
      { id: 'Q4', label: 'Q4', sub: 'Oct–Dec', mons: yMonths.slice(9, 12) },
    ];
    cols = quarters.slice().reverse();
    getv = (k, c) => { let q = 0, s = 0; c.mons.forEach(mk => { q += qAt(k, mk); s += sAt(k, mk); }); return { q, s }; };
  } else {
    cols = yMonths.slice().sort().reverse().map(mk => ({ id: mk, label: zmomMonLabel(mk), sub: colSub }));
    getv = (k, c) => ({ q: qAt(k, c.id), s: sAt(k, c.id) });
  }

  // Year totals
  const yQ = {}, yV = {};
  keysSet.forEach(k => { let q = 0, s = 0; yMonths.forEach(mk => { q += qAt(k, mk); s += sAt(k, mk); }); yQ[k] = q; yV[k] = s; });

  // Rows: search (brand or product), then sort
  let rowsArr = [...keysSet];
  const sq = (r2Search || '').trim().toLowerCase();
  if (sq) rowsArr = rowsArr.filter(k => { const { parent, child } = splitKey(k); return String(child).toLowerCase().includes(sq) || String(parent).toLowerCase().includes(sq); });

  const prim = v => isQty ? v.q : v.s;     // heatmap / sort / total ranked by value (or qty in Qty mode)
  const primTot = k => isQty ? yQ[k] : yV[k];
  const validSort = new Set(['__DIM__', '__PARENT__', '__TOTAL__', ...cols.map(c => c.id)]);
  if (!validSort.has(r2Sort.col)) r2Sort = { col: '__TOTAL__', dir: 'desc' };
  function rowSortVal(k) {
    if (r2Sort.col === '__TOTAL__') return primTot(k);
    const c = cols.find(x => x.id === r2Sort.col); return c ? prim(getv(k, c)) : primTot(k);
  }
  rowsArr.sort((a, b) => {
    let res;
    if (r2Sort.col === '__DIM__') res = String(splitKey(a).child).localeCompare(String(splitKey(b).child));
    else if (r2Sort.col === '__PARENT__') { const pa = splitKey(a), pb = splitKey(b); res = String(pa.parent).localeCompare(String(pb.parent)) || String(pa.child).localeCompare(String(pb.child)); }
    else { const d = rowSortVal(a) - rowSortVal(b); res = d !== 0 ? d : String(splitKey(a).child).localeCompare(String(splitKey(b).child)); }
    return r2Sort.dir === 'desc' ? -res : res;
  });

  // Heatmap
  let maxP = 0; rowsArr.forEach(k => cols.forEach(c => { maxP = Math.max(maxP, prim(getv(k, c))); }));
  const TOTAL = '__ALL__';
  yQ[TOTAL] = rowsArr.reduce((a, k) => a + yQ[k], 0); yV[TOTAL] = rowsArr.reduce((a, k) => a + yV[k], 0);
  const colTotal = c => { let q = 0, s = 0; rowsArr.forEach(k => { const v = getv(k, c); q += v.q; s += v.s; }); return { q, s }; };

  function cellInner(v) {
    const has = v.q || v.s;
    if (!has) return '<div class="pt-cell"><div class="pt-sale">—</div><div class="pt-qty"></div></div>';
    if (isQty) return `<div class="pt-cell"><div class="pt-sale">${fmt(Math.round(v.q))}</div><div class="pt-qty"></div></div>`;
    if (isVal) return `<div class="pt-cell"><div class="pt-sale">${fmtV(v.s)}</div><div class="pt-qty"></div></div>`;
    return `<div class="pt-cell"><div class="pt-sale">${fmtV(v.s)}</div><div class="pt-qty">${fmt(Math.round(v.q))} qty</div></div>`;
  }
  const cellHtml = v => { const p = prim(v); const style = p ? `background:rgba(45,122,78,${(0.05 + 0.30 * (maxP ? Math.min(1, p / maxP) : 0)).toFixed(3)});` : ''; return `<td class="zcell" style="${style}">${cellInner(v)}</td>`; };
  const fyCellHtml = (q, s) => {
    if (isQty) return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmt(Math.round(q))}</div><div class="pt-qty"></div></div></td>`;
    if (isVal) return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmtV(s)}</div><div class="pt-qty"></div></div></td>`;
    return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmtV(s)}</div><div class="pt-qty">${fmt(Math.round(q))} qty</div></div></td>`;
  };

  const parW = 165, dimW = 200;
  const leadCells = (key, isTotal) => {
    if (isTotal) return `<td class="zcol" style="left:0;min-width:${parW}px">TOTAL</td><td class="zcol zlast" style="left:${parW}px;min-width:${dimW}px"></td>`;
    const { parent, child } = splitKey(key);
    return `<td class="zcol zwrap" style="left:0;min-width:${parW}px;max-width:${parW}px;width:${parW}px" title="${escapeHtml(parent)}">${escapeHtml(parent)}</td>`
         + `<td class="zcol zlast zwrap" style="left:${parW}px;min-width:${dimW}px;max-width:${dimW}px;width:${dimW}px" title="${escapeHtml(child)}">${escapeHtml(child)}</td>`;
  };
  const rowFor = (k, isTotal) => {
    const cells = cols.map(c => cellHtml(isTotal ? colTotal(c) : getv(k, c))).join('');
    const fq = isTotal ? yQ[TOTAL] : yQ[k], fs = isTotal ? yV[TOTAL] : yV[k];
    return `<tr class="${isTotal ? 'total-row' : ''}">${leadCells(k, isTotal)}${fyCellHtml(fq, fs)}${cells}</tr>`;
  };

  function sortIcon(col) {
    if (r2Sort.col === col) return `<span class="sort-ic on">${r2Sort.dir === 'desc' ? '▼' : '▲'}</span>`;
    return '<span class="sort-ic">⇅</span>';
  }
  const headCells = cols.map(c => `<th data-sortcol="${escapeHtml(c.id)}">${escapeHtml(c.label)}${sortIcon(c.id)}<span class="th-sub">${escapeHtml(c.sub)}</span></th>`).join('');
  const thead = `<thead><tr>
    <th class="zcol" data-sortcol="__PARENT__" style="left:0;min-width:${parW}px">Brand${sortIcon('__PARENT__')}</th>
    <th class="zcol zlast" data-sortcol="__DIM__" style="left:${parW}px;min-width:${dimW}px">Product${sortIcon('__DIM__')}</th>
    <th class="fycol" data-sortcol="__TOTAL__">${selY}${sortIcon('__TOTAL__')}<span class="th-sub">${escapeHtml(colSub)}</span></th>
    ${headCells}
  </tr></thead>`;
  const body = rowsArr.length
    ? rowsArr.map(k => rowFor(k, false)).join('') + rowFor(TOTAL, true)
    : `<tr><td class="zcol" style="left:0;min-width:${parW}px">—</td><td class="zcol zlast" style="left:${parW}px;min-width:${dimW}px"></td><td colspan="${cols.length + 1}" style="padding:18px;text-align:center;color:var(--text3)">No products in this view.</td></tr>`;

  // ── Toolbar ──
  const yPills    = yList.map(f => `<button class="zmom-pill fy-pill${f === selY ? ' active' : ''}" data-r2y="${f}">${f}</button>`).join('') || '<span style="font-size:11px;color:var(--text3)">—</span>';
  const viewPills = [{ k: 'month', label: 'Month' }, { k: 'quarter', label: 'Quarter' }].map(v => `<button class="zmom-pill v-pill${v.k === r2View ? ' active' : ''}" data-r2view="${v.k}">${v.label}</button>`).join('');
  const measPills = [{ k: 'backorder', label: 'Back Order' }, { k: 'future', label: 'Future Dated' }].map(m => `<button class="zmom-pill meas-pill${m.k === r2Measure ? ' active' : ''}" data-r2meas="${m.k}">${m.label}</button>`).join('');
  const metPills  = [{ k: 'all', label: 'All' }, { k: 'qty', label: 'Qty' }, { k: 'value', label: 'Value' }].map(m => `<button class="zmom-pill met-pill${m.k === r2Metric ? ' active' : ''}" data-r2met="${m.k}">${m.label}</button>`).join('');

  const axisLabel = useShip ? 'Expected Ship' : 'Order Received';
  const defn = isBO
    ? (isAll ? 'back orders (value & qty)' : isQty ? 'back-order quantity' : 'back-order value (back-order rate)')
    : (isAll ? 'future-dated orders (value & qty)' : isQty ? 'future-dated quantity (PO total qty)' : 'future-dated PO value');
  const note = `Showing <b>${escapeHtml(defn)}</b> by ${escapeHtml(axisLabel)} month`
    + ` · ${r2View === 'quarter' ? 'quarters' : 'months'} of ${selY}, newest first · grouped by Brand › Product`
    + (isBO && isVal ? ' · value only where a back-order rate is present' : '')
    + ` · click a header to sort · independent of the global filters.`;

  host.innerHTML = `
    <div class="bt-bar">
      <div class="bt-fg"><label class="bt-flabel">Search</label>
        <div class="kpi-search-wrap" style="max-width:200px"><span class="kpi-search-ic">⌕</span>
          <input type="text" class="kpi-searchbox r2-search" placeholder="Search product…" value="${escapeHtml(r2Search)}" autocomplete="off"></div></div>
      <div class="bt-fg"><label class="bt-flabel">Year</label><div class="bt-chips">${yPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">View</label><div class="bt-chips">${viewPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">Measure</label><div class="bt-chips">${measPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">Metric</label><div class="bt-chips">${metPills}</div></div>
      <button class="kpi-reset" id="r2Reset" title="Reset search & sort">↺ Reset</button>
      <div class="bt-period" style="margin-left:auto;">
        <span class="bt-period-rng"><b>${selY}</b> · Jan–Dec</span>
        <span class="bt-period-tag">${escapeHtml(R2_TITLE)}</span>
      </div>
    </div>
    <div class="zmom-wrap"><table class="zmom">${thead}<tbody>${body}</tbody></table></div>
    <div style="margin-top:7px;font-size:11px;color:var(--text2);">${note}</div>`;

  // ── Wire controls ──
  host.querySelectorAll('.fy-pill').forEach(b => b.addEventListener('click', () => { r2Year = +b.dataset.r2y; renderReport2(); }));
  host.querySelectorAll('.v-pill').forEach(b => b.addEventListener('click', () => { r2View = b.dataset.r2view; renderReport2(); }));
  host.querySelectorAll('.meas-pill').forEach(b => b.addEventListener('click', () => { r2Measure = b.dataset.r2meas; renderReport2(); }));
  host.querySelectorAll('.met-pill').forEach(b => b.addEventListener('click', () => { r2Metric = b.dataset.r2met; renderReport2(); }));
  host.querySelectorAll('th[data-sortcol]').forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.sortcol;
    if (r2Sort.col === col) r2Sort.dir = (r2Sort.dir === 'desc') ? 'asc' : 'desc';
    else r2Sort = { col, dir: 'desc' };
    renderReport2();
  }));
  const si = host.querySelector('.r2-search');
  if (si) {
    si.addEventListener('input', () => { r2Search = si.value; r2SearchActive = true; renderReport2(); });
    si.addEventListener('focus', () => { r2SearchActive = true; });
    si.addEventListener('blur',  () => { r2SearchActive = false; });
    if (r2SearchActive) { si.focus(); const L = si.value.length; si.setSelectionRange(L, L); }
  }
  const rst = host.querySelector('#r2Reset');
  if (rst) rst.addEventListener('click', () => { r2Search = ''; r2SearchActive = false; r2Sort = { col: '__TOTAL__', dir: 'desc' }; renderReport2(); });
}

function renderReport3() {
  const host = document.getElementById('secReport3');
  if (!host) return;
  if (!RAW || !RAW.length) { host.innerHTML = '<div class="no-data">No data loaded.</div>'; return; }

  if (!['month', 'quarter'].includes(r3View))     r3View = 'quarter';
  if (!['all', 'qty', 'value'].includes(r3Metric)) r3Metric = 'all';
  if (!['order', 'dispatch'].includes(r3Basis))    r3Basis = 'order';
  const metricSub = () => r3Metric === 'qty' ? 'Qty' : r3Metric === 'value' ? 'Value' : 'Value · Qty';
  const dimCfg   = R3_DIM;
  const keys     = dimCfg.keys;
  const nLead    = keys.length;
  const dateCols = !!dimCfg.dateCols;
  const hideZero = !!dimCfg.hideZero;
  const orderCols = !!dimCfg.orderCols;
  const splitKey = k => k.split(R1_SEP);
  const cleanVal = v => (v == null || v === '') ? '\u2014' : String(v);

  // Frozen lead-column widths & cumulative left offsets
  const widths = nLead === 1 ? [200] : nLead === 2 ? [165, 200] : [150, 110, 180];
  const offs = [0]; for (let i = 1; i < nLead; i++) offs[i] = offs[i - 1] + widths[i - 1];
  const lastLead = nLead - 1;

  // Aggregate qty (po_total_qty) & value by groupKey × monthKey (per chosen date basis)
  const qty = {}, val = {}, monthsSet = new Set(), keysSet = new Set();
  const firstD = {}, lastD = {};
  const ordPO = {};   // distinct po_no per groupKey per monthKey (only populated when orderCols)
  for (let i = 0; i < RAW.length; i++) {
    const r = RAW[i];
    const dfull = (r3Basis === 'order') ? r.order_dt : r.dispatch_dt;
    const mk = (dfull && dfull.length >= 7) ? dfull.slice(0, 7) : '';
    if (!mk) continue;
    let key = cleanVal(r[keys[0].field]);
    for (let c = 1; c < nLead; c++) key += R1_SEP + cleanVal(r[keys[c].field]);
    keysSet.add(key); monthsSet.add(mk);
    (qty[key] || (qty[key] = {}))[mk] = (qty[key][mk] || 0) + (r.total_qty || 0);
    (val[key] || (val[key] = {}))[mk] = (val[key][mk] || 0) + (r.value || 0);
    if (dateCols) { if (!firstD[key] || dfull < firstD[key]) firstD[key] = dfull; if (!lastD[key] || dfull > lastD[key]) lastD[key] = dfull; }
    if (orderCols) { const po = r.po_no; if (po != null && po !== '') { const m = ordPO[key] || (ordPO[key] = {}); (m[mk] || (m[mk] = new Set())).add(po); } }
  }

  // Years (calendar)
  const ySet = new Set(); monthsSet.forEach(mk => ySet.add(+mk.slice(0, 4)));
  const yList = [...ySet].sort((a, b) => b - a);
  let selY = r3Year;
  if (selY == null || !ySet.has(selY)) { selY = yList.length ? yList[0] : new Date().getUTCFullYear(); r3Year = selY; }
  const yMonths = []; for (let i = 0; i < 12; i++) yMonths.push(zmomKeyShift(selY + '-01', i));

  const qAt = (k, mk) => (qty[k] && qty[k][mk]) || 0, vAt = (k, mk) => (val[k] && val[k][mk]) || 0;

  // Columns
  let cols, getv;
  if (r3View === 'quarter') {
    const quarters = [
      { id: 'Q1', label: 'Q1', sub: 'Jan–Mar', mons: yMonths.slice(0, 3)  },
      { id: 'Q2', label: 'Q2', sub: 'Apr–Jun', mons: yMonths.slice(3, 6)  },
      { id: 'Q3', label: 'Q3', sub: 'Jul–Sep', mons: yMonths.slice(6, 9)  },
      { id: 'Q4', label: 'Q4', sub: 'Oct–Dec', mons: yMonths.slice(9, 12) },
    ];
    cols = quarters.slice().reverse();
    getv = (k, c) => { let q = 0, s = 0; c.mons.forEach(mk => { q += qAt(k, mk); s += vAt(k, mk); }); return { q, s }; };
  } else {
    cols = yMonths.slice().sort().reverse().map(mk => ({ id: mk, label: zmomMonLabel(mk), sub: metricSub() }));
    getv = (k, c) => ({ q: qAt(k, c.id), s: vAt(k, c.id) });
  }

  // Year totals per row
  const yQ = {}, yV = {};
  keysSet.forEach(k => { let q = 0, s = 0; yMonths.forEach(mk => { q += qAt(k, mk); s += vAt(k, mk); }); yQ[k] = q; yV[k] = s; });

  // Distinct orders (po_no) for the selected year, per row, and AOV = year value ÷ #orders
  const yearOrders = k => {
    const m = ordPO[k]; if (!m) return 0;
    const s = new Set();
    yMonths.forEach(mk => { const ss = m[mk]; if (ss) ss.forEach(po => s.add(po)); });
    return s.size;
  };
  const aovOf = k => { const n = yearOrders(k); return n ? (yV[k] / n) : 0; };

  // Rows: hide zero-order rows (if configured), search filter, then sort
  let rowsArr = [...keysSet];
  if (hideZero) rowsArr = rowsArr.filter(k => (yQ[k] || 0) !== 0 || (yV[k] || 0) !== 0);
  const sq = (r3Search || '').trim().toLowerCase();
  if (sq) rowsArr = rowsArr.filter(k => splitKey(k).some(p => String(p).toLowerCase().includes(sq)));

  const leadSortCols = keys.map((_, ci) => '__K' + ci + '__');
  const validSort = new Set(['__TOTAL__', ...leadSortCols, ...(dateCols ? ['__FIRST__', '__LAST__'] : []), ...(orderCols ? ['__ORDERS__', '__AOV__'] : []), ...cols.map(c => c.id)]);
  if (!validSort.has(r3Sort.col)) r3Sort = { col: '__TOTAL__', dir: 'desc' };
  function rowSortVal(k) {
    if (r3Sort.col === '__TOTAL__') return r3Metric === 'qty' ? yQ[k] : yV[k];
    const c = cols.find(x => x.id === r3Sort.col); if (!c) return r3Metric === 'qty' ? yQ[k] : yV[k];
    const v = getv(k, c); return r3Metric === 'qty' ? v.q : v.s;
  }
  const leadMatch = r3Sort.col.match(/^__K(\d+)__$/);
  rowsArr.sort((a, b) => {
    let res;
    if (leadMatch) { const ci = +leadMatch[1], pa = splitKey(a), pb = splitKey(b); res = 0; for (let x = ci; x < nLead; x++) { res = String(pa[x] || '').localeCompare(String(pb[x] || '')); if (res) break; } }
    else if (r3Sort.col === '__FIRST__') res = String(firstD[a] || '').localeCompare(String(firstD[b] || ''));
    else if (r3Sort.col === '__LAST__')  res = String(lastD[a] || '').localeCompare(String(lastD[b] || ''));
    else if (r3Sort.col === '__ORDERS__') { const d = yearOrders(a) - yearOrders(b); res = d !== 0 ? d : String(splitKey(a)[lastLead] || '').localeCompare(String(splitKey(b)[lastLead] || '')); }
    else if (r3Sort.col === '__AOV__')    { const d = aovOf(a) - aovOf(b);             res = d !== 0 ? d : String(splitKey(a)[lastLead] || '').localeCompare(String(splitKey(b)[lastLead] || '')); }
    else { const d = rowSortVal(a) - rowSortVal(b); res = d !== 0 ? d : String(splitKey(a)[lastLead] || '').localeCompare(String(splitKey(b)[lastLead] || '')); }
    return r3Sort.dir === 'desc' ? -res : res;
  });

  // Heatmap scaled by the primary metric (qty when Qty view, else value)
  const prim = v => r3Metric === 'qty' ? v.q : v.s;
  let maxP = 0; rowsArr.forEach(k => cols.forEach(c => { maxP = Math.max(maxP, prim(getv(k, c))); }));

  const TOTAL = '__ALL__';
  yQ[TOTAL] = rowsArr.reduce((a, k) => a + yQ[k], 0); yV[TOTAL] = rowsArr.reduce((a, k) => a + yV[k], 0);
  if (dateCols) { let gf = null, gl = null; rowsArr.forEach(k => { if (firstD[k] && (!gf || firstD[k] < gf)) gf = firstD[k]; if (lastD[k] && (!gl || lastD[k] > gl)) gl = lastD[k]; }); firstD[TOTAL] = gf; lastD[TOTAL] = gl; }
  const ordTOTAL = orderCols ? (() => { const s = new Set(); rowsArr.forEach(k => { const m = ordPO[k]; if (m) yMonths.forEach(mk => { const ss = m[mk]; if (ss) ss.forEach(po => s.add(po)); }); }); return s.size; })() : 0;
  const colTotal = c => { let q = 0, s = 0; rowsArr.forEach(k => { const v = getv(k, c); q += v.q; s += v.s; }); return { q, s }; };

  function cellInner(v) {
    const has = v.q || v.s;
    if (!has) return '<div class="pt-cell"><div class="pt-sale">—</div><div class="pt-qty"></div></div>';
    if (r3Metric === 'qty')   return `<div class="pt-cell"><div class="pt-sale">${fmt(v.q)}</div><div class="pt-qty"></div></div>`;
    if (r3Metric === 'value') return `<div class="pt-cell"><div class="pt-sale">${fmtV(v.s)}</div><div class="pt-qty"></div></div>`;
    return `<div class="pt-cell"><div class="pt-sale">${fmtV(v.s)}</div><div class="pt-qty">${fmt(v.q)} qty</div></div>`;
  }
  const cellHtml = v => { const p = prim(v); const style = p ? `background:rgba(45,122,78,${(0.05 + 0.30 * (maxP ? Math.min(1, p / maxP) : 0)).toFixed(3)});` : ''; return `<td class="zcell" style="${style}">${cellInner(v)}</td>`; };
  const fyCellHtml = (q, s) => {
    if (r3Metric === 'qty')   return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmt(q)}</div><div class="pt-qty"></div></div></td>`;
    if (r3Metric === 'value') return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmtV(s)}</div><div class="pt-qty"></div></div></td>`;
    return `<td class="fycol"><div class="pt-cell"><div class="pt-sale">${fmtV(s)}</div><div class="pt-qty">${fmt(q)} qty</div></div></td>`;
  };
  const dateCellHtml = (k) => { if (!dateCols) return ''; const f = firstD[k], l = lastD[k]; return `<td class="zcell r1-datecell">${f ? fmtDate(f) : '—'}</td><td class="zcell r1-datecell">${l ? fmtDate(l) : '—'}</td>`; };
  // #Orders (distinct po_no for the year) + Average Order Value (year value ÷ #orders)
  const orderCellsHtml = (nOrders, aov) => {
    if (!orderCols) return '';
    const ordTxt = nOrders ? fmt(nOrders) : '—';
    const aovTxt = nOrders ? fmtMoney(aov) : '—';
    return `<td class="r1-sumcol"><div class="pt-cell"><div class="pt-sale">${ordTxt}</div><div class="pt-qty"></div></div></td>`
         + `<td class="r1-sumcol"><div class="pt-cell"><div class="pt-sale">${aovTxt}</div><div class="pt-qty"></div></div></td>`;
  };

  const leadCells = (key, isTotal) => {
    if (isTotal) return keys.map((kc, ci) => `<td class="zcol${ci === lastLead ? ' zlast' : ''}" style="left:${offs[ci]}px;min-width:${widths[ci]}px">${ci === 0 ? 'TOTAL' : ''}</td>`).join('');
    const parts = splitKey(key);
    return keys.map((kc, ci) => `<td class="zcol${ci === lastLead ? ' zlast' : ''} zwrap" style="left:${offs[ci]}px;min-width:${widths[ci]}px;max-width:${widths[ci]}px;width:${widths[ci]}px" title="${escapeHtml(parts[ci] || '')}">${escapeHtml(parts[ci] || '')}</td>`).join('');
  };
  const rowFor = (k, isTotal) => {
    const cells = cols.map(c => cellHtml(isTotal ? colTotal(c) : getv(k, c))).join('');
    const fq = isTotal ? yQ[TOTAL] : yQ[k], fs = isTotal ? yV[TOTAL] : yV[k];
    const nOrd = isTotal ? ordTOTAL : yearOrders(k);
    const aovV = nOrd ? (fs / nOrd) : 0;
    return `<tr class="${isTotal ? 'total-row' : ''}">${leadCells(k, isTotal)}${dateCellHtml(k)}${fyCellHtml(fq, fs)}${orderCellsHtml(nOrd, aovV)}${cells}</tr>`;
  };

  function sortIcon(col) {
    if (r3Sort.col === col) return `<span class="sort-ic on">${r3Sort.dir === 'desc' ? '▼' : '▲'}</span>`;
    return '<span class="sort-ic">⇅</span>';
  }
  const leadHeads = keys.map((kc, ci) => `<th class="zcol${ci === lastLead ? ' zlast' : ''}" data-sortcol="__K${ci}__" style="left:${offs[ci]}px;min-width:${widths[ci]}px">${escapeHtml(kc.label)}${sortIcon('__K' + ci + '__')}</th>`).join('');
  const dateHeads = dateCols
    ? `<th data-sortcol="__FIRST__" style="min-width:96px">${r3Basis === 'order' ? '1st Order' : '1st Dispatch'}${sortIcon('__FIRST__')}<span class="th-sub">Date</span></th>`
      + `<th data-sortcol="__LAST__" style="min-width:96px">${r3Basis === 'order' ? 'Last Order' : 'Last Dispatch'}${sortIcon('__LAST__')}<span class="th-sub">Date</span></th>`
    : '';
  const headCells = cols.map(c => `<th data-sortcol="${escapeHtml(c.id)}">${escapeHtml(c.label)}${sortIcon(c.id)}<span class="th-sub">${escapeHtml(c.sub)}</span></th>`).join('');
  const orderHeads = orderCols
    ? `<th class="r1-sumcol" data-sortcol="__ORDERS__"># Orders${sortIcon('__ORDERS__')}<span class="th-sub">${selY}</span></th>`
      + `<th class="r1-sumcol" data-sortcol="__AOV__">Avg Order Value${sortIcon('__AOV__')}<span class="th-sub">Value ÷ Orders</span></th>`
    : '';
  const thead = `<thead><tr>
    ${leadHeads}
    ${dateHeads}
    <th class="fycol" data-sortcol="__TOTAL__">${selY}${sortIcon('__TOTAL__')}<span class="th-sub">${escapeHtml(metricSub())}</span></th>
    ${orderHeads}
    ${headCells}
  </tr></thead>`;
  const leadEmpty = keys.map((kc, ci) => `<td class="zcol${ci === lastLead ? ' zlast' : ''}" style="left:${offs[ci]}px;min-width:${widths[ci]}px">${ci === 0 ? '—' : ''}</td>`).join('');
  const body = rowsArr.length
    ? rowsArr.map(k => rowFor(k, false)).join('') + rowFor(TOTAL, true)
    : `<tr>${leadEmpty}<td colspan="${(dateCols ? 2 : 0) + (orderCols ? 2 : 0) + cols.length + 1}" style="padding:18px;text-align:center;color:var(--text3)">No ${escapeHtml(dimCfg.label.toLowerCase())} with orders in ${selY}.</td></tr>`;

  // ── Toolbar (two lines) ──
  const yPills    = yList.map(f => `<button class="zmom-pill fy-pill${f === selY ? ' active' : ''}" data-r3y="${f}">${f}</button>`).join('');
  const viewPills = [{ k: 'quarter', label: 'Quarter' }, { k: 'month', label: 'Month' }].map(v => `<button class="zmom-pill v-pill${v.k === r3View ? ' active' : ''}" data-r3view="${v.k}">${v.label}</button>`).join('');
  const metPills  = [{ k: 'all', label: 'All' }, { k: 'qty', label: 'Qty' }, { k: 'value', label: 'Value' }].map(m => `<button class="zmom-pill met-pill${m.k === r3Metric ? ' active' : ''}" data-r3met="${m.k}">${m.label}</button>`).join('');

  const basisLabel = r3Basis === 'order' ? 'Order Received Date' : 'Dispatch Date';
  const grouped = keys.map(kc => escapeHtml(kc.label)).join(' › ');
  const note = (r3View === 'quarter'
      ? `Quarters of ${selY} (Q1 Jan–Mar … Q4 Oct–Dec), newest first`
      : `Months Jan→Dec of ${selY}, newest first`)
    + ` · grouped by ${grouped} · period derived from <b>${escapeHtml(basisLabel)}</b>`
    + (hideZero ? ` · only ${escapeHtml(dimCfg.label.toLowerCase())} combinations with orders in ${selY} are shown` : '')
    + (orderCols ? ` · <b>#Orders</b> = distinct PO (po_no) count for ${selY}, <b>Avg Order Value</b> = ${selY} value ÷ #Orders` : '')
    + (r3Basis === 'dispatch' ? ' · rows without a dispatch date are excluded' : '')
    + ` · click a header to sort · independent of the global filters.`;

  host.innerHTML = `
    <div class="bt-bar">
      <div class="bt-fg"><label class="bt-flabel">Search</label>
        <div class="kpi-search-wrap" style="max-width:200px"><span class="kpi-search-ic">⌕</span>
          <input type="text" class="kpi-searchbox r3-search" placeholder="Search ${escapeHtml(dimCfg.label.toLowerCase())}…" value="${escapeHtml(r3Search)}" autocomplete="off"></div></div>
      <div class="bt-fg"><label class="bt-flabel">Year</label><div class="bt-chips">${yPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">View</label><div class="bt-chips">${viewPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">Measure</label><div class="bt-chips">${metPills}</div></div>
      <div class="bt-fg"><label class="bt-flabel">Date Basis</label>
        <div class="db-seg"><button class="db-opt${r3Basis === 'order' ? ' active' : ''}" data-r3basis="order">Order Received</button><button class="db-opt${r3Basis === 'dispatch' ? ' active' : ''}" data-r3basis="dispatch">Dispatch Date</button></div></div>
      <button class="kpi-reset" id="r3Reset" title="Reset search & sort">↺ Reset</button>
      <div class="bt-period" style="margin-left:auto;">
        <span class="bt-period-rng"><b>${selY}</b> · Jan–Dec</span>
        <span class="bt-period-tag">${escapeHtml(R3_TITLE)}</span>
      </div>
    </div>
    <div class="zmom-wrap"><table class="zmom">${thead}<tbody>${body}</tbody></table></div>
    <div style="margin-top:7px;font-size:11px;color:var(--text2);">${note}</div>`;

  // ── Wire controls ──
  host.querySelectorAll('.fy-pill').forEach(b => b.addEventListener('click', () => { r3Year = +b.dataset.r3y; renderReport3(); }));
  host.querySelectorAll('.v-pill').forEach(b => b.addEventListener('click', () => { r3View = b.dataset.r3view; renderReport3(); }));
  host.querySelectorAll('.met-pill').forEach(b => b.addEventListener('click', () => { r3Metric = b.dataset.r3met; renderReport3(); }));
  host.querySelectorAll('.db-opt').forEach(b => b.addEventListener('click', () => { r3Basis = b.dataset.r3basis; r3Year = null; renderReport3(); }));
  host.querySelectorAll('th[data-sortcol]').forEach(th => th.addEventListener('click', () => {
    const col = th.dataset.sortcol;
    if (r3Sort.col === col) r3Sort.dir = (r3Sort.dir === 'desc') ? 'asc' : 'desc';
    else r3Sort = { col, dir: 'desc' };
    renderReport3();
  }));

  const si = host.querySelector('.r3-search');
  if (si) {
    si.addEventListener('input', () => { r3Search = si.value; r3SearchActive = true; renderReport3(); });
    si.addEventListener('focus', () => { r3SearchActive = true; });
    si.addEventListener('blur',  () => { r3SearchActive = false; });
    if (r3SearchActive) { si.focus(); const L = si.value.length; si.setSelectionRange(L, L); }
  }
  const rst = host.querySelector('#r3Reset');
  if (rst) rst.addEventListener('click', () => { r3Search = ''; r3SearchActive = false; r3Sort = { col: '__TOTAL__', dir: 'desc' }; renderReport3(); });
}

// ═══════════════════════════════════════════════════════════════
// TABS + STICKY + INIT
// ═══════════════════════════════════════════════════════════════
function setup() {
  buildFilterBar();
  window.addEventListener('resize', adjustStickyTops);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
      const fb = document.getElementById('filterBar');
      if (fb) fb.style.display = (tab === 'report1' || tab === 'report2' || tab === 'report3') ? 'none' : '';
      if (tab === 'report1') renderReport1();
      if (tab === 'report2') renderReport2();
      if (tab === 'report3') renderReport3();
      adjustStickyTops();
    });
  });
  adjustStickyTops();
}
function adjustStickyTops() {
  const top = document.querySelector('.top-bar'), fb = document.getElementById('filterBar'), tns = document.querySelector('.tab-nav-sticky');
  if (!top || !tns) return;
  const tH = top.offsetHeight || 60;
  if (fb) fb.style.top = tH + 'px';
  const fbVisible = fb && getComputedStyle(fb).display !== 'none' && fb.offsetHeight > 0;
  tns.style.top = (tH + (fbVisible ? fb.offsetHeight : 0)) + 'px';
}
async function init() {
  setup();
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    const loadOv = document.getElementById('loadingOverlay');
    loadOv.style.display = 'flex'; loadOv.style.opacity = '1';
    resetLoadingVisual(); startLoadingCycle();
    try {
      await loadDashboardData();
      stopLoadingCycle();
      finishLoading('success', 'Dashboard ready', 'Launching your workspace');
      setTimeout(() => { loadOv.style.opacity = '0'; setTimeout(() => { loadOv.style.display = 'none'; }, 500); }, 1200);
    } catch (err) {
      console.error('Auto-load error:', err);
      stopLoadingCycle();
      sessionStorage.removeItem(SESSION_KEY);
      loadOv.style.display = 'none';
      document.getElementById('loginOverlay').style.display = 'flex';
      showLoginError('Session expired or data unavailable. Please sign in again.');
    }
  }
}
init();

/* ════════ EXECUTIVE DASHBOARD renderDashboard() ════════ */
// ═══════════════════════════════════════════════════════════════════════
//  EXECUTIVE DASHBOARD  (landing page) — renders into #tab-dashboard
//  Fully dynamic from `filtered` (respects every global filter & date range).
//  Reuses existing helpers: fmt, fmtMoney, fmtV, escapeHtml, zmomKeyShift,
//  zmomMonLabel, up, num.  No external libraries.
// ═══════════════════════════════════════════════════════════════════════

// view state (persists across re-renders)
let exTrendMetric = 'ov';     // ov | oq | dv | dq
let exTopDim      = 'sku';    // sku | retailer | salesrep | distributor | brand
let _exGradId = 0;

// ── small formatting helpers (built on existing ones) ──
function exG(cur, prev) {                       // compact growth pill (ex-g)
  if (prev == null || prev === 0 || !isFinite(prev))
    return '<span class="ex-g na">New</span>';
  const p = (cur - prev) / Math.abs(prev) * 100;
  const cls = p >= 0 ? 'up' : 'dn', ar = p >= 0 ? '▲' : '▼';
  return `<span class="ex-g ${cls}"><span class="a">${ar}</span>${Math.abs(p).toFixed(1)}%</span>`;
}
function exGN(cur, prev) {                        // numeric growth %, or null
  if (prev == null || prev === 0 || !isFinite(prev)) return null;
  return (cur - prev) / Math.abs(prev) * 100;
}
function exMono(name) {                           // colored monogram for a label
  const COLORS = ['#3a6f96','#2d7a4e','#6b4fa0','#2a7a7a','#b8892e','#c97a3c','#1a5f3a','#b83c42'];
  const s = String(name || '?');
  let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  const parts = s.replace(/[^A-Za-z0-9 ]/g, ' ').trim().split(/\s+/).filter(Boolean);
  const ini = ((parts[0]?.[0] || s[0] || '?') + (parts[1]?.[0] || parts[0]?.[1] || '')).toUpperCase();
  return { ini, color: COLORS[h % COLORS.length] };
}
// sparkline (area+line), stretches to fill its box
function exSpark(vals, stroke) {
  const n = vals.length;
  if (!n) return '<svg class="ex-spark"></svg>';
  const mx = Math.max(...vals), mn = Math.min(...vals), rng = (mx - mn) || 1;
  const W = 100, H = 30, pad = 3;
  const X = i => n === 1 ? W / 2 : (i / (n - 1)) * W;
  const Y = v => H - pad - ((v - mn) / rng) * (H - pad * 2);
  let line = '', area = `M0,${H} `;
  vals.forEach((v, i) => { const x = X(i).toFixed(1), y = Y(v).toFixed(1); line += (i ? 'L' : 'M') + x + ',' + y + ' '; area += `L${x},${y} `; });
  area += `L${W},${H} Z`;
  const gid = 'exsp' + (_exGradId++);
  return `<svg class="ex-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${stroke}" stop-opacity=".22"/><stop offset="1" stop-color="${stroke}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${stroke}" stroke-width="1.6" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
// larger area chart for the trend panel
function exArea(vals, stroke, h) {
  const n = vals.length; h = h || 230;
  if (!n) return '<svg class="ex-chart-svg"></svg>';
  const mx = Math.max(...vals, 1), W = 760, pad = 14;
  const X = i => n === 1 ? W / 2 : (i / (n - 1)) * W;
  const Y = v => h - pad - (v / mx) * (h - pad * 2);
  let line = '', area = `M0,${h} `, grid = '';
  vals.forEach((v, i) => { const x = X(i).toFixed(1), y = Y(v).toFixed(1); line += (i ? 'L' : 'M') + x + ',' + y + ' '; area += `L${x},${y} `; });
  area += `L${W},${h} Z`;
  for (let g = 1; g <= 3; g++) { const y = (h / 4 * g).toFixed(1); grid += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 5" vector-effect="non-scaling-stroke"/>`; }
  const lastX = X(n - 1).toFixed(1), lastY = Y(vals[n - 1]).toFixed(1);
  const gid = 'exar' + (_exGradId++);
  return `<svg class="ex-chart-svg" viewBox="0 0 ${W} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${stroke}" stop-opacity=".26"/><stop offset="1" stop-color="${stroke}" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${stroke}" stroke-width="2.4" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="${lastX}" y1="${lastY}" x2="${lastX}" y2="${h}" stroke="${stroke}" stroke-width="1.2" stroke-dasharray="2 3" vector-effect="non-scaling-stroke" opacity=".55"/>
  </svg>`;
}
// progress ring (health score)
function exRingSVG(pct, stroke, light) {
  const r = 40, c = 2 * Math.PI * r, off = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
  return `<svg viewBox="0 0 96 96" width="96" height="96">
    <circle cx="48" cy="48" r="${r}" fill="none" stroke="${light}" stroke-width="8"/>
    <circle cx="48" cy="48" r="${r}" fill="none" stroke="${stroke}" stroke-width="8" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 48 48)"/>
  </svg>`;
}
// window helpers over a {monthKey:value} map
function exWin(map, months) { let s = 0; for (const m of months) s += (map[m] || 0); return s; }
function exMonthsBack(endKey, count) { const a = []; for (let i = count - 1; i >= 0; i--) a.push(zmomKeyShift(endKey, -i)); return a; }

// ── MAIN RENDER ──────────────────────────────────────────────────────
function renderDashboard() {
  const host = document.getElementById('tab-dashboard');
  if (!host) return;
  const rows = filtered;
  if (!rows || !rows.length) {
    host.innerHTML = `<div class="ex-wrap"><div class="no-data" style="margin-top:30px;">No records match the current filters. Adjust the filter bar or reset to see the executive overview.</div></div>`;
    return;
  }

  // ── single aggregation pass ──
  let ordQ = 0, ordV = 0, dispQ = 0, dispV = 0, backQ = 0, backV = 0, futQ = 0, futV = 0,
      pendQ = 0, pendV = 0, invV = 0, invQ = 0, leadSum = 0, leadCnt = 0;
  const poSet = new Set(), invSet = new Set(), retSet = new Set(), skuSet = new Set(),
        distSet = new Set(), repSet = new Set(), brandSet = new Set();
  const ovM = {}, oqM = {}, dvM = {}, dqM = {};          // monthly series (order/dispatch · value/qty)
  const G = { sku: {}, retailer: {}, salesrep: {}, distributor: {}, brand: {} };
  const grp = (bucket, key, v, q, mk) => {
    if (!key) return;
    let o = bucket[key]; if (!o) o = bucket[key] = { v: 0, q: 0, m: {}, orders: new Set() };
    o.v += v; o.q += q; if (mk) o.m[mk] = (o.m[mk] || 0) + v;
  };
  const poByEntity = {};                                  // distinct PO per retailer (activity)
  const backRows = [], futRows = [];
  const lastByProduct = {};                               // last order date per product
  let maxKey = '';

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const v = r.value || 0, q = r.total_qty || 0;
    const od = r.order_dt, mk = (od && od.length >= 7) ? od.slice(0, 7) : '';
    ordQ += q; ordV += v;
    if (mk) { ovM[mk] = (ovM[mk] || 0) + v; oqM[mk] = (oqM[mk] || 0) + q; if (mk > maxKey) maxKey = mk; }

    const dispatched = !!r.dispatch_dt;
    if (dispatched) {
      dispQ += q; dispV += v;
      const dk = r.dispatch_dt.slice(0, 7);
      dvM[dk] = (dvM[dk] || 0) + v; dqM[dk] = (dqM[dk] || 0) + q;
      // dispatch lead time
      if (od) { const lt = (new Date(r.dispatch_dt) - new Date(od)) / 86400000; if (isFinite(lt) && lt >= 0) { leadSum += lt; leadCnt++; } }
    } else { pendQ += q; pendV += v; }

    if (r.back_order_qty > 0) { backQ += r.back_order_qty; backV += v; backRows.push(r); }
    if (r.expected_ship_dt) { futQ += q; futV += v; futRows.push(r); }
    if (r.invoice_no) { invV += v; invQ += q; invSet.add(r.invoice_no); }

    if (r.po_no) poSet.add(r.po_no);
    if (r.retailer_name) retSet.add(r.retailer_name);
    if (r.sku_code) skuSet.add(r.sku_code);
    if (r.distributor) distSet.add(r.distributor);
    if (r.sales_rep) repSet.add(r.sales_rep);
    if (r.brand_name) brandSet.add(r.brand_name);

    grp(G.sku, r.product_code, v, q, mk);
    grp(G.retailer, r.retailer_name, v, q, mk);
    grp(G.salesrep, r.sales_rep, v, q, mk);
    grp(G.distributor, r.distributor, v, q, mk);
    grp(G.brand, r.brand_name, v, q, mk);

    if (r.retailer_name && r.po_no) { (poByEntity[r.retailer_name] || (poByEntity[r.retailer_name] = new Set())).add(r.po_no); }
    if (r.product_code && od) { if (!lastByProduct[r.product_code] || od > lastByProduct[r.product_code]) lastByProduct[r.product_code] = od; }
  }

  if (!maxKey) maxKey = (rows[0].order_dt || '').slice(0, 7) || '2026-01';
  const maxYear = +maxKey.slice(0, 4), maxMon = +maxKey.slice(5, 7);
  const last12 = exMonthsBack(maxKey, 12);
  const prev12 = exMonthsBack(zmomKeyShift(maxKey, -12), 12);
  const fillRate = ordQ ? (dispQ / ordQ * 100) : 0;
  const nOrders = poSet.size, nInv = invSet.size;

  // rolling 12m vs prior 12m for hero KPIs
  const ov12 = exWin(ovM, last12), ovP = exWin(ovM, prev12);
  const oq12 = exWin(oqM, last12), oqP = exWin(oqM, prev12);
  const dv12 = exWin(dvM, last12), dvP = exWin(dvM, prev12);
  const dq12 = exWin(dqM, last12), dqP = exWin(dqM, prev12);

  // ── HEALTH SCORE (composite, 0–100) ──
  const gOV = exGN(ov12, ovP);            // revenue momentum

  const fillScore = Math.max(0, Math.min(100, fillRate));
  const invRate = ordV ? (invV / ordV * 100) : 0;
  const fulfilScore = Math.max(0, Math.min(100, invRate));

  const healthLabel = health >= 75 ? 'Strong' : health >= 60 ? 'Healthy' : health >= 45 ? 'Steady' : 'Needs attention';
  const healthColor = health >= 60 ? '#3ba06a' : health >= 45 ? '#b8892e' : '#d68a3a';

  // momentum mini-bars = last 8 months order value
  const mom8 = exMonthsBack(maxKey, 8).map(m => ovM[m] || 0);
  const mom8mx = Math.max(...mom8, 1);
  const momPct = exGN(ov12, ovP);

  const monthName = zmomMonLabel(maxKey);

  // helper to build a hero KPI tile
  const kpi = (label, color, valHtml, cur12, prev, prevLabel, sparkVals) => `

  const ovSpark = last12.map(m => ovM[m] || 0);

  const frSpark = last12.map(m => { const oq = oqM[m] || 0, dq = dqM[m] || 0; return oq ? dq / oq * 100 : 0; });
  const pendSpark = last12.map((m, i) => 0); // pending is a snapshot; show flat baseline

  // ════════ BUILD HTML ════════
  let H = '<div class="ex-wrap">';

  // ── 1 · EXECUTIVE SUMMARY ──
  H += `
  <div class="sec-header" style="margin-top:4px;">

      <div>
        <div class="ex-rk-label">Business Health</div>
        <div class="ex-rk-head">${healthLabel}</div>
        <div class="ex-rk-sub">Blended read on revenue momentum, fill rate and invoicing across the filtered book.</div>
      </div>
    </div>
    <div class="ex-rcard">
      <div class="ex-momentum">
        <div class="ex-rk-label">Sales Momentum</div>
        <div class="ex-mom-bars">${mom8.map(v => `<i class="${v >= mom8mx * 0.8 ? 'hot' : ''}" style="height:${Math.max(8, v / mom8mx * 100)}%"></i>`).join('')}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${momPct == null ? '<span class="ex-g na">New</span>' : exG(ov12, ovP)}
          <span class="ex-cmp-prev">revenue, last 12 mo vs prior 12 mo</span>
        </div>
      </div>
    </div>
    <div class="ex-rcard">
      <div class="ex-momentum">
        <div class="ex-rk-label">Fulfilment Pulse</div>
        <div style="display:flex;align-items:baseline;gap:9px;">
          <div style="font-size:30px;font-weight:700;letter-spacing:-.6px;color:var(--ex-green);line-height:1;">${fillRate.toFixed(1)}%</div>
          <div class="ex-cmp-prev">fill rate</div>
        </div>
        <div class="ex-node-track"><div class="ex-node-fill" style="width:${fillRate.toFixed(1)}%;background:var(--ex-green)"></div></div>
        <span class="ex-cmp-prev"><b style="color:var(--text)">${fmt(Math.round(pendQ))}</b> qty awaiting dispatch · ${fmtV(pendV)}</span>
      </div>

  <div class="ex-kpis">

    <div class="ex-kpi" style="--kc:var(--ex-gold)">
      <div class="ex-kpi-top"><div class="ex-kpi-label"><span class="ex-kpi-dot"></span>Fill Rate</div></div>
      <div class="ex-kpi-val">${fillRate.toFixed(1)}%</div>
      <div class="ex-kpi-meta">${exG(fillRate, exWin(dqM, prev12) && exWin(oqM, prev12) ? exWin(dqM, prev12) / exWin(oqM, prev12) * 100 : 0)}<span class="ex-kpi-prev">dispatch ÷ order</span></div>
      ${exSpark(frSpark, 'var(--ex-gold)')}
    </div>
    <div class="ex-kpi" style="--kc:var(--ex-warm)">
      <div class="ex-kpi-top"><div class="ex-kpi-label"><span class="ex-kpi-dot"></span>Pending</div></div>
      <div class="ex-kpi-val">${fmt(pendOrdersCount(rows))}</div>
      <div class="ex-kpi-meta"><span class="ex-g na" style="background:var(--warm-light);color:var(--warm);border:none;">${fmtV(pendV)}</span><span class="ex-kpi-prev">orders awaiting dispatch</span></div>
      <div class="ex-spark" style="display:flex;align-items:flex-end;gap:2px;">${last12.map(m => { const oq = oqM[m] || 0, dq = dqM[m] || 0, pendQm = Math.max(0, oq - dq); return `<i style="flex:1;background:var(--warm-light);border-radius:2px 2px 0 0;height:${oq ? Math.max(6, pendQm / (oq || 1) * 100) : 6}%"></i>`; }).join('')}</div>
    </div>

  // ── 2 · ORDER PIPELINE ──
  const recV = ordV, recQ = ordQ;

  const IC = {

  H += `

      ${arrow}

      ${arrow}

      ${arrow}

    </div>
    <div class="ex-pipe-foot">

        <div class="ex-out-ic">${IC.clock}</div>
        <div><div class="ex-out-l">Awaiting Dispatch</div>
          <div class="ex-out-v">${fmt(Math.round(awaitQ))} qty · ${fmtV(awaitV)}</div>

      </div>

  </div>`;

  // ── 3 · BUSINESS PERFORMANCE (Order vs Dispatch comparisons) ──
  const curMon = maxKey, prevMon = zmomKeyShift(maxKey, -1);

  const qMonths = (yr, qn) => [0,1,2].map(o => `${yr}-${String((qn-1)*3 + 1 + o).padStart(2,'0')}`);
  const curQ = Math.floor((maxMon - 1) / 3) + 1;

  const curQM = qMonths(curQy, curQ), prevQM = qMonths(prevQy, prevQn);
  const ytdCur = [], ytdPrev = [];
  for (let m = 1; m <= maxMon; m++) { ytdCur.push(`${maxYear}-${String(m).padStart(2,'0')}`); ytdPrev.push(`${maxYear-1}-${String(m).padStart(2,'0')}`); }

  const cmpRow = (label, color, ov, op, dv, dp) => `

      <div class="ex-cmp-k"><i style="background:var(--ex-blue)"></i>Order</div>
