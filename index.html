  }

  /* ── STORE BREAKDOWN ── */
  .store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px;}

  /* ── ZONE MoM REPORT ── */
  .zmom-controls{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-bottom:14px;position:sticky;top:126px;z-index:85;background:var(--bg);padding:8px 0;}
  .zmom-pillset{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .zmom-pillset .pset-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);margin-right:2px;}
  .zmom-pill{padding:6px 13px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text2);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .zmom-pill:hover{border-color:var(--blue);color:var(--text);}
  .zmom-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(43,90,126,.20);}
  .zmom-pill.m-pill.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 1px 5px rgba(184,60,66,.26);}
  .zmom-pill.fy-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(43,90,126,.20);}
  .zmom-legend{display:flex;gap:14px;align-items:center;margin-left:auto;font-size:11px;color:var(--text3);flex-wrap:wrap;}
  .zmom-legend b{font-weight:700;color:var(--text2);}
  .zmom-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:4px;vertical-align:-1px;}

  .zmom-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:72vh;}
  table.zmom{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.zmom th,table.zmom td{padding:13px 15px;white-space:nowrap;border-bottom:1px solid var(--border);vertical-align:middle;}
  table.zmom thead th{position:sticky;top:0;z-index:6;background:var(--blue-light);color:var(--blue-dark);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:right;border-bottom:1px solid var(--border);box-shadow:inset 0 -2px 0 rgba(43,90,126,.22);}
  table.zmom thead th .th-sub{display:block;font-size:10px;font-weight:600;color:rgba(43,90,126,.70);letter-spacing:.2px;margin-top:4px;text-transform:none;}
  table.zmom th.zcol,table.zmom td.zcol{position:sticky;left:0;z-index:5;background:var(--surface);text-align:left;font-weight:600;color:var(--text);min-width:96px;}
  table.zmom th.zcol.zlast,table.zmom td.zcol.zlast{box-shadow:1px 0 0 var(--border);}
  table.zmom td.zcol.codecell{color:var(--blue-dark);font-weight:700;}
  table.zmom th.zcol.zwrap,table.zmom td.zcol.zwrap{white-space:normal;word-break:break-word;line-height:1.3;padding:9px 11px;font-size:12px;}
  table.zmom thead th.zcol{z-index:7;background:var(--blue-light);color:var(--blue-dark);text-align:left;}
  table.zmom th.fycol,table.zmom td.fycol{background:var(--gold-light);}
  table.zmom thead th.fycol{background:#f7ecca;color:var(--gold);box-shadow:inset 0 -2px 0 rgba(184,137,46,.28);}
  table.zmom thead th.fycol .th-sub{color:rgba(184,137,46,.7);}
  /* Year-summary columns (#Orders, Avg Order Value) — same yellow/gold as the year-total */
  table.zmom th.r1-sumcol,table.zmom td.r1-sumcol{background:var(--gold-light);text-align:right;}
  table.zmom thead th.r1-sumcol{background:#f7ecca;color:var(--gold);box-shadow:inset 0 -2px 0 rgba(184,137,46,.28);}
  table.zmom thead th.r1-sumcol .th-sub{color:rgba(184,137,46,.7);}
  table.zmom tbody tr:hover td{background:var(--bg);}
  table.zmom tbody tr:hover td.zcol{background:var(--surface2);}
  table.zmom tbody tr:hover td.fycol{background:#f7ecca;}
  table.zmom tbody tr:hover td.r1-sumcol{background:#f7ecca;}
  table.zmom tr.total-row td{font-weight:700;background:var(--blue-light);border-top:2px solid var(--blue-dark);}
  table.zmom tr.total-row td.zcol{background:var(--blue-light);color:var(--blue-dark);}
  table.zmom tr.total-row:hover td{background:var(--blue-light);}
  /* Sales Person — Target vs Achievement table */
  table.zmom td.sp-per{text-align:left;color:var(--text2);font-weight:600;}
  table.zmom thead th.sp-per-h{text-align:left;}
  table.zmom tr.sp-subtot td{background:var(--surface2);font-weight:700;}
  table.zmom tr.sp-subtot td.zcol{background:var(--surface2);color:var(--text);}
  table.zmom tr.sp-subtot td.sp-per{color:var(--text2);font-style:italic;font-weight:600;}
  table.zmom tr.sp-subtot:hover td{background:var(--surface2);}
  table.zmom tr.sp-grp-start td{border-top:2px solid var(--border2);}

  /* ── Invoice Register report ── */
  .inv-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:74vh;}
  table.inv-tbl{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px;}
  table.inv-tbl th,table.inv-tbl td{padding:10px 13px;white-space:nowrap;border-bottom:1px solid var(--border);vertical-align:middle;}
  table.inv-tbl thead th{position:sticky;top:0;z-index:6;background:var(--blue-light);color:var(--blue-dark);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:left;box-shadow:inset 0 -2px 0 rgba(43,90,126,.22);}
  table.inv-tbl th.num,table.inv-tbl td.num{text-align:right;font-variant-numeric:tabular-nums;}
  table.inv-tbl td.code{color:var(--blue-dark);font-weight:700;}
  table.inv-tbl td.val{font-weight:700;color:var(--text);}
  table.inv-tbl tbody tr:hover td{background:var(--bg);}
  table.inv-tbl tr.total-row td{font-weight:700;background:var(--blue-light);color:var(--blue-dark);border-top:2px solid var(--blue-dark);position:sticky;bottom:0;z-index:5;}
  table.inv-tbl tr.total-row:hover td{background:var(--blue-light);}

  /* rich overview cell */
  .zc{display:flex;flex-direction:column;gap:8px;align-items:stretch;text-align:left;min-width:192px;}
  .zc.fy{min-width:150px;}
  .zc-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .zc-sale{font-size:16px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;}
  .zc-tgt{font-size:11.5px;color:var(--text2);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.1px;}
  .zc-tgt b{font-weight:700;color:var(--text);}
  .zc-contrib{display:flex;align-items:center;gap:8px;}
  .zc-bar{flex:1;height:6px;border-radius:4px;background:#ece8e1;overflow:hidden;min-width:40px;}
  .zc-bar i{display:block;height:100%;background:var(--blue);border-radius:4px;}
  .zc-contrib span{font-size:10.5px;color:var(--text3);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .zc-growth{display:flex;gap:6px;flex-wrap:nowrap;}
  .zsingle{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);}
  .zcell{text-align:right;}
  .pt-cell{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .pt-sale{font-size:14px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;}
  .pt-qty{font-size:11.5px;color:var(--text2);font-weight:700;font-variant-numeric:tabular-nums;min-height:11px;}

  /* Brand Trends — segmented toggle (FY/Month, red like KPI), blue control bar & table */
  .seg-toggle{display:inline-flex;align-items:center;background:var(--surface);border:1.5px solid var(--red);border-radius:999px;padding:2px;gap:2px;}
  .seg-opt{padding:5px 18px;border:none;background:transparent;color:var(--red);font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:999px;transition:all .15s;white-space:nowrap;}
  .seg-opt.active{background:linear-gradient(135deg,#c8474d,#b83c42);color:#fff;box-shadow:0 2px 7px rgba(184,60,66,.30);}
  .bt-bar{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;background:linear-gradient(115deg,#eaf2fa,#e6eff7 60%,#dde9f4);border:1px solid #cbdcec;border-radius:var(--r);padding:12px 16px;box-shadow:var(--shadow);margin-bottom:14px;}
  .bt-fg{display:flex;flex-direction:column;gap:4px;}
  .bt-flabel{font-size:9.5px;font-weight:700;color:#6f8aa3;text-transform:uppercase;letter-spacing:.5px;}
  .bt-note{margin-top:7px;font-size:11px;color:var(--text2);}
  .bt-period{margin-left:auto;align-self:center;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .bt-period-rng{font-size:13.5px;font-weight:700;color:var(--blue-dark);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .bt-period-tag{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;}
  table.brand-tbl{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.brand-tbl thead th{position:sticky;background:var(--blue-light);color:var(--blue-dark);font-size:11.5px;font-weight:700;letter-spacing:.4px;text-align:right;border-bottom:1px solid var(--border);padding:8px 11px;white-space:nowrap;box-shadow:inset 0 -2px 0 rgba(43,90,126,.22);}
  table.brand-tbl thead tr.grp th{top:0;z-index:7;text-align:center;border-left:1px solid rgba(43,90,126,.18);text-transform:uppercase;}
  table.brand-tbl thead tr.sub th{top:33px;z-index:6;font-size:10.5px;font-weight:600;}
  table.brand-tbl th.bcol,table.brand-tbl td.bcol,table.brand-tbl th.bcol2,table.brand-tbl td.bcol2{position:sticky;z-index:5;text-align:left;border-right:1px solid var(--border);}
  table.brand-tbl td.bcol,table.brand-tbl td.bcol2{background:var(--surface);color:var(--text);font-weight:600;}
  table.brand-tbl th.bcol,table.brand-tbl th.bcol2{background:var(--blue-light);color:var(--blue-dark);font-weight:700;z-index:9;}
  .bt-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  table.brand-tbl td{padding:7px 11px;border-bottom:1px solid var(--border);}
  table.brand-tbl td.bcell{text-align:right;border-left:1px solid var(--border-soft,rgba(0,0,0,.04));}
  table.brand-tbl tr.total-row td{background:var(--blue-light);color:var(--blue-dark);font-weight:700;border-top:2px solid var(--blue);}
  table.brand-tbl tr.total-row td.bcol,table.brand-tbl tr.total-row td.bcol2{background:var(--blue-light);color:var(--blue-dark);}
  table.brand-tbl tr.total-row .bt-main{color:var(--blue-dark);}
  /* zebra striping — same scheme as the Store Performance KPI report */
  table.brand-tbl tbody tr:not(.total-row):nth-child(odd) td{background:var(--surface);}
  table.brand-tbl tbody tr:not(.total-row):nth-child(even) td{background:#f6f4ef;}
  table.brand-tbl tbody tr:not(.total-row):nth-child(odd) td.bcol,
  table.brand-tbl tbody tr:not(.total-row):nth-child(odd) td.bcol2{background:var(--surface);}
  table.brand-tbl tbody tr:not(.total-row):nth-child(even) td.bcol,
  table.brand-tbl tbody tr:not(.total-row):nth-child(even) td.bcol2{background:#f0ede7;}
  table.brand-tbl tbody tr:hover td:not(.bcol):not(.bcol2){background:rgba(43,90,126,.05);}
  /* TOTAL column highlighted in the same gold/yellow used across the other reports */
  table.brand-tbl th.grp-totcol{background:#f7ecca;color:var(--gold);box-shadow:inset 0 -2px 0 rgba(184,137,46,.30);}
  table.brand-tbl th.sub-totcol{background:var(--gold-light);color:var(--gold);}
  table.brand-tbl td.bt-totcol{background:var(--gold-light)!important;border-left:1px solid rgba(184,137,46,.30);}
  table.brand-tbl td.bt-totcol .bt-main{color:#5a4310;}
  table.brand-tbl td.bt-totcol .bt-ly{color:#8a7330;}
  table.brand-tbl tr.total-row td.bt-totcol{background:#efe3bf!important;}
  table.brand-tbl tr.total-row td.bt-totcol .bt-main{color:#4a3608;}
  .bt-cell{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .bt-main{font-size:13.5px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;}
  .bt-cmp{font-size:10.5px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2;}
  .bt-cmp.up{color:var(--green);}
  .bt-cmp.down{color:var(--red);}
  .bt-cmp.flat{color:var(--text3);}
  .bt-ly{color:var(--text3);font-weight:600;margin-left:3px;}
  .bt-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);max-height:72vh;overflow-y:auto;}

  /* ── WEEKLY TRENDS (Month × Week of Month) ── */
  .wtt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:74vh;}
  table.wtt{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.wtt th,table.wtt td{padding:9px 12px;white-space:nowrap;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;}
  table.wtt thead th{position:sticky;background:var(--blue-light);color:var(--blue-dark);font-weight:700;letter-spacing:.4px;box-shadow:inset 0 -2px 0 rgba(43,90,126,.18);}
  table.wtt thead tr.grp th{top:0;z-index:7;text-align:center;font-size:11.5px;text-transform:uppercase;border-left:1px solid rgba(43,90,126,.16);}
  table.wtt thead tr.grp th .wtt-rng{font-weight:600;color:rgba(43,90,126,.66);text-transform:none;letter-spacing:0;}
  table.wtt thead tr.grp th.grp-ty{background:#f7ecca;color:var(--gold);box-shadow:inset 0 -2px 0 rgba(184,137,46,.28);}
  table.wtt thead tr.grp th.grp-ly{background:#eef4fb;color:#2b5a7e;}
  table.wtt thead tr.grp th.grp-lm{background:#fdf4e6;color:#9a6f1f;}
  table.wtt thead tr.sub th{top:33px;z-index:6;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue-dark);border-left:1px solid rgba(43,90,126,.10);}
  table.wtt thead tr.sub th.sub-ty{background:var(--gold-light);color:var(--gold);}
  table.wtt th.mcol,table.wtt td.mcol{position:sticky;left:0;z-index:5;text-align:left;font-weight:700;color:var(--text);background:var(--surface);min-width:92px;box-shadow:1px 0 0 var(--border);}
  table.wtt thead th.mcol{z-index:9;background:var(--blue-light);color:var(--blue-dark);}
  table.wtt tbody tr:nth-child(even) td{background:#f6f4ef;}
  table.wtt tbody tr:nth-child(even) td.mcol{background:#f0ede7;}
  table.wtt tbody tr:hover td{background:rgba(43,90,126,.05);}
  table.wtt tbody tr:hover td.mcol{background:var(--surface2);}
  table.wtt td.wt-q{color:var(--text2);font-weight:600;}
  table.wtt td.wt-v{color:var(--text);font-weight:700;border-left:1px solid rgba(0,0,0,.04);}
  table.wtt td.wk-start{border-left:1px solid rgba(43,90,126,.16);}
  table.wtt td.wt-tq,table.wtt td.wt-tv{background:var(--gold-light);font-weight:800;color:#6b5212;}
  table.wtt td.wt-grow{font-weight:700;}
  table.wtt tr.total-row td{font-weight:800;background:var(--blue-light)!important;color:var(--blue-dark);border-top:2px solid var(--blue-dark);}
  table.wtt tr.total-row td.mcol{background:var(--blue-light)!important;color:var(--blue-dark);}
  .wtt-note{margin-top:7px;font-size:11px;color:var(--text2);}

  /* ── MONTHLY YEAR-ON-YEAR (dashboard) + DAILY TRENDS shared table styling ── */
  .yoy-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    background:linear-gradient(115deg,#eaf2fa,#e6eff7 60%,#dde9f4);border:1px solid #cbdcec;border-radius:var(--r);padding:11px 15px;box-shadow:var(--shadow);margin-bottom:13px;}
  .yoy-bar .bt-fg{flex-direction:row;align-items:center;gap:9px;}
  .ddt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:74vh;box-shadow:var(--shadow);}
  table.ddt{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.ddt th,table.ddt td{padding:9px 13px;white-space:nowrap;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;}
  table.ddt thead th{position:sticky;background:var(--blue-light);color:var(--blue-dark);font-weight:700;letter-spacing:.4px;box-shadow:inset 0 -2px 0 rgba(43,90,126,.18);}
  table.ddt thead tr.grp th{top:0;z-index:7;text-align:center;font-size:11.5px;text-transform:uppercase;border-left:1px solid rgba(43,90,126,.16);}
  table.ddt thead tr.grp th .ddt-rng{font-weight:600;color:rgba(43,90,126,.66);text-transform:none;letter-spacing:0;}
  table.ddt thead tr.grp th.grp-tot{background:#f7ecca;color:var(--gold);box-shadow:inset 0 -2px 0 rgba(184,137,46,.28);}
  table.ddt thead tr.sub th{top:34px;z-index:6;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue-dark);border-left:1px solid rgba(43,90,126,.10);}
  table.ddt thead tr.sub th.sub-tot{background:var(--gold-light);color:var(--gold);}
  table.ddt thead tr.single th{top:0;z-index:7;}
  /* sticky lead column(s) */
  table.ddt th.dcol,table.ddt td.dcol{position:sticky;left:0;z-index:5;text-align:left;font-weight:700;color:var(--text);background:var(--surface);min-width:96px;}
  table.ddt th.dcol2,table.ddt td.dcol2{position:sticky;z-index:5;text-align:left;font-weight:600;color:var(--text2);background:var(--surface);min-width:118px;font-size:12px;box-shadow:1px 0 0 var(--border);}
  table.ddt thead th.dcol,table.ddt thead th.dcol2{z-index:9;background:var(--blue-light);color:var(--blue-dark);}
  table.ddt tbody tr:nth-child(even) td{background:#f6f4ef;}
  table.ddt tbody tr:nth-child(even) td.dcol,table.ddt tbody tr:nth-child(even) td.dcol2{background:#f0ede7;}
  table.ddt tbody tr:hover td{background:rgba(43,90,126,.05);}
  table.ddt tbody tr:hover td.dcol,table.ddt tbody tr:hover td.dcol2{background:var(--surface2);}
  table.ddt td.grp-start{border-left:1px solid rgba(43,90,126,.16);}
  table.ddt td.totcell{background:var(--gold-light);font-weight:800;color:#6b5212;border-left:1px solid rgba(184,137,46,.28);}
  table.ddt tr.total-row td{font-weight:800;background:var(--blue-light)!important;color:var(--blue-dark);border-top:2px solid var(--blue-dark);}
  table.ddt tr.total-row td.dcol,table.ddt tr.total-row td.dcol2{background:var(--blue-light)!important;color:var(--blue-dark);}
  table.ddt tr.total-row td.totcell{background:#f1e6c4!important;color:#5a4310;}
  /* stacked multi-metric cell (the "All" view: Qty / Value / ASP) */
  .ddt-cell{display:flex;flex-direction:column;gap:1px;align-items:flex-end;line-height:1.2;}
  .ddt-cell .cv{font-weight:700;color:var(--text);}
  .ddt-cell .cq{font-size:11px;font-weight:600;color:var(--text2);}
  .ddt-cell .ca{font-size:10.5px;font-weight:700;color:var(--gold);margin-left:2px;}
  .ddt-muted{color:var(--text3);}
  .ddt-note{margin-top:7px;font-size:11px;color:var(--text2);}

  .pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:11px;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.35;white-space:nowrap;}
  .pill.green{background:var(--green-light);color:var(--green);}
  .pill.amber{background:var(--warm-light);color:var(--warm);}
  .pill.red{background:var(--red-light);color:var(--red);}
  .pill.na{background:var(--surface2);color:var(--text3);}
  .chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:9px;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .chip.up{background:var(--green-light);color:var(--green);}
  .chip.dn{background:var(--red-light);color:var(--red);}
  .chip.na{background:var(--surface2);color:var(--text3);}
  /* larger variant used by the Ach% / MoM% / YoY% single-metric lenses */
  .pill.lg,.chip.lg{font-size:12px;padding:4px 11px;}
  @media(max-width:768px){.zmom-legend{margin-left:0;}}

  /* ── TABLES ── */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;}
  thead th:hover{background:var(--bg);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--bg);}
  tbody td{padding:8px 13px;color:var(--text);white-space:nowrap;}
  .tn{text-align:right;font-variant-numeric:tabular-nums;}
  .ta{color:var(--blue-dark);font-weight:600;}

  /* ── MATRIX ── */
  .matrix-wrap .table-wrap thead th{background:var(--blue-dark);color:#fff;text-align:center;}
  .matrix-wrap .table-wrap thead th:first-child{background:var(--surface2);color:var(--text2);text-align:left;}
  .matrix-wrap .table-wrap tbody td{text-align:right;}
  .matrix-wrap .table-wrap tbody td:first-child{font-weight:600;color:var(--text2);background:var(--surface2);text-align:left;}

  /* ── NO DATA ── */
  .no-data{padding:40px;text-align:center;color:var(--text3);font-size:14px;}

  /* ── TARGET vs ACHIEVEMENT ── */
  .ta-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-bottom:8px;}
  .ta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px;}
  .ta-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(150deg,#fff,#f5f8fb);}
  .ta-hero-month{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--blue);}
  .ta-ring{position:relative;width:160px;height:160px;border-radius:50%;display:grid;place-items:center;}
  .ta-ring::after{content:"";position:absolute;inset:14px;background:var(--surface);border-radius:50%;box-shadow:inset 0 1px 4px rgba(0,0,0,.05);}
  .ta-ring-in{position:relative;z-index:1;text-align:center;}
  .ta-ring-pct{font-size:34px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .ta-ring-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-top:3px;}
  .ta-hero-fig{display:flex;gap:18px;width:100%;justify-content:center;border-top:1px dashed var(--border2);padding-top:13px;}
  .ta-fig{text-align:center;}
  .ta-fig .v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);}
  .ta-fig .k{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:2px;}
  .ta-fig.actual .v{color:var(--accent);} .ta-fig.target .v{color:var(--blue);}
  .ta-bars-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .ta-bars-title{font-size:13px;font-weight:700;color:var(--text);}
  .ta-bars-legend{font-size:10.5px;color:var(--text3);display:flex;gap:12px;}
  .ta-bars-legend i{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:-1px;margin-right:4px;}
  .ta-row{display:grid;grid-template-columns:90px 1fr 128px;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);}
  .ta-row:last-child{border-bottom:none;}
  .ta-row.tot{border-top:2px solid var(--border2);margin-top:3px;padding-top:10px;}
  .ta-zname{font-size:12.5px;font-weight:700;color:var(--text);}
  .ta-row.tot .ta-zname{color:var(--blue-dark);}
  .ta-track{position:relative;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .ta-fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px 0 0 5px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .ta-fill.green{background:linear-gradient(90deg,#a9dabf,#88c9a6);} .ta-fill.amber{background:linear-gradient(90deg,#f2dda8,#ebcb88);} .ta-fill.red{background:linear-gradient(90deg,#ecbcbf,#e09ca0);}
  .ta-tmark{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text2);opacity:.5;}
  .ta-tmark::after{content:"T";position:absolute;top:-13px;left:-3px;font-size:8px;font-weight:800;color:var(--text3);}
  .ta-metrics{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
  .ta-ach{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;min-width:46px;text-align:right;}
  .ta-ach.green{color:var(--green);} .ta-ach.amber{color:var(--gold);} .ta-ach.red{color:var(--red);}
  .ta-av{font-size:10.5px;color:var(--text2);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;}
  @media(max-width:760px){.ta-grid{grid-template-columns:1fr;}.ta-row{grid-template-columns:64px 1fr 110px;}}

  /* ── KPI TAB ── */
  .kpi-bar{display:flex;flex-direction:column;gap:11px;background:linear-gradient(115deg,#eaf2fa,#e6eff7 60%,#dde9f4);border:1px solid #cbdcec;border-radius:var(--r);padding:12px 16px;box-shadow:var(--shadow);margin-bottom:16px;position:sticky;top:126px;z-index:85;}
  .kpi-bar-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .kpi-bar-title{display:flex;align-items:center;gap:9px;font-family:'Playfair Display',serif;font-size:16px;color:var(--blue-dark);}
  .kpi-bar-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-light);}
  .kpi-filters{display:flex;align-items:flex-end;gap:9px;flex-wrap:wrap;}
  .kpi-fg{display:flex;flex-direction:column;gap:3px;}
  .kpi-flabel{font-size:9.5px;font-weight:700;color:#6f8aa3;text-transform:uppercase;letter-spacing:.5px;}
  .kpi-select{min-width:96px;padding:6px 9px;font-size:12px;background:var(--surface);border-color:#cbdcec;}
  .kpi-reset{align-self:flex-end;padding:6px 12px;border:1px solid #cbdcec;background:var(--surface);color:var(--blue-dark);border-radius:var(--rs);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .18s;}
  .kpi-reset:hover{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);}

  .kpi-metric-toggle{display:flex;flex-wrap:wrap;gap:6px;padding-top:10px;border-top:1px solid #cdddec;}
  .kpi-mpill{padding:5px 12px;border:1px solid #c4d6e6;background:rgba(255,255,255,.75);color:#4a6175;border-radius:18px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .16s;user-select:none;}
  .kpi-mpill:hover{border-color:var(--accent);color:var(--accent);background:#fff;}
  .kpi-mpill.active{background:linear-gradient(135deg,#c8474d,#b83c42);color:#fff;border-color:transparent;box-shadow:0 2px 7px rgba(184,60,66,.30);}

  /* KPI report — modern ERP table */
  .kpi-report-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
    background:linear-gradient(115deg,#eaf2fa 0%,#e6eff7 60%,#dde9f4 100%);border:1px solid #cbdcec;border-bottom:none;
    border-radius:var(--r) var(--r) 0 0;padding:16px 22px;color:var(--blue-dark);box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .kpi-report-head::after{content:"";position:absolute;right:-40px;top:-60px;width:220px;height:220px;
    background:radial-gradient(circle,rgba(43,90,126,.07),transparent 70%);pointer-events:none;}
  .kpi-rh-left{display:flex;flex-direction:column;gap:3px;z-index:1;}
  .kpi-rh-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;letter-spacing:-.2px;color:var(--blue-dark);display:flex;align-items:center;gap:10px;}
  .kpi-rh-title .dotg{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-light);}
  .kpi-rh-sub{font-size:11.5px;color:#5b7691;letter-spacing:.3px;}
  .kpi-chips{display:flex;gap:8px;flex-wrap:wrap;z-index:1;}
  .kpi-chip{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,.7);border:1px solid #cbdcec;
    border-radius:10px;padding:7px 14px;}
  .kpi-chip .ck{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:#7790a8;font-weight:700;}
  .kpi-chip .cv{font-size:14px;font-weight:700;color:var(--blue-dark);font-variant-numeric:tabular-nums;}

  /* search box */
  .kpi-search-fg{min-width:170px;max-width:230px;}
  .kpi-search-wrap{position:relative;display:flex;align-items:center;}
  .kpi-search-ic{position:absolute;left:9px;font-size:13px;color:var(--text3);pointer-events:none;}
  .kpi-searchbox{width:100%;padding:6px 10px 6px 27px;border:1px solid #cbdcec;border-radius:var(--rs);
    background:var(--surface);color:var(--text);font-family:inherit;font-size:12px;transition:all .18s;}
  .kpi-searchbox:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}
  .kpi-searchbox::placeholder{color:var(--text3);}

  /* zone-summary section header */
  .kpi-zone-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--gold-light);border:1px solid #ecd9a6;border-bottom:none;
    border-radius:var(--r) var(--r) 0 0;padding:12px 20px;margin-top:4px;}
  .kpi-zone-head .zt{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:9px;}
  .kpi-zone-head .zt .dotg{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(184,137,46,.18);}
  .kpi-zone-head .zsub{font-size:11px;color:#9a7d3c;letter-spacing:.2px;}
  .kpi-section-gap{margin-bottom:22px;}

  .kpi-table-wrap{background:var(--surface);border:1px solid var(--border2);border-top:none;border-radius:0 0 var(--r) var(--r);
    overflow:auto;max-height:70vh;box-shadow:var(--shadow-md);}
  table.kpi-rep{border-collapse:separate;border-spacing:0;font-size:12px;white-space:nowrap;width:100%;}
  table.kpi-rep th,table.kpi-rep td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);}

  /* group header row — bold colored bands */
  table.kpi-rep thead tr.grp th{position:sticky;top:0;z-index:8;height:38px;font-size:12px;font-weight:800;
    text-transform:uppercase;letter-spacing:.7px;text-align:center;color:#fff;border-bottom:none;
    text-shadow:0 1px 1px rgba(0,0,0,.18);}
  /* sub header row — light tinted period labels */
  table.kpi-rep thead tr.sub th{position:sticky;top:38px;z-index:8;font-size:11px;font-weight:700;letter-spacing:.2px;
    border-bottom:2px solid var(--border2);}
  table.kpi-rep thead tr.sub th.ly{font-weight:600;opacity:.78;}

  /* sticky dimension columns */
  table.kpi-rep th.dim,table.kpi-rep td.dim{text-align:left;position:sticky;z-index:5;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  table.kpi-rep thead tr.grp th.dim{z-index:10;background:linear-gradient(160deg,#5b7686,#456070);color:#fff;
    font-family:'Playfair Display',serif;font-size:14px;font-weight:700;letter-spacing:.3px;text-transform:none;
    text-align:left;box-shadow:inset 0 -3px 0 var(--accent);}
  table.kpi-rep thead tr.sub th.dim{z-index:10;background:#eef1f0;color:#33464d;font-size:10.5px;
    font-weight:800;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--accent);}
  table.kpi-rep td.dim{background:var(--surface);font-weight:600;color:var(--text);font-size:12px;}
  table.kpi-rep td.dim.muted{color:var(--text2);font-weight:500;}
  table.kpi-rep td.dim.last{box-shadow:2px 0 0 var(--border2);} /* divider after store block */
  table.kpi-rep td.dim.code{font-family:'DM Sans';font-weight:700;color:var(--blue-dark);}
  table.kpi-rep td.dim.name{font-weight:700;color:var(--text);}
  /* combined Store column — code label on top, full store name wrapped beneath */
  table.kpi-rep td.dim.store{white-space:normal;line-height:1.3;padding-top:7px;padding-bottom:7px;vertical-align:middle;}
  table.kpi-rep td.dim.store .ksc{display:block;font-family:'DM Sans';font-weight:700;color:var(--blue-dark);font-size:10.5px;letter-spacing:.3px;margin-bottom:1px;}
  table.kpi-rep td.dim.store .ksn{display:block;font-weight:700;color:var(--text);font-size:12px;word-break:break-word;}

  /* body number cells */
  table.kpi-rep td.cy{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
  table.kpi-rep td.ly{color:var(--text3);font-weight:500;font-variant-numeric:tabular-nums;}

  /* zebra striping (works with sticky dim cells) */
  table.kpi-rep tbody tr:nth-child(odd) td{background:var(--surface);}
  table.kpi-rep tbody tr:nth-child(even) td{background:#f6f4ef;}
  table.kpi-rep tbody tr:nth-child(even) td.dim{background:#f0ede7;}
  table.kpi-rep tbody tr:nth-child(odd) td.dim{background:var(--surface);}
  /* hover */
  table.kpi-rep tbody tr:hover td{background:#eef5f0;}
  table.kpi-rep tbody tr:hover td.dim{background:#e3efe7;}
  table.kpi-rep tbody tr td{transition:background .12s;}
  /* grand-total row */
  table.kpi-rep tbody tr.total-row td{background:#dbe8f5 !important;color:var(--blue-dark);font-weight:800;
    border-top:2px solid var(--blue-dark);font-variant-numeric:tabular-nums;}
  table.kpi-rep tbody tr.total-row td.dim{background:#cce0f2 !important;font-family:'DM Sans';letter-spacing:.4px;text-transform:uppercase;font-size:11.5px;}
  table.kpi-rep tbody tr.total-row td.ly{color:#5b7691;font-weight:700;}

  /* group separators (vertical rules) */
  table.kpi-rep th.gstart,table.kpi-rep td.gstart{border-left:2px solid var(--border2);}
  table.kpi-rep td.dim.first{border-left:none;}

  .kpi-note{margin-top:10px;font-size:11px;color:var(--text3);line-height:1.6;padding:0 4px;}
  .kpi-note b{color:var(--text2);}
  .kpi-legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:10px 4px 0;font-size:11px;color:var(--text3);}
  .kpi-legend .lg{display:flex;align-items:center;gap:6px;}
  .kpi-legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block;}
  @media(max-width:768px){.kpi-bar{flex-direction:column;align-items:stretch;}.kpi-select{min-width:0;width:100%;}.kpi-report-head{flex-direction:column;align-items:flex-start;}}

  /* ── DASHBOARD CONTENT (hidden until data loaded) ── */
  #dashboardContent{display:none;}
  #dashboardContent.visible{display:block;animation:slideUp .4s ease;}

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    .top-bar{padding:0 16px;height:54px;}
    .filter-bar{padding:8px 16px;}
    .main{padding:16px;}
    .brand-divider,.brand-title{display:none;}
  }

  /* ===== Split-screen login showcase (6 rows, alternating marquee) ===== */
  .lp-showcase{position:relative;flex:1 1 58%;min-width:0;height:100%;overflow:hidden;
    background:radial-gradient(120% 90% at 8% 0%,#eef4fa 0,transparent 55%),radial-gradient(120% 100% at 100% 100%,#fdf3ea 0,transparent 50%),var(--bg);}
  .lp-rows{position:absolute;inset:0;height:100%;display:grid;grid-template-rows:repeat(6,1fr);overflow:hidden;
    -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 6%,#000 94%,transparent 100%);
            mask-image:linear-gradient(180deg,transparent 0,#000 6%,#000 94%,transparent 100%);}
  .lp-row{position:relative;min-height:0;overflow:hidden;display:flex;align-items:center;}
  .lp-track{display:flex;align-items:center;width:max-content;will-change:transform;}
  .lp-row.left  .lp-track{animation:lpLeft  var(--dur,56s) linear infinite;}
  .lp-row.right .lp-track{animation:lpRight var(--dur,56s) linear infinite;}
  .lp-tile{flex:0 0 auto;margin-right:14px;height:calc((100vh / 6) - 14px);height:calc((100dvh / 6) - 14px);
    aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:#fff;border:1px solid rgba(30,28,24,.06);
    box-shadow:0 6px 20px rgba(30,28,24,.08),0 1px 3px rgba(30,28,24,.05);}
  .lp-tile img{width:100%;height:100%;object-fit:cover;display:block;}
  @keyframes lpLeft {from{transform:translateX(0)}    to{transform:translateX(-50%)}}
  @keyframes lpRight{from{transform:translateX(-50%)} to{transform:translateX(0)}}
  .lp-showcase::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,transparent 62%,rgba(255,255,255,.55) 86%,#fff 100%);}
  /* ===== RIGHT AUTH PANEL — "Deep Aurora Glass" redesign ===== */
  .lp-auth{flex:0 0 42%;max-width:560px;min-width:400px;height:100%;position:relative;overflow:hidden;z-index:2;
    display:flex;align-items:center;justify-content:center;padding:40px;
    background:
      radial-gradient(135% 110% at 100% -10%, #34b0ef 0%, rgba(52,176,239,0) 46%),
      radial-gradient(120% 120% at -10% 110%, #06304e 0%, rgba(6,48,78,0) 52%),
      linear-gradient(155deg, #0a3a5e 0%, #12568a 48%, #1d81c4 100%);
    box-shadow:-22px 0 60px rgba(6,28,46,.35);}
  /* luminous fine grid + soft vignette over the panel */
  .lp-auth::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:54px 54px;
    -webkit-mask-image:radial-gradient(120% 90% at 50% 28%, #000 0%, transparent 78%);
            mask-image:radial-gradient(120% 90% at 50% 28%, #000 0%, transparent 78%);}
  /* slowly rotating conic halo ring centred behind the card */
  .lp-orbit{position:absolute;z-index:0;width:118%;aspect-ratio:1;left:50%;top:50%;
    transform:translate(-50%,-50%);pointer-events:none;border-radius:50%;opacity:.55;filter:blur(6px);
    background:conic-gradient(from 0deg, rgba(126,214,255,0), rgba(126,214,255,.55), rgba(70,227,210,0) 34%, rgba(170,228,255,.5) 60%, rgba(126,214,255,0) 100%);
    -webkit-mask:radial-gradient(circle, transparent 39%, #000 40%, #000 60%, transparent 61%);
            mask:radial-gradient(circle, transparent 39%, #000 40%, #000 60%, transparent 61%);
    animation:lpOrbit 34s linear infinite;}
  @keyframes lpOrbit{to{transform:translate(-50%,-50%) rotate(360deg);}}
  /* drifting aurora blobs (brand blues + cyan/teal) */
  .lp-aura{position:absolute;inset:-15%;pointer-events:none;z-index:0;}
  .lp-aura span{position:absolute;display:block;border-radius:50%;filter:blur(70px);opacity:.65;will-change:transform;mix-blend-mode:screen;}
  .lp-aura span:nth-child(1){width:48%;aspect-ratio:1;top:-8%;right:-6%;background:radial-gradient(circle at 30% 30%, #8fe0ff, #1d81c4 70%);animation:lpDrift1 18s ease-in-out infinite;}
  .lp-aura span:nth-child(2){width:44%;aspect-ratio:1;bottom:-10%;left:-8%;background:radial-gradient(circle at 40% 40%, #46e3d2, #0d6e8a 72%);animation:lpDrift2 22s ease-in-out infinite;}
  .lp-aura span:nth-child(3){width:40%;aspect-ratio:1;top:36%;left:28%;background:radial-gradient(circle at 50% 50%, #bfe9ff, #3a9bd6 75%);opacity:.45;animation:lpDrift3 26s ease-in-out infinite;}
  @keyframes lpDrift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-9%,11%) scale(1.14)}}
  @keyframes lpDrift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(11%,-9%) scale(1.16)}}
  @keyframes lpDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(7%,-7%) scale(.9)}}

  /* frosted glass card */
  .lp-card{position:relative;z-index:2;width:100%;max-width:386px;display:flex;flex-direction:column;overflow:hidden;
    background:linear-gradient(168deg, rgba(255,255,255,.95), rgba(247,251,255,.85));
    -webkit-backdrop-filter:blur(30px) saturate(180%);backdrop-filter:blur(30px) saturate(180%);
    border:1px solid rgba(255,255,255,.9);border-radius:26px;padding:30px 36px 30px;
    box-shadow:0 34px 90px rgba(5,26,44,.5),0 8px 26px rgba(5,26,44,.28),inset 0 1px 0 rgba(255,255,255,.95);
    animation:lpRise .7s cubic-bezier(.16,1,.3,1) both;}
  /* animated gradient accent strip across the card top */
  .lp-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,#1d81c4,#34b0ef,#46e3d2,#1d81c4);background-size:200% 100%;
    animation:lpStrip 6s linear infinite;}
  @keyframes lpStrip{to{background-position:200% 0;}}

  .lp-badge{align-self:flex-start;display:inline-flex;align-items:center;gap:7px;
    font-size:10.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;
    color:#1366a0;background:rgba(29,129,196,.1);border:1px solid rgba(29,129,196,.22);
    padding:5px 11px;border-radius:999px;margin:8px 0 16px;}
  .lp-badge b{width:6px;height:6px;border-radius:50%;background:#2bb24c;box-shadow:0 0 0 3px rgba(43,178,76,.18);}
  .lp-heading{font-size:23px;font-weight:700;color:#10324c;letter-spacing:-.3px;line-height:1.12;}
  .lp-sub{font-size:13.5px;color:#5b748a;margin-top:6px;margin-bottom:22px;line-height:1.4;}

  .lp-field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;}
  .lp-field label{font-size:11px;font-weight:700;color:#1366a0;letter-spacing:.5px;text-transform:uppercase;}
  .lp-input{position:relative;display:flex;align-items:center;}
  .lp-input svg{position:absolute;left:13px;width:17px;height:17px;color:#7c93a6;pointer-events:none;transition:color .2s;}
  .lp-input input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid #d7e1ea;border-radius:11px;
    font-size:14px;font-family:inherit;outline:none;background:rgba(255,255,255,.85);color:#10324c;
    transition:border-color .2s, box-shadow .2s, background .2s;}
  .lp-input input::placeholder{color:#9fb0bf;}
  .lp-input input:focus{border-color:#1d81c4;background:#fff;box-shadow:0 0 0 4px rgba(29,129,196,.16);}
  .lp-input:focus-within svg{color:#1d81c4;}

  #loginError{font-size:13px;color:#b3261e;background:rgba(179,38,30,.08);border:1px solid rgba(179,38,30,.3);
    border-radius:10px;padding:9px 13px;text-align:center;margin-bottom:4px;}

  .lp-btn{position:relative;overflow:hidden;margin-top:8px;padding:13px;border:none;border-radius:12px;
    font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;letter-spacing:.2px;
    background:linear-gradient(135deg,#1d81c4 0%,#2596d4 55%,#34b0ef 100%);
    box-shadow:0 10px 24px rgba(29,129,196,.4),inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .15s ease, box-shadow .2s ease, filter .2s ease;}
  .lp-btn:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(29,129,196,.5),inset 0 1px 0 rgba(255,255,255,.35);filter:brightness(1.04);}
  .lp-btn:active{transform:translateY(0);}
  .lp-btn:disabled{cursor:default;filter:saturate(.7) brightness(.96);transform:none;}
  .lp-btn::after{content:"";position:absolute;top:0;left:-130%;width:55%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);
    transform:skewX(-18deg);animation:lpBtnSheen 3.6s ease-in-out infinite;}
  @keyframes lpBtnSheen{0%{left:-130%}55%,100%{left:130%}}

  .lp-foot{margin-top:18px;text-align:center;font-size:11.5px;color:#7c93a6;letter-spacing:.2px;}

  @keyframes lpRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){.lp-track,.lp-aura span,.lp-orbit,.lp-card::before,.lp-btn::after{animation:none!important;}}

  /* ── REPORT 1: pill colors + Date-Basis toggle (purple) + sortable headers ── */
  .zmom-pill.v-pill.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 1px 5px rgba(184,60,66,.26);}
  .zmom-pill.met-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(43,90,126,.20);}
  .zmom-pill.meas-pill.active{background:var(--accent2);border-color:var(--accent2);color:#fff;box-shadow:0 1px 5px rgba(107,79,160,.28);}
  .db-seg{display:inline-flex;align-items:center;background:var(--surface);border:1.5px solid var(--accent2);border-radius:999px;padding:2px;gap:2px;}
  .db-opt{padding:6px 15px;border:none;background:transparent;color:var(--accent2);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:999px;transition:all .15s;white-space:nowrap;}
  .db-opt:hover{opacity:.82;}
  .db-opt.active{background:linear-gradient(135deg,#7d5fb5,#6b4fa0);color:#fff;box-shadow:0 2px 7px rgba(107,79,160,.30);}
  .bt-break{flex-basis:100%;height:0;margin:0;padding:0;}
  table.zmom thead th[data-sortcol]{cursor:pointer;user-select:none;}
  table.zmom thead th[data-sortcol]:hover{filter:brightness(.97);}
  .sort-ic{font-size:9px;margin-left:5px;opacity:.45;color:var(--blue-dark);}
  .sort-ic.on{opacity:1;}
  .r1-datecell{text-align:center;white-space:nowrap;font-size:11.5px;color:var(--text2);font-variant-numeric:tabular-nums;}

/* ════════ EXECUTIVE DASHBOARD (ex-) ════════ */

  /* ════════════════════════════════════════════════════════════════════
     EXECUTIVE DASHBOARD  (landing page · #tab-dashboard)
     All classes namespaced `ex-` to avoid collision with existing styles.
     Uses ONLY existing CSS variables, fonts (DM Sans / Playfair Display)
     and the established palette. No external libraries.
     ════════════════════════════════════════════════════════════════════ */
  #tab-dashboard{ --ex-blue:#3a6f96; --ex-blue-d:#2b5a7e; --ex-green:#2d7a4e; --ex-acc:#1a5f3a;
    --ex-purple:#6b4fa0; --ex-teal:#2a7a7a; --ex-gold:#b8892e; --ex-warm:#c97a3c; --ex-red:#b83c42; }
  .ex-wrap{ animation:slideUp .4s ease both; }
  .ex-wrap *{ font-variant-numeric:tabular-nums; }

  /* section rhythm — leans on existing .sec-header / .sec-title / .sec-badge */
  .ex-sec{ margin-top:30px; }
  .ex-sec:first-child{ margin-top:4px; }
  .ex-sub{ font-size:11.5px; color:var(--text3); font-weight:500; margin-left:2px; }
  .ex-badge-blue{ background:var(--blue-light); color:var(--blue-dark); }
  .ex-badge-green{ background:var(--green-light); color:var(--green); }
  .ex-badge-gold{ background:var(--gold-light); color:var(--gold); }
  .ex-badge-warm{ background:var(--warm-light); color:var(--warm); }
  .ex-badge-purple{ background:var(--accent2-light); color:var(--accent2); }
  .ex-badge-red{ background:var(--red-light); color:var(--red); }

  /* ── COMMAND RIBBON (health score + momentum + context) ── */
  .ex-ribbon{ display:grid; grid-template-columns:minmax(280px,1.15fr) minmax(220px,1fr) minmax(220px,1fr);
    gap:14px; margin-bottom:16px; }
  @media(max-width:1024px){ .ex-ribbon{ grid-template-columns:1fr; } }
  .ex-rcard{ position:relative; background:linear-gradient(135deg,#fff,var(--surface2)); border:1px solid var(--border);
    border-radius:var(--r); padding:18px 20px; display:flex; align-items:center; gap:18px; overflow:hidden;
    box-shadow:var(--shadow); }
  .ex-rcard.lead{ background:linear-gradient(135deg,#1a5f3a,#2b5a7e); border-color:transparent; color:#fff; }
  .ex-rcard.lead .ex-rk-label{ color:rgba(255,255,255,.78); }
  .ex-rcard.lead .ex-rk-sub{ color:rgba(255,255,255,.66); }
  .ex-ring-wrap{ position:relative; flex-shrink:0; width:96px; height:96px; }
  .ex-ring-num{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ex-ring-num b{ font-size:25px; font-weight:700; line-height:1; letter-spacing:-.5px; }
  .ex-ring-num span{ font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; opacity:.8; margin-top:3px; }
  .ex-rk-label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text3); }
  .ex-rk-head{ font-family:'Playfair Display',serif; font-size:18px; font-weight:700; margin:5px 0 6px; line-height:1.15; }
  .ex-rk-sub{ font-size:12px; color:var(--text2); line-height:1.45; }
  .ex-momentum{ display:flex; flex-direction:column; gap:9px; flex:1; min-width:0; }
  .ex-mom-bars{ display:flex; align-items:flex-end; gap:4px; height:42px; }
  .ex-mom-bars i{ flex:1; border-radius:3px 3px 0 0; background:var(--blue-light); min-height:4px; transition:height .3s; }
  .ex-mom-bars i.hot{ background:var(--blue-grad); }
  .ex-pill-inline{ display:inline-flex; align-items:center; gap:5px; padding:4px 9px; border-radius:20px;
    font-size:11px; font-weight:700; }

  /* ── HERO KPI TILES ── */
  .ex-kpis{ display:grid; grid-template-columns:repeat(6,1fr); gap:13px; }
  @media(max-width:1280px){ .ex-kpis{ grid-template-columns:repeat(3,1fr); } }
  @media(max-width:680px){ .ex-kpis{ grid-template-columns:repeat(2,1fr); } }
  .ex-kpi{ position:relative; background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:15px 16px 12px; overflow:hidden; transition:box-shadow .22s ease,transform .22s ease,border-color .22s;
    border-top:3px solid var(--kc,var(--blue)); }
  .ex-kpi:hover{ box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .ex-kpi-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:11px; }
  .ex-kpi-label{ font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.6px;
    display:flex; align-items:center; gap:6px; }
  .ex-kpi-dot{ width:7px; height:7px; border-radius:50%; background:var(--kc,var(--blue)); flex-shrink:0; }
  .ex-kpi-val{ font-size:26px; font-weight:700; line-height:1; letter-spacing:-.6px; color:var(--text); white-space:nowrap; }
  .ex-kpi-val.sm{ font-size:22px; }
  .ex-kpi-meta{ display:flex; align-items:center; gap:7px; margin-top:8px; flex-wrap:wrap; }
  .ex-kpi-prev{ font-size:11px; color:var(--text3); }
  .ex-spark{ display:block; width:100%; height:30px; margin-top:9px; }

  /* growth pill — mirrors existing .pop-growth semantics */
  .ex-g{ display:inline-flex; align-items:center; gap:3px; padding:3px 8px; border-radius:20px; font-size:11px;
    font-weight:700; line-height:1; white-space:nowrap; }
  .ex-g.up{ background:var(--green-light); color:var(--green); }
  .ex-g.dn{ background:var(--red-light); color:var(--red); }
  .ex-g.na{ background:var(--surface2); color:var(--text3); border:1px solid var(--border); font-weight:600; }
  .ex-g .a{ font-size:8px; }

  /* ── PIPELINE FUNNEL ── */
  .ex-pipe{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px;
    box-shadow:var(--shadow); }
  .ex-flow{ display:flex; align-items:stretch; gap:0; flex-wrap:wrap; }
  .ex-node{ flex:1; min-width:150px; position:relative; padding:4px 8px; }
  .ex-node-top{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .ex-node-ic{ width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    background:var(--nc-l); color:var(--nc); flex-shrink:0; }
  .ex-node-ic svg{ width:16px; height:16px; }
  .ex-node-name{ font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; line-height:1.2; }
  .ex-node-val{ font-size:21px; font-weight:700; color:var(--text); line-height:1; letter-spacing:-.4px; }
  .ex-node-money{ font-size:12.5px; color:var(--text2); font-weight:600; margin-top:4px; }
  .ex-node-conv{ font-size:11px; color:var(--nc); font-weight:700; margin-top:7px; display:inline-flex; align-items:center; gap:4px; }
  .ex-node-track{ height:5px; border-radius:4px; background:var(--surface2); margin-top:9px; overflow:hidden; }
  .ex-node-fill{ height:100%; border-radius:4px; background:var(--nc); }
  .ex-arrow{ display:flex; align-items:center; color:var(--text3); padding:0 2px; font-size:18px; align-self:center; }
  @media(max-width:980px){ .ex-arrow{ display:none; } .ex-node{ min-width:46%; border:1px solid var(--border);
    border-radius:var(--rs); margin:4px; } }
  .ex-pipe-foot{ display:grid; grid-template-columns:repeat(2,1fr); gap:13px; margin-top:18px; }
  @media(max-width:680px){ .ex-pipe-foot{ grid-template-columns:1fr; } }
  .ex-out{ display:flex; align-items:center; gap:13px; padding:14px 16px; border-radius:var(--r);
    border:1px solid var(--oc-b); background:var(--oc-l); }
  .ex-out-ic{ width:38px; height:38px; border-radius:10px; background:#fff; display:flex; align-items:center;
    justify-content:center; color:var(--oc); flex-shrink:0; box-shadow:var(--shadow); }
  .ex-out-ic svg{ width:19px; height:19px; }
  .ex-out-l{ font-size:11px; font-weight:700; color:var(--oc); text-transform:uppercase; letter-spacing:.5px; }
  .ex-out-v{ font-size:19px; font-weight:700; color:var(--text); line-height:1.1; }
  .ex-out-s{ font-size:11.5px; color:var(--text2); margin-top:2px; }

  /* ── COMPARISON RIBBONS (business performance) ── */
  .ex-cmp-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:1024px){ .ex-cmp-grid{ grid-template-columns:1fr; } }
  .ex-cmp{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:17px 19px;
    box-shadow:var(--shadow); }
  .ex-cmp-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .ex-cmp-title{ font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .ex-cmp-tag{ font-size:10px; font-weight:700; color:var(--text3); }
  .ex-cmp-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0; }
  .ex-cmp-row + .ex-cmp-row{ border-top:1px dotted var(--border2); }
  .ex-cmp-k{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); font-weight:600; }
  .ex-cmp-k i{ width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .ex-cmp-vwrap{ display:flex; align-items:center; gap:9px; }
  .ex-cmp-v{ font-size:16px; font-weight:700; color:var(--text); letter-spacing:-.3px; }
  .ex-cmp-prev{ font-size:11px; color:var(--text3); }

  /* ── TREND PANEL ── */
  .ex-trend{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px;
    box-shadow:var(--shadow); }
  .ex-trend-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
  .ex-trend-pick{ display:flex; gap:4px; flex-wrap:wrap; }
  .ex-pill{ padding:6px 13px; border:1px solid var(--border2); border-radius:8px; background:var(--surface);
    color:var(--text2); font-size:11.5px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .16s; }
  .ex-pill:hover{ border-color:var(--blue); color:var(--text); }
  .ex-pill.on{ background:var(--blue-grad); color:#fff; border-color:transparent; box-shadow:0 3px 10px rgba(43,90,126,.32); }
  .ex-chart-big{ display:flex; align-items:baseline; gap:11px; margin:8px 0 2px; }
  .ex-chart-big b{ font-size:30px; font-weight:700; letter-spacing:-.8px; line-height:1; }
  .ex-chart-svg{ width:100%; height:230px; display:block; margin-top:6px; overflow:visible; }
  .ex-qbars{ display:grid; grid-template-columns:1fr; gap:0; margin-top:14px; border-top:1px solid var(--border); padding-top:14px; }
  .ex-qbars-title{ font-size:10.5px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.6px; margin-bottom:11px; }
  .ex-qrow{ display:grid; grid-template-columns:88px 1fr 84px; align-items:center; gap:11px; padding:5px 0; }
  .ex-qlabel{ font-size:11px; font-weight:600; color:var(--text2); }
  .ex-qtrack{ height:13px; background:var(--surface2); border-radius:5px; overflow:hidden; }
  .ex-qfill{ height:100%; border-radius:5px; background:linear-gradient(90deg,var(--blue),var(--blue-dark)); }
  .ex-qval{ font-size:11.5px; font-weight:700; color:var(--text); text-align:right; }

  /* ── TOP PERFORMERS ── */
  .ex-tp{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:6px 6px 10px;
    box-shadow:var(--shadow); }
  .ex-tp-tabs{ display:flex; gap:3px; padding:9px 10px 11px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .ex-tab{ padding:6px 13px; border-radius:8px; border:1px solid transparent; background:transparent; color:var(--text2);
    font-size:11.5px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .15s; }
  .ex-tab:hover{ background:var(--surface2); color:var(--text); }
  .ex-tab.on{ background:var(--accent-light); color:var(--accent); border-color:#c5e3d1; }
  .ex-tp-list{ padding:6px 6px 0; }
  .ex-trow{ display:grid; grid-template-columns:34px 1fr 120px 92px 70px; align-items:center; gap:13px;
    padding:11px 12px; border-radius:var(--rs); transition:background .15s; }
  .ex-trow:hover{ background:var(--surface2); }
  .ex-trow + .ex-trow{ border-top:1px solid var(--border); }
  .ex-rank{ width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:var(--text2); background:var(--surface2); border:1px solid var(--border); }
  .ex-rank.r1{ background:linear-gradient(135deg,#f2dda8,#e9c878); color:#7a5a12; border-color:#e0bd6a; }
  .ex-rank.r2{ background:linear-gradient(135deg,#e9e6e0,#d4cfc5); color:#5e5a52; border-color:#cabfae; }
  .ex-rank.r3{ background:linear-gradient(135deg,#f0d9c2,#dca77e); color:#7a3f1c; border-color:#d49a6c; }
  .ex-tp-id{ display:flex; align-items:center; gap:11px; min-width:0; }
  .ex-mono{ width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#fff; flex-shrink:0; letter-spacing:.3px; }
  .ex-tp-name{ font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  .ex-tp-meta{ font-size:11px; color:var(--text3); margin-top:1px; }
  .ex-contrib{ display:flex; flex-direction:column; gap:4px; }
  .ex-contrib-track{ height:7px; background:var(--surface2); border-radius:4px; overflow:hidden; }
  .ex-contrib-fill{ height:100%; border-radius:4px; }
  .ex-contrib-lbl{ font-size:10.5px; font-weight:700; color:var(--text2); }
  .ex-tp-val{ font-size:13.5px; font-weight:700; color:var(--text); text-align:right; }
  .ex-tspark{ width:62px; height:26px; display:block; margin-left:auto; }
  @media(max-width:820px){ .ex-trow{ grid-template-columns:30px 1fr 80px; } .ex-trow .ex-contrib,.ex-tspark{ display:none; } }

  /* ── BUSINESS MIX ── */
  .ex-mix-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  @media(max-width:980px){ .ex-mix-grid{ grid-template-columns:1fr; } }
  .ex-mix{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:17px 19px;
    box-shadow:var(--shadow); }
  .ex-mix-title{ font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px;
    margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
  .ex-mix-title span{ font-size:10px; color:var(--text3); font-weight:600; }
  .ex-mbar{ margin:11px 0; }
  .ex-mbar-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
  .ex-mbar-k{ font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; max-width:62%; }
  .ex-mbar-v{ font-size:12px; font-weight:700; color:var(--text2); }
  .ex-mbar-track{ height:9px; background:var(--surface2); border-radius:5px; overflow:hidden; }
  .ex-mbar-fill{ height:100%; border-radius:5px; transition:width .4s; }

  /* ── EXECUTIVE HIGHLIGHTS ── */
  .ex-hi-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:13px; }
  @media(max-width:1280px){ .ex-hi-grid{ grid-template-columns:repeat(3,1fr); } }
  @media(max-width:760px){ .ex-hi-grid{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:460px){ .ex-hi-grid{ grid-template-columns:1fr; } }
  .ex-hi{ position:relative; background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:15px 16px; overflow:hidden; transition:box-shadow .2s,transform .2s; }
  .ex-hi:hover{ box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .ex-hi::after{ content:''; position:absolute; right:-22px; top:-22px; width:72px; height:72px; border-radius:50%;
    background:var(--hc-l); opacity:.6; }
  .ex-hi-ic{ position:relative; z-index:1; width:32px; height:32px; border-radius:9px; background:var(--hc-l);
    color:var(--hc); display:flex; align-items:center; justify-content:center; margin-bottom:11px; }
  .ex-hi-ic svg{ width:17px; height:17px; }
  .ex-hi-l{ position:relative; z-index:1; font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase;
    letter-spacing:.5px; }
  .ex-hi-v{ position:relative; z-index:1; font-size:15px; font-weight:700; color:var(--text); margin:5px 0 3px;
    line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ex-hi-s{ position:relative; z-index:1; font-size:11.5px; color:var(--text2); font-weight:600; }

  /* ── OPERATIONAL HEALTH ── */
  .ex-op-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  @media(max-width:1100px){ .ex-op-grid{ grid-template-columns:repeat(3,1fr); } }
  @media(max-width:600px){ .ex-op-grid{ grid-template-columns:repeat(2,1fr); } }
  .ex-op{ background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); padding:14px 15px;
    transition:box-shadow .2s; }
  .ex-op:hover{ box-shadow:var(--shadow); }
  .ex-op-l{ font-size:9.5px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.6px;
    display:flex; align-items:center; gap:6px; }
  .ex-op-l i{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .ex-op-v{ font-size:22px; font-weight:700; color:var(--text); margin-top:9px; line-height:1; letter-spacing:-.4px; }
  .ex-op-s{ font-size:11px; color:var(--text3); margin-top:4px; }

  /* ── ALERTS ── */
  .ex-alert-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:13px; }
  @media(max-width:980px){ .ex-alert-grid{ grid-template-columns:1fr; } }
  .ex-alert{ display:flex; gap:13px; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--ac);
    border-radius:var(--rs); padding:14px 16px; box-shadow:var(--shadow); }
  .ex-alert-ic{ width:34px; height:34px; border-radius:9px; background:var(--ac-l); color:var(--ac); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; }
  .ex-alert-ic svg{ width:18px; height:18px; }
  .ex-alert-body{ min-width:0; flex:1; }
  .ex-alert-l{ font-size:11.5px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; }
  .ex-alert-count{ font-size:10px; font-weight:700; padding:1px 7px; border-radius:20px; background:var(--ac-l); color:var(--ac); }
  .ex-alert-d{ font-size:12px; color:var(--text2); margin-top:5px; line-height:1.5; }
  .ex-alert-d b{ color:var(--text); font-weight:700; }
  .ex-alert-list{ margin-top:7px; display:flex; flex-direction:column; gap:4px; }
  .ex-alert-item{ display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:11.5px; }
  .ex-alert-item span:first-child{ color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ex-alert-item b{ color:var(--text); font-weight:700; flex-shrink:0; }
  .ex-ok{ color:var(--green); font-weight:600; }

  .ex-foot{ margin:34px 0 6px; padding-top:16px; border-top:1px solid var(--border); display:flex;
    align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .ex-foot-l{ font-size:11px; color:var(--text3); }
  .ex-foot-r{ font-size:11px; color:var(--text3); font-weight:600; }

  @media(prefers-reduced-motion:reduce){ .ex-wrap,.ex-mbar-fill,.ex-contrib-fill,.ex-node-fill{ animation:none!important; transition:none!important; } }

// ═══════════════════════════════════════════════════════════════
// HELPERS:  parse / date / coerce
// ═══════════════════════════════════════════════════════════════
function str(v) { return v == null ? '' : typeof v === 'string' ? v : String(v); }
// Clean a text dimension: trim only, PRESERVE original case.
function cl(v) { return v == null ? '' : String(v).trim(); }
// Canonicalize a dimension (GT-style): trim + UPPERCASE so case/space variants
// ("The Toy Tree" / "THE TOY TREE ") collapse into one group everywhere.
function up(v) { return v == null ? '' : String(v).trim().toUpperCase(); }
function num(v) { const n = +v; return isFinite(n) ? n : 0; }

// Robust JSON parse: strips BOM, repairs "}{" joins AND empty values ("key":,  ->  "key":null).
function parseJsonText(text) {
  if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  text = (text || '').trim();
  if (!text) return null;
  try { return JSON.parse(text); }
  catch (e) {
    try {
      const fixed = text
        .replace(/\}\s*\{/g, '},{')          // missing comma between objects
        .replace(/:\s*([,}\]])/g, ':null$1'); // empty value after colon -> null
      return JSON.parse(fixed);
    } catch (e2) { return null; }
  }
}

// Date -> ISO (YYYY-MM-DD). Handles ISO strings and Excel serials.
const _dateCache = new Map();
function excelDateToISO(serial) {
  if (!serial && serial !== 0) return '';
  if (typeof serial === 'string') {
    const t = serial.trim();
    if (t === '') return '';
    if (/^\d{4}-\d{2}-\d{2}/.test(t)) return t.slice(0, 10);   // already ISO
    if (/^\d+(\.\d+)?$/.test(t)) { serial = +t; }
    else { if (t.length >= 8) { const d = new Date(t); if (!isNaN(d)) return d.toISOString().slice(0, 10); } return ''; }
  }
  let cached = _dateCache.get(serial); if (cached) return cached;
  const ms = (serial - 25569) * 86400000;
  const d = new Date(ms);
  const y = d.getUTCFullYear(), m = d.getUTCMonth() + 1, day = d.getUTCDate();
  cached = y + '-' + (m < 10 ? '0' : '') + m + '-' + (day < 10 ? '0' : '') + day;
  _dateCache.set(serial, cached);
  return cached;
}

// ═══════════════════════════════════════════════════════════════
// FORMATTING HELPERS  (USD / en-US)
// ═══════════════════════════════════════════════════════════════
function fmt(n)      { return n == null ? '—' : Number(n).toLocaleString('en-US'); }
function fmtMoney(n) { return (n == null || !isFinite(n)) ? '—' : '$' + Math.round(n).toLocaleString('en-US'); }
function fmtV(n) {
  if (n == null || !isFinite(n)) return '—';
  const a = Math.abs(n);
  if (a >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (a >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + fmt(Math.round(n));
}
function fmtPct(cur, prev) {
  if (!prev || prev === 0) return '<span class="pop-growth na">N/A</span>';
  const pct = ((cur - prev) / Math.abs(prev) * 100).toFixed(1);
  const cls = pct >= 0 ? 'up' : 'dn';
  const arrow = pct >= 0 ? '▲' : '▼';
  return `<span class="pop-growth ${cls}"><span class="g-arrow">${arrow}</span> ${Math.abs(pct)}%</span>`;
}
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' }); }

// ═══════════════════════════════════════════════════════════════
// FETCH + BUILD RAW
// ═══════════════════════════════════════════════════════════════
async function loadDashboardData() {
  setRefreshState(true);
  try {
    async function fetchSource(src) {
      const res = await fetch(src.url + '?_=' + Date.now());
      const lastModified = res.headers.get('Last-Modified') || res.headers.get('last-modified');
      const text = await res.text();
      const json = parseJsonText(text);
      if (!json) throw new Error(`Could not parse JSON from ${src.url}`);
      return { url: src.url, json, lastModified };
    }

    const fetchResults = await Promise.allSettled(API_SOURCES.map(fetchSource));

    let latestModified = null;
    for (const r of fetchResults) {
      if (r.status === 'fulfilled' && r.value.lastModified) {
        const d = new Date(r.value.lastModified);
        if (!latestModified || d > latestModified) latestModified = d;
      }
    }
    if (latestModified) {
      const lmStr = latestModified.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' }) +
                    ' ' + latestModified.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('fileTimestampVal').textContent = lmStr;
      document.getElementById('fileTimestamp').style.display = 'inline';
    }

    fetchResults.forEach((r, i) => { if (r.status === 'rejected') console.warn(`[API source ${i}] ${API_SOURCES[i]?.url} — failed:`, r.reason); });

    const parsedFiles = [];
    let totalEstimate = 0;
    for (const r of fetchResults) {
      if (r.status !== 'fulfilled') continue;
      const { json, url } = r.value;
      if (!Array.isArray(json) || json.length === 0) { console.warn(`No array data in ${url}, skipping`); continue; }
      const sample = json[0] || {};
      const hasDate = Object.prototype.hasOwnProperty.call(sample, 'order_received_dt');
      const hasSales = Object.prototype.hasOwnProperty.call(sample, 'sku_code') ||
                       Object.prototype.hasOwnProperty.call(sample, 'total_(total_po_value)');
      if (!hasDate || !hasSales) { console.warn(`No US Specialty fields found in ${url}, skipping`); continue; }
      totalEstimate += json.length;
      parsedFiles.push({ records: json, name: url.split('/').pop() });
      console.log(`Fetched ${url}: ~${json.length.toLocaleString()} rows`);
    }

    if (parsedFiles.length === 0) throw Object.assign(new Error('No compatible US Specialty data was found.'), { kind: 'incompatible' });

    RAW = new Array(totalEstimate);
    let writeIdx = 0;
    const YIELD_INTERVAL = 80000; let sinceLastYield = 0;

    for (let si = 0; si < parsedFiles.length; si++) {
      const records = parsedFiles[si].records;
      for (let ri = 0, len = records.length; ri < len; ri++) {
        const row = records[ri];
        if (!row) continue;
        if (row['order_received_dt'] == null || row['order_received_dt'] === '') continue;

        const code = up(row['sku_code']);
        const name = up(row['sku_name']);
        const product = code && name ? (code + ' - ' + name) : (code || name);

        RAW[writeIdx++] = {
          // dates
          order_dt:   excelDateToISO(row['order_received_dt']),
          dispatch_dt:excelDateToISO(row['dispatch_date']),
          expected_ship_dt: excelDateToISO(row['excepted_ship_date']),
          // period dimensions (order-based)
          order_year:    str(row['order_year']).trim(),
          order_quarter: cl(row['order_quarter']),
          order_month:   cl(row['order_month']),
          order_week:    cl(row['order_week']),
          order_monthly_week: cl(row['order_monthly_week']),
          // dispatch period dimensions (kept for later reports)
          dispatch_year:    str(row['dispatch_year']).trim(),
          dispatch_quarter: cl(row['dispatch_quarter']),
          dispatch_month:   cl(row['dispatch_month']),
          dispatch_week:    cl(row['dispatch_week']),
          dispatch_monthly_week: cl(row['dispatch_monthly_week']),
          // product
          sku_code: code,
          sku_name: name,
          product_code: product,
          brand_name: up(row['Brand']),
          // party
          retailer_name: up(row['retailer_name']),
          distributor:   up(row['sales_agency_/distributor']),
          sales_rep:     up(row['sales_representative']),
          // identifiers
          po_no:      cl(row['po_no']),
          invoice_no: cl(row['invoice_no']),
          // measures
          bill_qty:   num(row['po_bill_qty']),
          free_qty:   num(row['po_free_qty']),
          total_qty:  num(row['po_total_qty']),
          order_qty:  num(row['total_order_qty']),
          rate:       num(row['po_rate']),
          disc_rate:  num(row['discounted_rate']),
          value:      num(row['total_(total_po_value)']),
          back_order_qty:  num(row['back_order_qty']),
          back_order_rate: num(row['back_order_rate']),
          final_remark: cl(row['final_remark_helper'])
        };

        if (++sinceLastYield >= YIELD_INTERVAL) { sinceLastYield = 0; await yieldToUI(); }
      }
      parsedFiles[si].records = null;
    }
    if (writeIdx < RAW.length) RAW.length = writeIdx;
    console.log('Total RAW rows:', RAW.length);
    _dateCache.clear();

    if (RAW.length === 0) throw Object.assign(new Error('No valid rows found.'), { kind: 'incompatible' });

    document.getElementById('dashboardContent').style.display = 'block';
    document.getElementById('dashboardContent').classList.add('visible');
    await yieldToUI();
    initializeDashboard();

    setRefreshState(false);
    showLiveIndicator();

  } catch (error) {
    console.error('Dashboard Load Error:', error);
    setRefreshState(false);
    if (error && error.kind === 'incompatible')
      finishLoading('error', 'Data not compatible', "We couldn't find US Specialty data. Please check your API source.");
    else
      finishLoading('error', 'Something went wrong', "We couldn't load your dashboard. Please check your connection and try again.");
    setTimeout(() => {
      const loadOv = document.getElementById('loadingOverlay');
      loadOv.style.opacity = '0';
      setTimeout(() => { loadOv.style.display = 'none'; }, 500);
    }, 4000);
    throw error;
  }
}

function yieldToUI() { return new Promise(resolve => setTimeout(resolve, 0)); }

// ═══════════════════════════════════════════════════════════════
// LOADING OVERLAY ENGINE  (progress ring + comet + staged messages)
// ═══════════════════════════════════════════════════════════════
let _msgTO = null;
function setLoadingMsg(main, sub, instant) {
  const s = document.getElementById('loadingStatus');
  const ss = document.getElementById('loadingSubStatus');
  if (_msgTO) { clearTimeout(_msgTO); _msgTO = null; }
  const apply = () => { if (s) { s.textContent = main; s.style.opacity = '1'; } if (ss) { ss.textContent = sub || ''; ss.style.opacity = '1'; } };
  if (instant) { apply(); return; }
  if (s) s.style.opacity = '0'; if (ss) ss.style.opacity = '0';
  _msgTO = setTimeout(apply, 180);
}

const LOADING_STAGES = [
  { p: 6,  main: 'Establishing secure connection', sub: 'Authenticating your session' },
  { p: 22, main: 'Connecting to data source',       sub: 'Reaching the US specialty accounts layer' },
  { p: 44, main: 'Retrieving order data',           sub: 'Streaming purchase orders across all periods' },
  { p: 66, main: 'Consolidating datasets',          sub: 'Unifying retailers, products & reps' },
  { p: 83, main: 'Computing metrics',               sub: 'Aggregating orders, products & parties' },
  { p: 93, main: 'Finalizing your dashboard',       sub: 'Preparing your workspace' },
];
const _LOAD_CAP = 96;
const _LOAD_CIRC = 2 * Math.PI * 50;
let _loadCycle = null, _loadProgress = 0, _loadStageIdx = -1;

function _renderLoadSteps() {
  const host = document.getElementById('loadingSteps');
  if (!host) return;
  host.innerHTML = LOADING_STAGES.map(() => '<div class="lstep"><div class="lstep-fill"></div></div>').join('');
}
function _paintLoadProgress() {
  const p = _loadProgress;
  const arc = document.getElementById('loadArc'), comet = document.getElementById('loadComet'), pct = document.getElementById('loadingPct');
  if (arc) arc.style.strokeDashoffset = (_LOAD_CIRC * (1 - p / 100)).toFixed(2);
  if (comet) comet.style.transform = 'rotate(' + (p * 3.6) + 'deg)';
  if (pct) pct.textContent = Math.round(p);
  let idx = 0;
  for (let i = 0; i < LOADING_STAGES.length; i++) { if (p >= LOADING_STAGES[i].p) idx = i; }
  if (idx !== _loadStageIdx) { _loadStageIdx = idx; setLoadingMsg(LOADING_STAGES[idx].main, LOADING_STAGES[idx].sub); }
  document.querySelectorAll('#loadingSteps .lstep').forEach((el, i) => { el.classList.toggle('on', i <= _loadStageIdx); });
}
function resetLoadingVisual() {
  _loadProgress = 0; _loadStageIdx = -1;
  const arc = document.getElementById('loadArc'), comet = document.getElementById('loadComet'), pct = document.getElementById('loadingPct');
  const numEl = document.querySelector('.load-num'), check = document.getElementById('loadCheck'), s = document.getElementById('loadingStatus');
  if (arc) { arc.style.transition = ''; arc.style.stroke = 'url(#loadGrad)'; arc.style.strokeDashoffset = _LOAD_CIRC.toFixed(2); }
  if (comet) { comet.style.transition = ''; comet.style.transform = 'rotate(0deg)'; comet.style.display = ''; }
  if (pct) { pct.style.color = ''; pct.textContent = '0'; }
  if (numEl) numEl.style.display = 'flex';
  if (check) { check.style.display = 'none'; check.classList.remove('draw'); }
  if (s) s.style.color = '';
  _renderLoadSteps();
  setLoadingMsg(LOADING_STAGES[0].main, LOADING_STAGES[0].sub, true);
}
function startLoadingCycle() {
  stopLoadingCycle();
  if (_loadProgress < 2) _loadProgress = 2;
  _paintLoadProgress();
  _loadCycle = setInterval(() => {
    _loadProgress += Math.max(0.12, (_LOAD_CAP - _loadProgress) * 0.012);
    if (_loadProgress > _LOAD_CAP) _loadProgress = _LOAD_CAP;
    _paintLoadProgress();
  }, 30);
}
function stopLoadingCycle() { if (_loadCycle) { clearInterval(_loadCycle); _loadCycle = null; } }
function finishLoading(state, main, sub) {
  stopLoadingCycle();
  const arc = document.getElementById('loadArc'), comet = document.getElementById('loadComet'), pct = document.getElementById('loadingPct');
  const numEl = document.querySelector('.load-num'), check = document.getElementById('loadCheck'), s = document.getElementById('loadingStatus');
  if (state === 'success') {
    _loadProgress = 100;
    if (arc) arc.style.transition = 'stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)';
    if (comet) comet.style.transition = 'transform .6s cubic-bezier(.4,0,.2,1)';
    _paintLoadProgress();
    document.querySelectorAll('#loadingSteps .lstep').forEach(el => el.classList.add('on'));
    setLoadingMsg(main, sub);
    setTimeout(() => {
      if (comet) comet.style.display = 'none';
      if (numEl) numEl.style.display = 'none';
      if (check) { check.style.display = 'block'; void check.offsetWidth; check.classList.add('draw'); }
    }, 600);
  } else {
    if (arc) arc.style.stroke = 'var(--red)';
    if (pct) pct.style.color = 'var(--red)';
    if (s) s.style.color = 'var(--red)';
    setLoadingMsg(main, sub);
  }
}

// ═══════════════════════════════════════════════════════════════
// GLOBAL FILTER REGISTRY
//   Period : From/To date (Order Received Date) + Year / Quarter / Month
//   Product: Product (SKU) / Brand
//   Party  : Retailer Name / Sales Agency-Distributor / Sales Rep
// ═══════════════════════════════════════════════════════════════
const GROUPS = [
  { key: 'period',  label: 'Period' },
  { key: 'product', label: 'Product' },
  { key: 'party',   label: 'Party' },
];
const FILTERS = [
  // Period — date range handled separately; these are the categorical period dims
  { key: 'year',    label: 'Year',    field: 'order_year',    parents: [],                group: 'period' },
  { key: 'quarter', label: 'Quarter', field: 'order_quarter', parents: ['year'],          group: 'period' },
  { key: 'month',   label: 'Month',   field: 'order_month',   parents: ['year','quarter'],group: 'period' },
  // Product
  { key: 'product', label: 'Product', field: 'product_code',  parents: ['brand'],         group: 'product' },
  { key: 'brand',   label: 'Brand',   field: 'brand_name',    parents: [],                group: 'product' },
  // Party
  { key: 'retailer',label: 'Retailer Name',              field: 'retailer_name', parents: ['distributor'], group: 'party' },
  { key: 'distributor', label: 'Sales Agency / Distributor', field: 'distributor', parents: [],            group: 'party' },
  { key: 'salesrep',label: 'Sales Rep',                  field: 'sales_rep',     parents: ['distributor'], group: 'party' },
];
const FMAP = Object.fromEntries(FILTERS.map(f => [f.key, f]));
const PERIOD_KEYS = ['year', 'quarter', 'month'];   // skipped in prior-period comparisons (used later)
const selected = {}; FILTERS.forEach(f => selected[f.key] = new Set());
const DEPENDENTS = {}; FILTERS.forEach(f => f.parents.forEach(p => { (DEPENDENTS[p] = DEPENDENTS[p] || []).push(f.key); }));
const lastOpts = {};
let dataMinDate = '', dataMaxDate = '';
let filterTimer = null;
function debouncedApply() { if (filterTimer) clearTimeout(filterTimer); filterTimer = setTimeout(applyFilters, 150); }

// ═══════════════════════════════════════════════════════════════
// MULTI-SELECT ENGINE  (checkbox dropdown chips, grouped into segments)
// ═══════════════════════════════════════════════════════════════
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

const _MONTH_IDX = { jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11 };
function monthSortKey(value) {
  const s = String(value).trim(); let m;
  m = s.match(/([A-Za-z]{3,})[\s\-\/.,']*?(\d{2,4})/);
  if (m && _MONTH_IDX[m[1].slice(0,3).toLowerCase()] != null) { let yr = parseInt(m[2],10); if (yr < 100) yr += 2000; return yr*12 + _MONTH_IDX[m[1].slice(0,3).toLowerCase()]; }
  m = s.match(/^(\d{4})[\-\/.](\d{1,2})$/); if (m) return parseInt(m[1],10)*12 + (parseInt(m[2],10)-1);
  if (_MONTH_IDX[s.slice(0,3).toLowerCase()] != null) return _MONTH_IDX[s.slice(0,3).toLowerCase()];
  if (/^\d{1,2}$/.test(s)) return parseInt(s,10)-1;
  return null;
}
// "Q1-23" -> chronological number
function quarterSortKey(value) {
  const m = String(value).match(/Q(\d)\D*(\d{2,4})/i);
  if (!m) return null;
  let yr = parseInt(m[2],10); if (yr < 100) yr += 2000;
  return yr*4 + (parseInt(m[1],10)-1);
}
