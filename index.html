<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skillmatics Swiggy Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Nunito:ital,wght@1,700;1,800;1,900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<!-- Data is fetched from JSON files in the same folder (pure client-side JSON.parse) -->
<style>
  :root {
    --bg:#f3f1ed; --surface:#fff; --surface2:#faf9f6; --border:#e2ded6; --border2:#d4cfc5;
    --text:#1e1c18; --text2:#5e5a52; --text3:#9b958c;
    --accent:#1a5f3a; --accent-light:#e4f2eb;
    --accent2:#6b4fa0; --accent2-light:#f0ebf7;
    --warm:#c97a3c; --warm-light:#fdf0e4;
    --blue:#3a6f96; --blue-light:#e6eff7; --blue-dark:#2b5a7e; --blue-grad:linear-gradient(135deg,#3a6f96,#2b5a7e);
    --gold:#b8892e; --gold-light:#fdf5e2;
    --red:#b83c42; --red-light:#fde8ea; --dark-red:#7b1a2a; --dark-red-light:#f5e0e3;
    --green:#2d7a4e; --green-light:#e2f5ec;
    --teal:#2a7a7a; --teal-light:#e2f2f2;
    --shadow:0 1px 3px rgba(30,28,24,.07),0 4px 12px rgba(30,28,24,.04);
    --shadow-md:0 4px 16px rgba(30,28,24,.1);
    --r:12px; --rs:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── ANIMATIONS ── */
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes loadFadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes loadLogoIn{0%{opacity:0;transform:translateY(16px) scale(.93);}100%{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes loadRise{0%{opacity:0;transform:translateY(18px);}100%{opacity:1;transform:translateY(0);}}
  @keyframes orbDrift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(80px,-56px) scale(1.22);}}
  @keyframes orbDrift2{0%,100%{transform:translate(0,0) scale(1.08);}50%{transform:translate(-90px,64px) scale(.85);}}
  @keyframes orbDrift3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(54px,76px) scale(1.28);}}
  @keyframes orbDrift4{0%,100%{transform:translate(0,0) scale(1.04);}50%{transform:translate(-60px,-44px) scale(.9);}}
  @keyframes gridDrift{0%{background-position:0 0;}100%{background-position:46px 46px;}}
  @keyframes ringSpinSlow{to{transform:rotate(360deg);}}
  @keyframes checkDraw{from{stroke-dashoffset:48;}to{stroke-dashoffset:0;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  /* Product card floater animations — each drifts on its own unique path */
  @keyframes cardFloat1{0%,100%{transform:translate(0,0) rotate(-6deg);}33%{transform:translate(14px,-22px) rotate(-4deg);}66%{transform:translate(-8px,12px) rotate(-8deg);}}
  @keyframes cardFloat2{0%,100%{transform:translate(0,0) rotate(8deg);}33%{transform:translate(-18px,16px) rotate(6deg);}66%{transform:translate(10px,-14px) rotate(10deg);}}
  @keyframes cardFloat3{0%,100%{transform:translate(0,0) rotate(-3deg);}40%{transform:translate(20px,18px) rotate(-6deg);}80%{transform:translate(-12px,-8px) rotate(-1deg);}}
  @keyframes cardFloat4{0%,100%{transform:translate(0,0) rotate(5deg);}50%{transform:translate(-14px,-20px) rotate(3deg);}}
  @keyframes cardFloat5{0%,100%{transform:translate(0,0) rotate(-9deg);}45%{transform:translate(16px,14px) rotate(-11deg);}90%{transform:translate(-6px,-10px) rotate(-7deg);}}
  @keyframes cardFloat6{0%,100%{transform:translate(0,0) rotate(4deg);}35%{transform:translate(-20px,10px) rotate(6deg);}70%{transform:translate(12px,-16px) rotate(2deg);}}
  @keyframes cardFloat7{0%,100%{transform:translate(0,0) rotate(-7deg);}50%{transform:translate(18px,-12px) rotate(-5deg);}}
  @keyframes cardFloat8{0%,100%{transform:translate(0,0) rotate(11deg);}40%{transform:translate(-10px,18px) rotate(9deg);}80%{transform:translate(14px,-8px) rotate(13deg);}}
  @keyframes shimmer{0%,100%{opacity:.13;}50%{opacity:.22;}}

  /* ── ANIMATED LOADING OVERLAY ── */
  #loadingOverlay{overflow:hidden;background:#f3f1ed;}
  .load-bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}

  /* Subtle neutral dot grid only (no colored orbs) */
  .load-grid{position:absolute;inset:-50px;background-image:radial-gradient(rgba(30,28,24,.06) 1.4px, transparent 1.4px);background-size:42px 42px;animation:gridDrift 6s linear infinite;
    -webkit-mask-image:radial-gradient(ellipse 78% 74% at 50% 50%, #000 30%, transparent 88%);mask-image:radial-gradient(ellipse 78% 74% at 50% 50%, #000 30%, transparent 88%);}

  /* ── PRODUCT CARD FLOATERS ── */
  .load-cards{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .lcard{
    position:absolute;
    border-radius:18px;
    background:#f0ede7;
    box-shadow:0 10px 36px rgba(30,28,24,.14), 0 2px 6px rgba(30,28,24,.08);
    border:2px solid rgba(255,255,255,.92);
    overflow:hidden;
    will-change:transform;
  }
  .lcard img{width:100%;height:100%;object-fit:cover;display:block;}
  /* Per-card position / size / float / opacity (full-screen grid, visible from the start) */
  .lcard:nth-child(1){left:0.9%;top:-0.0%;width:184px;height:184px;animation:cardFloat1 19s ease-in-out infinite;animation-delay:-17s;opacity:0.44;}

  /* Vignette — gently fades cards near the very center so the ring + logo stay readable */
  .load-cards::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 45% 42% at 50% 50%, #f3f1ed 26%, transparent 66%);
    pointer-events:none;
  }

  /* Foreground content */
  .load-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:0 24px;}
  .load-content .load-logo,.load-content .load-ring-wrap,.load-content .load-steps{opacity:0;animation:loadRise .7s cubic-bezier(.2,.7,.2,1) forwards;}
  .load-content .load-logo{animation:loadLogoIn .85s cubic-bezier(.2,.7,.2,1) forwards;}
  .load-content .load-ring-wrap{animation-delay:.14s;}
  .load-content .load-steps{animation-delay:.42s;}

  .load-logo{margin-bottom:36px;}
  .load-logo .brand-wordmark-img{height:64px;width:auto;display:block;}
  .load-logo .brand-wordmark-text{font-size:54px;}

  .load-ring-wrap{position:relative;width:196px;height:196px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
  .load-ring{display:block;width:196px;height:196px;}
  .load-ring-deco{transform-box:view-box;transform-origin:60px 60px;animation:ringSpinSlow 18s linear infinite;}
  #loadArc{transition:stroke-dashoffset .18s linear;}
  #loadComet{transform-box:view-box;transform-origin:60px 60px;transition:transform .18s linear;filter:drop-shadow(0 0 5px rgba(26,95,58,.55));}
  .load-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:baseline;gap:2px;font-family:'Playfair Display',serif;color:var(--text);}
  .load-num #loadingPct{font-size:48px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-1.5px;}
  .load-num-pct{font-size:20px;font-weight:600;color:var(--accent);transform:translateY(-2px);}
  .load-check{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
  .load-check path{stroke-dasharray:48;stroke-dashoffset:48;}
  .load-check.draw path{animation:checkDraw .55s cubic-bezier(.6,0,.3,1) forwards;}

  .load-status{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:var(--text);text-align:center;min-height:26px;transition:opacity .26s ease;letter-spacing:.1px;}
  .load-sub{font-size:12.5px;color:var(--text3);text-align:center;margin-top:7px;min-height:17px;transition:opacity .26s ease;letter-spacing:.25px;}
  .load-steps{display:flex;align-items:center;gap:7px;width:100%;max-width:300px;margin-top:28px;}
  .lstep{flex:1;height:4px;border-radius:3px;background:var(--border2);overflow:hidden;position:relative;}
  .lstep .lstep-fill{position:absolute;inset:0;border-radius:3px;background:linear-gradient(90deg,#2d8a57,var(--accent));transform:scaleX(0);transform-origin:left;transition:transform .55s cubic-bezier(.2,.7,.2,1);}
  .lstep.on .lstep-fill{transform:scaleX(1);}
  @media (prefers-reduced-motion: reduce){
    .load-grid,.load-ring-deco,.lcard{animation:none !important;}
    .load-content .load-logo,.load-content .load-ring-wrap,.load-content .load-steps{animation:none !important;opacity:1 !important;}
    #loadComet{transition:none !important;}
  }

  /* ── TOP BAR ── */
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-name{display:flex;align-items:center;line-height:1;}
  /* Actual Skillmatics wordmark image (matches the logo exactly when online) */
  .brand-wordmark-img{height:auto;width:auto;display:block;}
  /* Text fallback styled to resemble the Skillmatics logo */
  .brand-wordmark-text{font-family:'Nunito',sans-serif;font-style:italic;font-weight:800;font-size:23px;letter-spacing:-.5px;color:#1d81c4;}
  .brand-divider{width:1px;height:24px;background:var(--border2);}
  .brand-title{font-size:16.5px;font-weight:700;color:#1d81c4;letter-spacing:-.2px;white-space:nowrap;}
  .header-right{display:flex;align-items:center;gap:0;}
  .hdr-actions{display:flex;align-items:center;gap:8px;}

  /* ── LIVE INDICATOR ── */
  .hdr-status{display:flex;align-items:center;gap:12px;padding-right:16px;border-right:1px solid var(--border);margin-right:12px;}
  .live-indicator{display:flex;align-items:center;gap:8px;padding:5px 11px;background:var(--accent-light);border:1px solid var(--accent);border-radius:20px;opacity:0;transition:opacity .4s;}
  .live-indicator.visible{opacity:1;}
  .live-dot-wrap{position:relative;width:10px;height:10px;flex-shrink:0;}
  .live-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:0;left:0;}
  .live-ring{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:0;left:0;opacity:.6;animation:liveRing 2s ease-out infinite;}
  @keyframes liveRing{0%{transform:scale(1);opacity:.6;}70%{transform:scale(2.4);opacity:0;}100%{transform:scale(2.4);opacity:0;}}
  .live-text{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}
  .last-updated{font-size:11px;color:var(--text3);}

  /* ── REFRESH BUTTON ── */
  .refresh-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;background:#e0f2f1;color:#004d40;border:1px solid #80cbc4;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .refresh-btn:hover:not(:disabled){background:#b2dfdb;border-color:#4db6ac;}
  .refresh-btn:disabled{opacity:.55;cursor:not-allowed;}
  .refresh-icon{display:inline-block;transition:transform .3s;}
  .refresh-btn.spinning .refresh-icon{animation:spin .7s linear infinite;}

  /* ── LOGOUT BUTTON ── */
  .logout-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:none;color:var(--text2);border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .logout-btn:hover{background:var(--red-light);color:var(--red);border-color:var(--red);}
  .logout-btn svg{flex-shrink:0;}

  /* ── FILTER BAR ── */
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:60px;z-index:96;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .filter-group{display:flex;align-items:center;gap:7px;}
  .filter-label{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;}
  .filter-select{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none;transition:border-color .2s;min-width:100px;}
  .filter-select:focus{border-color:var(--accent);}
  .date-input{padding:7px 9px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
  .date-input:focus{border-color:var(--accent);}
  .filter-sep{width:1px;height:22px;background:var(--border2);}
  .btn-reset{padding:7px 13px;background:var(--warm-light);color:var(--warm);border:1px solid var(--warm);border-radius:var(--rs);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:all .2s;}
  .btn-reset:hover{background:var(--warm);color:#fff;}

  /* Multi-select dropdown */
  .ms-wrap{position:relative;}
  .ms-trigger{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none;min-width:120px;max-width:200px;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none;transition:border-color .2s;}
  .ms-trigger.open{border-color:var(--accent);}
  .ms-trigger > span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ms-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);min-width:220px;max-width:340px;}
  .ms-panel.open{display:block;}
  .ms-search{width:100%;padding:10px 12px;border:none;border-bottom:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;background:var(--surface2);border-radius:var(--r) var(--r) 0 0;}
  .ms-list{max-height:220px;overflow-y:auto;padding:4px 0;}
  .ms-item{display:flex;align-items:center;gap:9px;padding:6px 13px;cursor:pointer;transition:background .12s;font-size:13px;}
  .ms-item:hover{background:var(--bg);}
  .ms-item input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0;}
  .ms-actions{padding:7px 11px;border-top:1px solid var(--border);display:flex;gap:6px;}
  .ms-action-btn{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .12s;font-family:inherit;}
  .ms-action-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* ── COMPACT SEGMENTED FILTERS ── */
  .fbar{display:flex;align-items:center;gap:9px;width:100%;flex-wrap:wrap;}
  /* A labelled segment groups related filters (Period / Location / Product) */
  .seg{display:flex;align-items:center;gap:7px;padding:5px 9px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);}
  .seg-period{background:linear-gradient(135deg,#eef4fb,#e1ecf8);border-color:#cfe0f0;}
  .seg-location{background:linear-gradient(135deg,#ecf6f0,#dcefe4);border-color:#c5e3d1;}
  .seg-product{background:linear-gradient(135deg,#fdf4e6,#fbe9cf);border-color:#efdcb4;}
  .seg-period .seg-label{color:#2b5a7e;} .seg-location .seg-label{color:#1a6f47;} .seg-product .seg-label{color:#9a6f1f;}
  .seg-label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
  .seg-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .fbar-spacer{flex:1;}
  .fbar-records{font-size:11px;color:var(--text3);white-space:nowrap;}

  /* One-click multi-select chip */
  .mc{position:relative;}
  .mc-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .mc-btn:hover{border-color:var(--accent);color:var(--text);}
  .mc-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .mc-btn.open{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);}
  .mc-badge{display:none;align-items:center;justify-content:center;min-width:15px;height:15px;padding:0 4px;border-radius:8px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;}
  .mc-badge.show{display:inline-flex;}
  .mc-chev{font-size:8px;color:var(--text3);}
  .mc-btn.active .mc-chev{color:var(--accent);}
  .mc-panel{display:none;position:absolute;top:calc(100% + 5px);left:0;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);width:250px;max-width:84vw;}
  .mc-panel.open{display:block;animation:fadeIn .14s ease;}
  /* compact date inputs inside Period segment */
  .mc-date{padding:4px 7px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:all .15s;}
  .mc-date:hover{border-color:var(--accent);}
  .mc-date.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .mc-dlbl{font-size:10px;font-weight:600;color:var(--text3);}
  .mc-dash{color:var(--text3);font-size:12px;}

  /* ── MAIN ── */
  .main{padding:22px 28px;}

  /* ── SECTION HEADERS ── */
  .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:28px;}
  .sec-header:first-of-type{margin-top:0;}
  .sec-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);display:flex;align-items:center;gap:9px;}
  .sec-badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:.4px;text-transform:uppercase;}

  /* ── TAB NAVIGATION ── */
  .tab-nav-sticky{position:sticky;top:60px;z-index:95;background:var(--bg);padding:7px 0;margin-bottom:9px;}
  .tab-nav{display:inline-flex;gap:3px;padding:4px;background:linear-gradient(180deg,#fbfaf7,#f1eee8);border:1px solid var(--border2);border-radius:12px;box-shadow:0 2px 10px rgba(40,30,15,.06),inset 0 1px 0 #fff;}
  .tab-btn{position:relative;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid transparent;background:transparent;color:var(--text2);font-size:11.5px;font-weight:600;font-family:inherit;cursor:pointer;border-radius:9px;transition:color .18s,background .18s,box-shadow .2s,border-color .18s,transform .12s;white-space:nowrap;overflow:hidden;}
  .tab-ic{width:14px;height:14px;flex-shrink:0;opacity:.6;transition:opacity .18s,transform .2s;}
  .tab-btn:hover{color:var(--text);background:var(--surface);border-color:var(--border2);transform:translateY(-1px);box-shadow:0 3px 9px rgba(40,30,15,.10);}
  .tab-btn:hover .tab-ic{opacity:.9;}
  .tab-btn.active{color:#fff;background:var(--blue-grad);border-color:transparent;box-shadow:0 4px 14px rgba(43,90,126,.38),inset 0 1px 0 rgba(255,255,255,.22);}
  .tab-btn.active .tab-ic{opacity:1;}
  .tab-btn.active::before{content:"";position:absolute;inset:0;border-radius:9px;padding:1px;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .tab-btn.active:hover{color:#fff;transform:translateY(-1px);box-shadow:0 6px 18px rgba(43,90,126,.46),inset 0 1px 0 rgba(255,255,255,.22);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .25s ease;}
  @media(max-width:768px){.tab-nav{display:flex;width:100%;overflow-x:auto;}.tab-btn{padding:8px 12px;font-size:12px;flex:1;justify-content:center;}.tab-btn span{display:none;}.tab-ic{opacity:.9;}}

  /* ── EXECUTIVE KPI CARDS (multi-value) ── */
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  @media(max-width:1024px){.kpi-grid{grid-template-columns:1fr;}}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;transition:box-shadow .2s;}
  .kpi-card:hover{box-shadow:var(--shadow);}
  .kpi-card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:13px;}
  .kpi-row{display:flex;align-items:stretch;}
  .kpi-col{flex:1;display:flex;flex-direction:column;gap:5px;padding:0 12px;min-width:0;}
  .kpi-row.left .kpi-col{align-items:flex-start;text-align:left;}
  .kpi-row.center .kpi-col{align-items:center;text-align:center;}
  .kpi-col:first-child{padding-left:0;}
  .kpi-col:last-child{padding-right:0;}
  .kpi-val{font-size:24px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:var(--text);white-space:nowrap;}
  .kpi-val.sm{font-size:21px;}
  .kpi-sub{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .kpi-divider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}

  /* ── ZONE / REGION MoM REPORT ── */
  .zmom-controls{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-bottom:14px;position:sticky;top:126px;z-index:85;background:var(--bg);padding:8px 0;}
  .zmom-pillset{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .zmom-pillset .pset-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);margin-right:2px;}
  .zmom-pill{padding:6px 13px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text2);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .zmom-pill:hover{border-color:var(--blue);color:var(--text);}
  .zmom-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(43,90,126,.20);}
  .zmom-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:72vh;}
  table.zmom{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.zmom th,table.zmom td{padding:13px 15px;white-space:nowrap;border-bottom:1px solid var(--border);vertical-align:middle;}
  table.zmom thead th{position:sticky;top:0;z-index:6;background:var(--blue-light);color:var(--blue-dark);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:right;border-bottom:1px solid var(--border);box-shadow:inset 0 -2px 0 rgba(43,90,126,.22);}
  table.zmom th.zcol,table.zmom td.zcol{position:sticky;left:0;z-index:5;background:var(--surface);text-align:left;font-weight:600;color:var(--text);min-width:96px;}
  table.zmom tbody tr:hover td{background:var(--bg);}
  table.zmom tr.total-row td{font-weight:700;background:var(--blue-light);border-top:2px solid var(--blue-dark);}
  table.zmom tr.total-row td.zcol{background:var(--blue-light);color:var(--blue-dark);}

  /* ── DAILY TRENDS / shared multi-metric table styling ── */
  .yoy-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    background:linear-gradient(115deg,#eaf2fa,#e6eff7 60%,#dde9f4);border:1px solid #cbdcec;border-radius:var(--r);padding:11px 15px;box-shadow:var(--shadow);margin-bottom:13px;}
  .ddt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:74vh;box-shadow:var(--shadow);}
  table.ddt{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.ddt th,table.ddt td{padding:9px 13px;white-space:nowrap;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;}
  table.ddt thead th{position:sticky;background:var(--blue-light);color:var(--blue-dark);font-weight:700;letter-spacing:.4px;box-shadow:inset 0 -2px 0 rgba(43,90,126,.18);}
  table.ddt thead tr.grp th{top:0;z-index:7;text-align:center;font-size:11.5px;text-transform:uppercase;border-left:1px solid rgba(43,90,126,.16);}
  table.ddt thead tr.grp th .ddt-rng{font-weight:600;color:rgba(43,90,126,.66);text-transform:none;letter-spacing:0;}
  table.ddt thead tr.grp th.grp-tot{background:#f7ecca;color:var(--gold);box-shadow:inset 0 -2px 0 rgba(184,137,46,.28);}
  table.ddt thead tr.sub th{top:34px;z-index:6;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue-dark);border-left:1px solid rgba(43,90,126,.10);}
  table.ddt thead tr.sub th.sub-tot{background:var(--gold-light);color:var(--gold);}
  table.ddt thead tr.single th{top:0;z-index:7;}
  table.ddt th.dcol,table.ddt td.dcol{position:sticky;left:0;z-index:5;text-align:left;font-weight:700;color:var(--text);background:var(--surface);min-width:96px;}
  table.ddt th.dcol2,table.ddt td.dcol2{position:sticky;z-index:5;text-align:left;font-weight:600;color:var(--text2);background:var(--surface);min-width:118px;font-size:12px;box-shadow:1px 0 0 var(--border);}
  table.ddt thead th.dcol,table.ddt thead th.dcol2{z-index:9;background:var(--blue-light);color:var(--blue-dark);}
  table.ddt tbody tr:nth-child(even) td{background:#f6f4ef;}
  table.ddt tbody tr:nth-child(even) td.dcol,table.ddt tbody tr:nth-child(even) td.dcol2{background:#f0ede7;}
  table.ddt tbody tr:hover td{background:rgba(43,90,126,.05);}
  table.ddt tbody tr:hover td.dcol,table.ddt tbody tr:hover td.dcol2{background:var(--surface2);}
  table.ddt td.grp-start{border-left:1px solid rgba(43,90,126,.16);}
  table.ddt td.totcell{background:var(--gold-light);font-weight:800;color:#6b5212;border-left:1px solid rgba(184,137,46,.28);}
  table.ddt tr.total-row td{font-weight:800;background:var(--blue-light)!important;color:var(--blue-dark);border-top:2px solid var(--blue-dark);}
  table.ddt tr.total-row td.dcol,table.ddt tr.total-row td.dcol2{background:var(--blue-light)!important;color:var(--blue-dark);}
  table.ddt tr.total-row td.totcell{background:#f1e6c4!important;color:#5a4310;}
  .ddt-cell{display:flex;flex-direction:column;gap:1px;align-items:flex-end;line-height:1.2;}
  .ddt-cell .cv{font-weight:700;color:var(--text);}
  .ddt-cell .cq{font-size:11px;font-weight:600;color:var(--text2);}
  .ddt-cell .ca{font-size:10.5px;font-weight:700;color:var(--gold);margin-left:2px;}
  .ddt-muted{color:var(--text3);}
  .ddt-note{margin-top:7px;font-size:11px;color:var(--text2);}

  .pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:11px;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.35;white-space:nowrap;}
  .pill.green{background:var(--green-light);color:var(--green);}
  .pill.amber{background:var(--warm-light);color:var(--warm);}
  .pill.red{background:var(--red-light);color:var(--red);}
  .pill.na{background:var(--surface2);color:var(--text3);}
  .chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:9px;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .chip.up{background:var(--green-light);color:var(--green);}
  .chip.dn{background:var(--red-light);color:var(--red);}
  .chip.na{background:var(--surface2);color:var(--text3);}

  /* ── TABLES ── */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  .tn{text-align:right;font-variant-numeric:tabular-nums;}

  /* ── NO DATA ── */
  .no-data{padding:40px;text-align:center;color:var(--text3);font-size:14px;}

  /* ── DASHBOARD CONTENT (hidden until data loaded) ── */
  #dashboardContent{display:none;}
  #dashboardContent.visible{display:block;animation:slideUp .4s ease;}

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    .top-bar{padding:0 16px;height:54px;}
    .filter-bar{padding:8px 16px;}
    .main{padding:16px;}
    .brand-divider,.brand-title{display:none;}
  }

  /* ===== Split-screen login showcase (6 rows, alternating marquee) ===== */
  .lp-showcase{position:relative;flex:1 1 58%;min-width:0;height:100%;overflow:hidden;
    background:radial-gradient(120% 90% at 8% 0%,#eef4fa 0,transparent 55%),radial-gradient(120% 100% at 100% 100%,#fdf3ea 0,transparent 50%),var(--bg);}
  .lp-rows{position:absolute;inset:0;height:100%;display:grid;grid-template-rows:repeat(6,1fr);overflow:hidden;
    -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 6%,#000 94%,transparent 100%);
            mask-image:linear-gradient(180deg,transparent 0,#000 6%,#000 94%,transparent 100%);}
  .lp-row{position:relative;min-height:0;overflow:hidden;display:flex;align-items:center;}
  .lp-track{display:flex;align-items:center;width:max-content;will-change:transform;}
  .lp-row.left  .lp-track{animation:lpLeft  var(--dur,56s) linear infinite;}
  .lp-row.right .lp-track{animation:lpRight var(--dur,56s) linear infinite;}
  .lp-tile{flex:0 0 auto;margin-right:14px;height:calc((100vh / 6) - 14px);height:calc((100dvh / 6) - 14px);
    aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:#fff;border:1px solid rgba(30,28,24,.06);
    box-shadow:0 6px 20px rgba(30,28,24,.08),0 1px 3px rgba(30,28,24,.05);}
  .lp-tile img{width:100%;height:100%;object-fit:cover;display:block;}
  @keyframes lpLeft {from{transform:translateX(0)}    to{transform:translateX(-50%)}}
  @keyframes lpRight{from{transform:translateX(-50%)} to{transform:translateX(0)}}
  .lp-showcase::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,transparent 62%,rgba(255,255,255,.55) 86%,#fff 100%);}
  /* ===== RIGHT AUTH PANEL — "Deep Aurora Glass" ===== */
  .lp-auth{flex:0 0 42%;max-width:560px;min-width:400px;height:100%;position:relative;overflow:hidden;z-index:2;
    display:flex;align-items:center;justify-content:center;padding:40px;
    background:
      radial-gradient(135% 110% at 100% -10%, #34b0ef 0%, rgba(52,176,239,0) 46%),
      radial-gradient(120% 120% at -10% 110%, #06304e 0%, rgba(6,48,78,0) 52%),
      linear-gradient(155deg, #0a3a5e 0%, #12568a 48%, #1d81c4 100%);
    box-shadow:-22px 0 60px rgba(6,28,46,.35);}
  .lp-auth::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:54px 54px;
    -webkit-mask-image:radial-gradient(120% 90% at 50% 28%, #000 0%, transparent 78%);
            mask-image:radial-gradient(120% 90% at 50% 28%, #000 0%, transparent 78%);}
  .lp-orbit{position:absolute;z-index:0;width:118%;aspect-ratio:1;left:50%;top:50%;
    transform:translate(-50%,-50%);pointer-events:none;border-radius:50%;opacity:.55;filter:blur(6px);
    background:conic-gradient(from 0deg, rgba(126,214,255,0), rgba(126,214,255,.55), rgba(70,227,210,0) 34%, rgba(170,228,255,.5) 60%, rgba(126,214,255,0) 100%);
    -webkit-mask:radial-gradient(circle, transparent 39%, #000 40%, #000 60%, transparent 61%);
            mask:radial-gradient(circle, transparent 39%, #000 40%, #000 60%, transparent 61%);
    animation:lpOrbit 34s linear infinite;}
  @keyframes lpOrbit{to{transform:translate(-50%,-50%) rotate(360deg);}}
  .lp-aura{position:absolute;inset:-15%;pointer-events:none;z-index:0;}
  .lp-aura span{position:absolute;display:block;border-radius:50%;filter:blur(70px);opacity:.65;will-change:transform;mix-blend-mode:screen;}
  .lp-aura span:nth-child(1){width:48%;aspect-ratio:1;top:-8%;right:-6%;background:radial-gradient(circle at 30% 30%, #8fe0ff, #1d81c4 70%);animation:lpDrift1 18s ease-in-out infinite;}
  .lp-aura span:nth-child(2){width:44%;aspect-ratio:1;bottom:-10%;left:-8%;background:radial-gradient(circle at 40% 40%, #46e3d2, #0d6e8a 72%);animation:lpDrift2 22s ease-in-out infinite;}
  .lp-aura span:nth-child(3){width:40%;aspect-ratio:1;top:36%;left:28%;background:radial-gradient(circle at 50% 50%, #bfe9ff, #3a9bd6 75%);opacity:.45;animation:lpDrift3 26s ease-in-out infinite;}
  @keyframes lpDrift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-9%,11%) scale(1.14)}}
  @keyframes lpDrift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(11%,-9%) scale(1.16)}}
  @keyframes lpDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(7%,-7%) scale(.9)}}

  .lp-card{position:relative;z-index:2;width:100%;max-width:386px;display:flex;flex-direction:column;overflow:hidden;
    background:linear-gradient(168deg, rgba(255,255,255,.95), rgba(247,251,255,.85));
    -webkit-backdrop-filter:blur(30px) saturate(180%);backdrop-filter:blur(30px) saturate(180%);
    border:1px solid rgba(255,255,255,.9);border-radius:26px;padding:30px 36px 30px;
    box-shadow:0 34px 90px rgba(5,26,44,.5),0 8px 26px rgba(5,26,44,.28),inset 0 1px 0 rgba(255,255,255,.95);
    animation:lpRise .7s cubic-bezier(.16,1,.3,1) both;}
  .lp-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,#1d81c4,#34b0ef,#46e3d2,#1d81c4);background-size:200% 100%;
    animation:lpStrip 6s linear infinite;}
  @keyframes lpStrip{to{background-position:200% 0;}}

  .lp-badge{align-self:flex-start;display:inline-flex;align-items:center;gap:7px;
    font-size:10.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;
    color:#1366a0;background:rgba(29,129,196,.1);border:1px solid rgba(29,129,196,.22);
    padding:5px 11px;border-radius:999px;margin:8px 0 16px;}
  .lp-badge b{width:6px;height:6px;border-radius:50%;background:#2bb24c;box-shadow:0 0 0 3px rgba(43,178,76,.18);}
  .lp-heading{font-size:23px;font-weight:700;color:#10324c;letter-spacing:-.3px;line-height:1.12;}
  .lp-sub{font-size:13.5px;color:#5b748a;margin-top:6px;margin-bottom:22px;line-height:1.4;}

  .lp-field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;}
  .lp-field label{font-size:11px;font-weight:700;color:#1366a0;letter-spacing:.5px;text-transform:uppercase;}
  .lp-input{position:relative;display:flex;align-items:center;}
  .lp-input svg{position:absolute;left:13px;width:17px;height:17px;color:#7c93a6;pointer-events:none;transition:color .2s;}
  .lp-input input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid #d7e1ea;border-radius:11px;
    font-size:14px;font-family:inherit;outline:none;background:rgba(255,255,255,.85);color:#10324c;
    transition:border-color .2s, box-shadow .2s, background .2s;}
  .lp-input input::placeholder{color:#9fb0bf;}
  .lp-input input:focus{border-color:#1d81c4;background:#fff;box-shadow:0 0 0 4px rgba(29,129,196,.16);}
  .lp-input:focus-within svg{color:#1d81c4;}

<script>
// ═══════════════════════════════════════════════════════════════
// SKILLMATICS SWIGGY — Phase 1 shell with GT-style data loading
// Login/logout, loading overlay, animations, colours, live indicator,
// and refresh are wired. Data IS fetched from JSON (same pipeline as GT)
// so the dashboard goes live; report rendering & filters come next.
// ═══════════════════════════════════════════════════════════════

// ── DATA & STATE ───────────────────────────────────────────────
let RAW = [];        // normalized sales rows (UPPER-cased dimensions, like GT)
let filtered = [];   // current view (no global filters yet → mirrors RAW)
let dataMinDate = '', dataMaxDate = '';

// ── API URL configuration ──
// Sales JSON sits next to this HTML file. Stock & ads-cost JSON will be
// added to this list in a later phase. isTarget kept for GT parity (unused).
const API_SOURCES = [
  { url: "./data.json", isTarget: false },   // Swiggy sales
];

// ── LOGIN ──────────────────────────────────────────────────────
async function attemptLogin() {
  const userInput = document.getElementById('loginUser').value.trim();
  const passInput = document.getElementById('loginPass').value;
  const btn       = document.getElementById('loginBtn');
  const errEl     = document.getElementById('loginError');

  if (!userInput || !passInput) {
    showLoginError('Please enter both username and password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errEl.style.display = 'none';

  try {
    const storedUser = 'admin';
    const storedPass = 'admin';

    if (userInput === storedUser && passInput === storedPass) {
      sessionStorage.setItem('sk_logged_in', '1');
      document.getElementById('loginOverlay').style.display = 'none';
      const loadOv = document.getElementById('loadingOverlay');
      loadOv.style.display = 'flex';
      loadOv.style.opacity = '1';
      resetLoadingVisual();
      startLoadingCycle();

      await loadDashboardData();

      stopLoadingCycle();
      finishLoading('success', 'Dashboard ready', 'Launching your workspace');
      setTimeout(() => { loadOv.style.opacity = '0'; setTimeout(() => { loadOv.style.display = 'none'; }, 500); }, 1200);
    } else {
      showLoginError('Invalid username or password. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (err) {
    console.error('Login error:', err);
    showLoginError('Could not verify credentials. Check your connection and try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function logout() {
  sessionStorage.removeItem('sk_logged_in');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Sign In';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('liveIndicator').classList.remove('visible');
  document.getElementById('fileTimestamp').style.display = 'none';
}

// ── REFRESH STATE ──────────────────────────────────────────────
function setRefreshState(loading) {
  const btn = document.getElementById('refreshBtn');
  const indicator = document.getElementById('liveIndicator');
  if (loading) {
    btn.disabled = true;
    btn.classList.add('spinning');
    indicator.classList.remove('visible');
  } else {
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}

function showLiveIndicator() {
  document.getElementById('liveIndicator').classList.add('visible');
}

async function refreshData() {
  setRefreshState(true);
  const loadOv = document.getElementById('loadingOverlay');
  loadOv.style.display = 'flex';
  loadOv.style.opacity = '1';
  resetLoadingVisual();
  startLoadingCycle();
  try {
    await loadDashboardData();
    stopLoadingCycle();
    finishLoading('success', 'Dashboard updated', 'Latest figures are in');
    setTimeout(() => { loadOv.style.opacity = '0'; setTimeout(() => { loadOv.style.display = 'none'; }, 500); }, 1200);
  } catch (e) {
    stopLoadingCycle();
  } finally {
    setRefreshState(false);
  }
}

// ── FETCH JSON FILES FROM API (same robust pipeline as GT) ─────
async function loadDashboardData() {
  setRefreshState(true);
  try {
    const total = API_SOURCES.length;

    async function fetchSource(src) {
      const res  = await fetch(src.url + '?_=' + Date.now());
      const lastModified = res.headers.get('Last-Modified') || res.headers.get('last-modified');
      const text = await res.text();
      const json = parseJsonText(text); // BOM-strip + "}{" repair
      if (!json) throw new Error(`Could not parse JSON from ${src.url}`);
      return { url: src.url, isTarget: src.isTarget, json, lastModified };
    }

    // Run all fetches in parallel (one failure doesn't block the others)
    const fetchResults = await Promise.allSettled(API_SOURCES.map(fetchSource));

    // Most recent Last-Modified header across all files → header "Updated" stamp
    let latestModified = null;
    for (const r of fetchResults) {
      if (r.status === 'fulfilled' && r.value.lastModified) {
        const d = new Date(r.value.lastModified);
        if (!latestModified || d > latestModified) latestModified = d;
      }
    }
    if (latestModified) {
      const lmStr = latestModified.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
                    ' ' + latestModified.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('fileTimestampVal').textContent = lmStr;
      document.getElementById('fileTimestamp').style.display = 'inline';
    }

    fetchResults.forEach((r, i) => {
      if (r.status === 'rejected') console.warn(`[API source ${i}] ${API_SOURCES[i]?.url} — failed:`, r.reason);
    });

    const salesResults = fetchResults.filter(r => r.status === 'fulfilled' && !r.value.isTarget);

    // ── Build RAW from all sales files ──
    const parsedFiles = [];
    let totalEstimate = 0;

    for (const r of salesResults) {
      const { json, url } = r.value;
      if (!Array.isArray(json) || json.length === 0) {
        console.warn(`No array data in ${url}, skipping`);
        continue;
      }
      const sample = json[0] || {};
      const hasDate  = Object.prototype.hasOwnProperty.call(sample, 'date');
      const hasSales = Object.prototype.hasOwnProperty.call(sample, 'value') ||
                       Object.prototype.hasOwnProperty.call(sample, 'sku_code');
      if (!hasDate || !hasSales) {
        console.warn(`No Skillmatics Swiggy sales fields found in ${url}, skipping`);
        continue;
      }
      totalEstimate += json.length;
      parsedFiles.push({ records: json, name: url.split('/').pop() });
      console.log(`Fetched ${url}: ~${json.length.toLocaleString()} rows`);
    }

    if (parsedFiles.length === 0) {
      throw Object.assign(new Error('No compatible Skillmatics Swiggy sales data was found.'), { kind: 'incompatible' });
    }

    // ── Build RAW array in one pass with chunked yields ──
    RAW = new Array(totalEstimate);
    let writeIdx = 0;
    const YIELD_INTERVAL = 80000;
    let sinceLastYield = 0;

    for (let si = 0; si < parsedFiles.length; si++) {
      const records = parsedFiles[si].records;
      for (let ri = 0, len = records.length; ri < len; ri++) {
        const row = records[ri];
        if (!row) continue;
        const yr = (row['year'] != null ? row['year'] : row['cy']);
        if (yr === '' || yr == null) continue;

        // UPPER + trim every text dimension so case/space variants group as one (see up()).
        const ac = up(row['sku_code']), ad = up(row['sku_name']);
        const sku = ac && ad ? (ac + ' - ' + ad) : (ac || ad);

        RAW[writeIdx++] = {
          bill_date:    excelDateToISO(row['date']),
          cy:           str(yr),                 // calendar year (JSON 'year')
          quarter:      up(row['quarter']),
          month:        up(row['month']),
          week:         up(row['week']),
          day:          up(row['day']),
          quantity:     +(row['quantity'] != null ? row['quantity'] : row['qty']) || 0,
          amount:       +row['value'] || 0,
          sku_code:     ac,
          sku_name:     ad,
          product_code: sku,                     // "CODE - NAME" composite, like GT
          brand_name:   up(row['brand']),
          category:     up(row['category']),
          sub_category: up(row['sub_category']),
          zone_name:    up(row['zone']),
          state_name:   up(row['state']),
          city_name:    up(row['city']),
          maping_city:  up(row['maping_city'])
        };

        sinceLastYield++;
        if (sinceLastYield >= YIELD_INTERVAL) { sinceLastYield = 0; await yieldToUI(); }
      }
      parsedFiles[si].records = null; // free memory
    }

    if (writeIdx < RAW.length) RAW.length = writeIdx;
    console.log('Total RAW rows:', RAW.length);
    _dateCache.clear();

    if (RAW.length === 0) {
      throw Object.assign(new Error('No valid sales rows found.'), { kind: 'incompatible' });
    }

    // Date bounds (used by reports/filters later). No global filters yet → view = all.
    const dates = RAW.map(r => r.bill_date).filter(Boolean).sort();
    dataMinDate = dates[0] || '';
    dataMaxDate = dates[dates.length - 1] || '';
    filtered = RAW.slice();

    // ── Reveal dashboard shell (reports rendered in a later phase) ──
    document.getElementById('dashboardContent').style.display = 'block';
    document.getElementById('dashboardContent').classList.add('visible');
    await yieldToUI();

    setRefreshState(false);
    showLiveIndicator();

  } catch (error) {
    console.error('Dashboard Load Error:', error);
    setRefreshState(false);
    if (error && error.kind === 'incompatible') {
      finishLoading('error', 'Data not compatible', "We couldn't find Skillmatics Swiggy sales data. Please check your JSON sources.");
    } else {
      finishLoading('error', 'Something went wrong', "We couldn't load your dashboard. Please check your connection and try again.");
    }
    setTimeout(() => {
      const loadOv = document.getElementById('loadingOverlay');
      loadOv.style.opacity = '0';
      setTimeout(() => { loadOv.style.display = 'none'; }, 500);
    }, 4000);
    throw error;
  }
}

// ═══════════════════════════════════════════════════════════════
// DATA HELPERS  (identical behaviour to GT)
// ═══════════════════════════════════════════════════════════════
function yieldToUI() { return new Promise(resolve => setTimeout(resolve, 0)); }

// Fast string coerce
function str(v) { return v == null ? '' : typeof v === 'string' ? v : String(v); }

// Canonicalize a dimension value: UPPER + trim so "North"/"NORTH"/" north "
// collapse into ONE group across every report.
function up(v) { return v == null ? '' : (typeof v === 'string' ? v : String(v)).trim().toUpperCase(); }

// Excel serial / ISO date string → ISO yyyy-mm-dd (cached).
const _dateCache = new Map();
function excelDateToISO(serial) {
  if (!serial && serial !== 0) return '';
  if (typeof serial === 'string') {
    const t = serial.trim();
    if (t === '') return '';
    if (/^\d+(\.\d+)?$/.test(t)) { serial = +t; }
    else { if (t.length >= 8) { const d = new Date(t); if (!isNaN(d)) return d.toISOString().slice(0, 10); } return ''; }
  }
  let cached = _dateCache.get(serial);
  if (cached) return cached;
  const ms = (serial - 25569) * 86400000; // 25569 = days from 1899-12-30 to 1970-01-01
  const d = new Date(ms);
  const y = d.getUTCFullYear();
  const m = (d.getUTCMonth() + 1);
  const day = d.getUTCDate();
  cached = y + '-' + (m < 10 ? '0' : '') + m + '-' + (day < 10 ? '0' : '') + day;
  _dateCache.set(serial, cached);
  return cached;
}

// Robust JSON parse: strip BOM + tolerate "}{" exports missing the comma.
function parseJsonText(text) {
  if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  text = (text || '').trim();
  if (!text) return null;
  try { return JSON.parse(text); }
  catch (e) {
    try { return JSON.parse(text.replace(/\}\s*\{/g, '},{')); }
    catch (e2) { return null; }
  }
}

// ═══════════════════════════════════════════════════════════════
// LOADING OVERLAY HELPERS  (kept identical to GT)
// ═══════════════════════════════════════════════════════════════
let _msgTO = null;
function setLoadingMsg(main, sub, instant) {
  const s = document.getElementById('loadingStatus');
  const ss = document.getElementById('loadingSubStatus');
  if (_msgTO) { clearTimeout(_msgTO); _msgTO = null; }
  const apply = () => {
    if (s)  { s.textContent = main; s.style.opacity = '1'; }
    if (ss) { ss.textContent = sub || ''; ss.style.opacity = '1'; }
  };
  if (instant) { apply(); return; }
  if (s)  s.style.opacity = '0';
  if (ss) ss.style.opacity = '0';
  _msgTO = setTimeout(apply, 180);
}

const LOADING_STAGES = [
  { p: 6,  main: 'Establishing secure connection', sub: 'Authenticating your session' },
  { p: 22, main: 'Connecting to data warehouse',   sub: 'Reaching the Skillmatics data layer' },
  { p: 44, main: 'Retrieving sales data',          sub: 'Streaming transactions across all periods' },
  { p: 66, main: 'Consolidating datasets',         sub: 'Unifying zones & products' },
  { p: 83, main: 'Computing performance metrics',  sub: 'Aggregating KPIs, trends & inventory' },
  { p: 93, main: 'Finalizing your dashboard',      sub: 'Preparing your workspace' },
];
const _LOAD_CAP = 96;
const _LOAD_CIRC = 2 * Math.PI * 50;
let _loadCycle = null, _loadProgress = 0, _loadStageIdx = -1;

function _renderLoadSteps() {
  const host = document.getElementById('loadingSteps');
  if (!host) return;
  host.innerHTML = LOADING_STAGES.map(() => '<div class="lstep"><div class="lstep-fill"></div></div>').join('');
}

function _paintLoadProgress() {
  const p = _loadProgress;
  const arc   = document.getElementById('loadArc');
  const comet = document.getElementById('loadComet');
  const pct   = document.getElementById('loadingPct');
  if (arc)   arc.style.strokeDashoffset = (_LOAD_CIRC * (1 - p / 100)).toFixed(2);
  if (comet) comet.style.transform = 'rotate(' + (p * 3.6) + 'deg)';
  if (pct)   pct.textContent = Math.round(p);
  let idx = 0;
  for (let i = 0; i < LOADING_STAGES.length; i++) { if (p >= LOADING_STAGES[i].p) idx = i; }
  if (idx !== _loadStageIdx) {
    _loadStageIdx = idx;
    setLoadingMsg(LOADING_STAGES[idx].main, LOADING_STAGES[idx].sub);
  }
  document.querySelectorAll('#loadingSteps .lstep').forEach((el, i) => {
    el.classList.toggle('on', i <= _loadStageIdx);
  });
}

function resetLoadingVisual() {
  _loadProgress = 0; _loadStageIdx = -1;
  const arc   = document.getElementById('loadArc');
  const comet = document.getElementById('loadComet');
  const pct   = document.getElementById('loadingPct');
  const num   = document.querySelector('.load-num');
  const check = document.getElementById('loadCheck');
  const s     = document.getElementById('loadingStatus');
  if (arc)   { arc.style.transition = ''; arc.style.stroke = 'url(#loadGrad)'; arc.style.strokeDashoffset = _LOAD_CIRC.toFixed(2); }
  if (comet) { comet.style.transition = ''; comet.style.transform = 'rotate(0deg)'; comet.style.display = ''; }
  if (pct)   { pct.style.color = ''; pct.textContent = '0'; }
  if (num)   num.style.display = 'flex';
  if (check) { check.style.display = 'none'; check.classList.remove('draw'); }
  if (s)     s.style.color = '';
  _renderLoadSteps();
  setLoadingMsg(LOADING_STAGES[0].main, LOADING_STAGES[0].sub, true);
}

function startLoadingCycle() {
  stopLoadingCycle();
  if (_loadProgress < 2) _loadProgress = 2;
  _paintLoadProgress();
  _loadCycle = setInterval(() => {
    _loadProgress += Math.max(0.12, (_LOAD_CAP - _loadProgress) * 0.012);
    if (_loadProgress > _LOAD_CAP) _loadProgress = _LOAD_CAP;
    _paintLoadProgress();
  }, 30);
}

function stopLoadingCycle() {
  if (_loadCycle) { clearInterval(_loadCycle); _loadCycle = null; }
}

function finishLoading(state, main, sub) {
  stopLoadingCycle();
  const arc   = document.getElementById('loadArc');
  const comet = document.getElementById('loadComet');
  const pct   = document.getElementById('loadingPct');
  const num   = document.querySelector('.load-num');
  const check = document.getElementById('loadCheck');
  const s     = document.getElementById('loadingStatus');
  if (state === 'success') {
    _loadProgress = 100;
    if (arc)   arc.style.transition = 'stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)';
    if (comet) comet.style.transition = 'transform .6s cubic-bezier(.4,0,.2,1)';
    _paintLoadProgress();
    document.querySelectorAll('#loadingSteps .lstep').forEach(el => el.classList.add('on'));
    setLoadingMsg(main, sub);
    setTimeout(() => {
      if (comet) comet.style.display = 'none';
      if (num)   num.style.display = 'none';
      if (check) { check.style.display = 'block'; void check.offsetWidth; check.classList.add('draw'); }
    }, 600);
  } else {
    if (arc) arc.style.stroke = 'var(--red)';
    if (pct) pct.style.color = 'var(--red)';
    if (s)   s.style.color = 'var(--red)';
    setLoadingMsg(main, sub);
  }
}

// ═══════════════════════════════════════════════════════════════
// SETUP & INIT
// ═══════════════════════════════════════════════════════════════
function setup() {
  window.addEventListener('resize', adjustStickyTops);

  // Tab navigation — switch panels only (per-tab report logic comes later).
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
      adjustStickyTops();
    });
  });
  adjustStickyTops();
}

// Pin the tab nav under the top bar (filter bar hidden until a later phase).
function adjustStickyTops(){
  const top=document.querySelector('.top-bar'), fb=document.getElementById('filterBar'), tns=document.querySelector('.tab-nav-sticky');
  if(!top||!tns) return;
  const tH=top.offsetHeight||60;
  if(fb) fb.style.top=tH+'px';
  const fbVisible=fb && getComputedStyle(fb).display!=='none' && fb.offsetHeight>0;
  tns.style.top=(tH+(fbVisible?fb.offsetHeight:0))+'px';
}

async function init() {
  setup();

  // If already logged in this session, skip login and load data directly.
  if (sessionStorage.getItem('sk_logged_in') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    const loadOv = document.getElementById('loadingOverlay');
    loadOv.style.display = 'flex';
    loadOv.style.opacity = '1';
    resetLoadingVisual();
    startLoadingCycle();

    try {
      await loadDashboardData();
      stopLoadingCycle();
      finishLoading('success', 'Dashboard ready', 'Launching your workspace');
      setTimeout(() => { loadOv.style.opacity = '0'; setTimeout(() => { loadOv.style.display = 'none'; }, 500); }, 1200);
    } catch (err) {
      console.error('Auto-load error:', err);
      stopLoadingCycle();
      sessionStorage.removeItem('sk_logged_in');
      loadOv.style.display = 'none';
      document.getElementById('loginOverlay').style.display = 'flex';
      showLoginError('Session expired or data unavailable. Please sign in again.');
    }
  }
}

init();
</script>
