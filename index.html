<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skillmatics — US Revenue Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#f5f4f0; --surface:#fff; --surface2:#faf9f6; --border:#e8e4dc; --border2:#d8d3c8;
    --text:#2c2a25; --text2:#6b6560; --text3:#9b958c;
    --accent:#4e7c59; --accent-light:#e8f2eb;
    --accent2:#7b5ea7; --accent2-light:#f0ebf7;
    --warm:#d4845a; --warm-light:#fdf0e8;
    --blue:#4a7fa5; --blue-light:#e8f1f8;
    --gold:#c4973a; --gold-light:#fdf5e6;
    --red:#c0444a; --red-light:#fdeced; --dark-red:#7b1a2a; --dark-red-light:#f5e0e3;
    --green:#3a8a5c; --green-light:#e6f5ed;
    --shadow:0 1px 3px rgba(44,42,37,.08),0 4px 12px rgba(44,42,37,.05);
    --shadow-md:0 4px 16px rgba(44,42,37,.12);
    --r:12px; --rs:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* TOP BAR */
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-img{height:30px;width:auto;display:block;}
  .brand-sub{font-size:18px;font-weight:700;letter-spacing:.2px;color:#1d81c4;line-height:1;padding-left:14px;border-left:1.5px solid var(--border2);}
  .header-right{display:flex;align-items:center;gap:0;}
  .hdr-status{display:flex;align-items:center;gap:12px;padding-right:16px;border-right:1px solid var(--border);margin-right:12px;}
  .hdr-actions{display:flex;align-items:center;gap:8px;}
  .last-updated{font-size:12px;color:var(--text3);}
  .logout-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:none;color:var(--text2);border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .logout-btn:hover{background:var(--red-light);color:var(--red);border-color:var(--red);}
  .logout-btn svg{flex-shrink:0;}

  /* REFRESH BUTTON */
  .excel-btn{display:flex;align-items:center;gap:7px;padding:8px 15px;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .excel-btn:hover:not(:disabled){background:var(--accent);color:#fff;}
  .excel-btn:disabled{opacity:.55;cursor:not-allowed;}
  .excel-btn svg{flex-shrink:0;}
  .refresh-btn{display:flex;align-items:center;gap:7px;padding:8px 15px;background:#e0f2f1;color:#004d40;border:1px solid #80cbc4;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .refresh-btn:hover:not(:disabled){background:#b2dfdb;border-color:#4db6ac;}
  .refresh-btn:disabled{opacity:.55;cursor:not-allowed;}
  .refresh-icon{display:inline-block;transition:transform .3s;}
  .refresh-btn.spinning .refresh-icon{animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* LIVE INDICATOR */
  .live-indicator{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--accent-light);border:1px solid var(--accent);border-radius:20px;opacity:0;transition:opacity .4s;}
  .live-indicator.visible{opacity:1;}
  .live-dot-wrap{position:relative;width:10px;height:10px;flex-shrink:0;}
  .live-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:0;left:0;}
  .live-ring{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:0;left:0;opacity:.6;animation:liveRing 2s ease-out infinite;}
  @keyframes liveRing{0%{transform:scale(1);opacity:.6;}70%{transform:scale(2.4);opacity:0;}100%{transform:scale(2.4);opacity:0;}}
  .live-text{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}

  /* FILTER BAR */
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:60px;z-index:90;}
  .filter-group{display:flex;align-items:center;gap:7px;}
  .filter-label{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;}
  .filter-select{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none;transition:border-color .2s;min-width:140px;}
  .filter-select:focus{border-color:var(--accent);}
  .filter-sep{width:1px;height:22px;background:var(--border2);}

  /* MULTI-SELECT PARTY DROPDOWN */
  .party-dropdown-wrap{position:relative;}
  .party-trigger{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none;min-width:200px;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none;transition:border-color .2s;}
  .party-trigger.open{border-color:var(--accent);}
  .party-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);min-width:260px;max-width:340px;}
  .party-panel.open{display:block;}
  .party-search{width:100%;padding:10px 12px;border:none;border-bottom:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;background:var(--surface2);border-radius:var(--r) var(--r) 0 0;}
  .party-list{max-height:240px;overflow-y:auto;padding:5px 0;}
  .party-item{display:flex;align-items:center;gap:10px;padding:7px 13px;cursor:pointer;transition:background .15s;font-size:13px;}
  .party-item:hover{background:var(--bg);}
  .party-item input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0;}
  .party-actions{padding:8px 11px;border-top:1px solid var(--border);display:flex;gap:7px;}
  .party-action-btn{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;font-family:inherit;}
  .party-action-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-reset{padding:7px 13px;background:var(--warm-light);color:var(--warm);border:1px solid var(--warm);border-radius:var(--rs);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:all .2s;}
  .btn-reset:hover{background:var(--warm);color:#fff;}

  /* TABS */
  .tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto;position:sticky;top:108px;z-index:80;}
  .tab-btn{padding:13px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* MAIN */
  .main{padding:22px 28px;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* SECTION */
  .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:26px;}
  .sec-header:first-of-type{margin-top:0;}
  .sec-title{font-family:'Fraunces',serif;font-size:16px;color:var(--text);display:flex;align-items:center;gap:9px;}
  .sec-badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;letter-spacing:.4px;text-transform:uppercase;}

  /* KPI CARDS */
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;}
  @media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:17px 19px;display:flex;flex-direction:column;justify-content:center;}
  .kpi-card:hover{box-shadow:var(--shadow);}
  .kpi-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;}
  .kpi-value{font-size:24px;font-weight:600;color:var(--text);line-height:1;}
  .kpi-sub{font-size:12px;color:var(--text3);margin-top:4px;}
  .kpi-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600;margin-top:6px;}
  .up{background:var(--green-light);color:var(--green);}
  .dn{background:var(--red-light);color:var(--red);}
  .na{background:var(--bg);color:var(--text3);}

  /* SUMMARY TABLE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;}
  .table-wrap-sticky{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:75vh;}
  .table-wrap-sticky thead th{position:sticky;top:0;z-index:10;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{padding:9px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;}
  thead th.th-right{text-align:right;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--bg);}
  tbody td{padding:8px 13px;color:var(--text);white-space:nowrap;}
  .td-right{text-align:right;font-variant-numeric:tabular-nums;}
  .td-accent{color:var(--accent);font-weight:600;}
  .td-green{color:#5aa279;font-weight:600;}
  .td-red{color:var(--red);font-weight:500;}
  .td-muted{color:var(--text3);}
  .td-bold{font-weight:600;}

  /* ACCOUNT SUBTOTAL ROW */
  .tr-subtotal td{background:#eef6f1;font-weight:700;border-top:2px solid var(--border2);color:var(--accent);}
  .tr-subtotal:hover td{background:#e4f0e8;}
  /* GRAND TOTAL ROW */
  .tr-grandtotal td{background:#3b4a54;color:#fff;font-weight:700;border-top:3px solid #2e3b43;}
  .tr-grandtotal:hover td{background:#4a5d68;}
  .tr-grandtotal .td-green{color:#7edba2;}
  .tr-grandtotal .td-red{color:#f09090;}

  /* PILL */
  .pill{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
  .pg{background:var(--green-light);color:#5aa279;}
  .py{background:var(--gold-light);color:var(--gold);}
  .pr{background:var(--red-light);color:var(--red);}

  /* ACCOUNT TYPE HEADER ROW */
  .tr-account-header td{background:var(--accent);color:#fff;font-weight:700;font-size:12px;letter-spacing:.4px;}
  .tr-account-header:hover td{background:#3d6347;}

  /* COMPARATIVES PLACEHOLDER */
  .phase2-ph{background:var(--surface2);border:2px dashed var(--border2);border-radius:var(--r);padding:60px;text-align:center;color:var(--text3);}
  .phase2-icon{font-size:48px;margin-bottom:16px;}
  .phase2-title{font-family:'Fraunces',serif;font-size:22px;color:var(--text2);margin-bottom:8px;}
  .phase2-desc{font-size:14px;line-height:1.6;max-width:440px;margin:0 auto;}

  /* COMPARATIVE YOY TABLE */
  .yoy-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .yoy-table{width:100%;border-collapse:collapse;font-size:13px;}
  .yoy-table thead th{padding:12px 16px;text-align:right;font-size:12px;font-weight:700;color:var(--surface);background:var(--accent);letter-spacing:.4px;border-bottom:2px solid #3d6347;white-space:nowrap;}
  .yoy-table thead th:first-child{text-align:left;min-width:180px;}
  .yoy-table tbody td{padding:10px 16px;text-align:right;font-variant-numeric:tabular-nums;border-bottom:1px solid var(--border);}
  .yoy-table tbody td:first-child{text-align:left;font-weight:600;color:var(--text);background:var(--surface2);border-right:1px solid var(--border);}
  .yoy-table tbody tr:hover{background:var(--accent-light);}
  .yoy-table tbody tr:last-child td{border-bottom:none;}
  .yoy-section-row td{background:var(--bg) !important;font-size:10px !important;font-weight:700 !important;text-transform:uppercase;letter-spacing:.8px;color:var(--text3) !important;padding:6px 16px !important;border-bottom:1px solid var(--border2) !important;}
  .yoy-section-row td:first-child{background:var(--bg) !important;}
  .yoy-section-row:hover td{background:var(--bg) !important;}
  .yoy-highlight td{background:rgba(78,124,89,.04);}
  .yoy-highlight td:first-child{color:var(--accent) !important;}
  .yoy-growth-row td{font-weight:600;}
  .yoy-filter-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:var(--accent-light);border:1px solid var(--accent);border-radius:20px;font-size:12px;font-weight:600;color:var(--accent);margin-left:10px;}

  /* YEAR TAB FROZEN COLUMNS */
  .year-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;max-height:75vh;}
  .year-table-wrap table{border-collapse:separate;border-spacing:0;}
  .year-table-wrap thead th{position:sticky;top:0;z-index:12;border-bottom:1px solid var(--border);}
  .year-table-wrap th.sticky-col,
  .year-table-wrap td.sticky-col{position:sticky;z-index:5;background:var(--surface);}
  .year-table-wrap thead th.sticky-col{z-index:15;background:var(--surface2);}
  .year-table-wrap .sticky-col-0{left:0;}
  .year-table-wrap .sticky-col-1{left:0;}
  .year-table-wrap .sticky-col-2{left:0;}
  .year-table-wrap tbody tr:nth-child(even) td{background:var(--surface2);}
  .year-table-wrap tbody tr:nth-child(even) td.sticky-col{background:var(--surface2);}
  .year-table-wrap tbody tr:hover td{background:var(--bg);}
  .year-table-wrap tbody tr:hover td.sticky-col{background:var(--bg);}
  .year-table-wrap .tr-account-header td{background:var(--accent) !important;color:#fff !important;}
  .year-table-wrap .tr-account-header:hover td{background:#3d6347 !important;}
  .year-table-wrap .tr-subtotal td{background:#eef6f1 !important;font-weight:700;border-top:2px solid var(--border2);color:var(--accent) !important;}
  .year-table-wrap .tr-subtotal:hover td{background:#e4f0e8 !important;}
  .year-table-wrap .tr-grandtotal td{background:#3b4a54 !important;color:#fff !important;font-weight:700;border-top:3px solid #2e3b43;}
  .year-table-wrap .tr-grandtotal:hover td{background:#4a5d68 !important;}

  /* LOADING */
  @keyframes loadFadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes loadLogoPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(78,124,89,.3);}50%{transform:scale(1.05);box-shadow:0 0 0 14px rgba(78,124,89,0);}}
  @keyframes loadSpin{to{transform:rotate(360deg);}}
  @keyframes loadDot{0%,80%,100%{opacity:.25;transform:scale(.8);}40%{opacity:1;transform:scale(1.1);}}
  .no-data{padding:28px;text-align:center;color:var(--text3);font-size:14px;}

  @media(max-width:768px){
    .top-bar,.filter-bar{padding:10px 14px;}
    .main{padding:14px;}
    .tab-bar{padding:0 14px;}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 44px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(44,42,37,.14);display:flex;flex-direction:column;align-items:center;gap:0;">
    <img src="https://www.skillmatics.in/cdn/shop/files/Skillmatics_Logo_RGB_Skillmatics_Logo_Horizontal_NewBlue_1d81c4_1_ec4fa524-c3fc-4526-bfa2-15a59bfba561_101x.svg?v=1747739594" alt="Skillmatics" style="height:34px;width:auto;display:block;margin-bottom:18px;">
    <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:30px;">US Revenue Intelligence</div>
    <div style="width:100%;display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;flex-direction:column;gap:5px;">
        <label style="font-size:12px;font-weight:600;color:#1d81c4;letter-spacing:.4px;text-transform:uppercase;">Username</label>
        <input id="loginUser" type="text" autocomplete="username" placeholder="Enter username"
          style="padding:10px 13px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--surface2);color:#1d81c4;"
          onfocus="this.style.borderColor='#1d81c4'" onblur="this.style.borderColor='var(--border2)'"
          onkeydown="if(event.key==='Enter') attemptLogin()">
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <label style="font-size:12px;font-weight:600;color:#1d81c4;letter-spacing:.4px;text-transform:uppercase;">Password</label>
        <input id="loginPass" type="password" autocomplete="current-password" placeholder="Enter password"
          style="padding:10px 13px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--surface2);color:#1d81c4;"
          onfocus="this.style.borderColor='#1d81c4'" onblur="this.style.borderColor='var(--border2)'"
          onkeydown="if(event.key==='Enter') attemptLogin()">
      </div>
      <div id="loginError" style="display:none;font-size:13px;color:var(--red);background:var(--red-light);border:1px solid var(--red);border-radius:var(--rs);padding:9px 13px;text-align:center;"></div>
      <button id="loginBtn" onclick="attemptLogin()"
        style="margin-top:4px;padding:12px;background:#1d81c4;color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s;"
        onmouseover="this.style.background='#176aa1'" onmouseout="this.style.background='#1d81c4'">
        Sign In
      </button>
    </div>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" style="position:fixed;inset:0;z-index:9998;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;transition:opacity .5s ease;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:0;animation:loadFadeIn .6s ease;">
    <img src="https://www.skillmatics.in/cdn/shop/files/Skillmatics_Logo_RGB_Skillmatics_Logo_Horizontal_NewBlue_1d81c4_1_ec4fa524-c3fc-4526-bfa2-15a59bfba561_101x.svg?v=1747739594" alt="Skillmatics" style="height:40px;width:auto;display:block;margin-bottom:24px;animation:loadLogoPulse 2s ease-in-out infinite;">
    <div style="font-size:13px;color:var(--text3);margin-bottom:36px;">US Revenue Intelligence</div>
    <div style="position:relative;width:48px;height:48px;margin-bottom:24px;">
      <svg width="48" height="48" viewBox="0 0 48 48" style="animation:loadSpin 1.2s linear infinite;">
        <circle cx="24" cy="24" r="20" fill="none" stroke="var(--border2)" stroke-width="3"/>
        <circle cx="24" cy="24" r="20" fill="none" stroke="var(--accent)" stroke-width="3" stroke-dasharray="80 126" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="loadingStatus" style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:8px;">Connecting to data source…</div>
    <div id="loadingSubStatus" style="font-size:12px;color:var(--text3);">This may take a moment</div>
    <div style="display:flex;gap:6px;margin-top:24px;">
      <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:loadDot 1.4s ease-in-out infinite;"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:loadDot 1.4s ease-in-out .2s infinite;"></div>
      <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:loadDot 1.4s ease-in-out .4s infinite;"></div>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="brand">
    <img class="brand-img" src="https://www.skillmatics.in/cdn/shop/files/Skillmatics_Logo_RGB_Skillmatics_Logo_Horizontal_NewBlue_1d81c4_1_ec4fa524-c3fc-4526-bfa2-15a59bfba561_101x.svg?v=1747739594" alt="Skillmatics">
    <div class="brand-sub">US Revenue Intelligence</div>
  </div>
  <div class="header-right">
    <div class="hdr-status">
      <div class="live-indicator" id="liveIndicator">
        <div class="live-dot-wrap"><div class="live-dot"></div><div class="live-ring"></div></div>
        <span class="live-text">Live</span>
      </div>
      <span id="fileTimestamp" style="font-size:11px;color:var(--text3);display:none;">
        <span style="font-weight:500;">File updated:</span> <span id="fileTimestampVal"></span>
      </span>
    </div>
    <div class="hdr-actions">
      <button class="excel-btn" id="excelBtn" onclick="downloadExcel()" title="Download the current tab's data as an Excel file">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Excel
      </button>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
        <span class="refresh-icon" id="refreshIcon">↻</span> Refresh
      </button>
      <button class="logout-btn" onclick="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <div class="filter-group">
    <span class="filter-label">Account Type</span>
    <select class="filter-select" id="accountTypeFilter" onchange="onAccountTypeChange()">
      <option value="">All Account Types</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Party</span>
    <div class="party-dropdown-wrap">
      <div class="party-trigger" id="partyTrigger" tabindex="0" onclick="togglePartyPanel()">
        <span id="partyTriggerLabel">All Parties</span>
        <span style="font-size:10px;color:var(--text3);">▾</span>
      </div>
      <div class="party-panel" id="partyPanel">
        <input class="party-search" id="partySearch" placeholder="Search parties…" oninput="filterPartyList()" onclick="event.stopPropagation()">
        <div class="party-list" id="partyList"></div>
        <div class="party-actions">
          <button class="party-action-btn" onclick="selectAllParties()">All</button>
          <button class="party-action-btn" onclick="clearAllParties()">None</button>
        </div>
      </div>
    </div>
  </div>
  <div class="filter-sep"></div>
  <button class="btn-reset" id="resetBtn" onclick="resetFilters()">↺ Reset</button>
</div>

<!-- TAB BAR -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
  <button class="tab-btn" data-tab="comparatives">📈 Comparatives</button>
  <!-- Year tabs injected by JS -->
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD TAB -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="sec-header">
      <div class="sec-title">📊 Revenue Summary <span class="sec-badge" style="background:var(--accent-light);color:var(--accent);" id="dashSummaryBadge">Current Year</span></div>
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-grid" id="dashKpiGrid" style="margin-bottom:18px;"></div>

    <!-- SUMMARY TABLES (one per year, generated by JS) -->
    <div id="dashSummaryContainer"></div>
  </div>

  <!-- COMPARATIVES TAB -->
  <div class="tab-content" id="tab-comparatives">
    <div id="comparativesContent"></div>
  </div>

  <!-- YEAR TABS: injected by JS -->

</div>

<script>
'use strict';

const DATA_URL = './data.json';
let RAW = [];
let YEARS = [];
let SHEETS = [];
let PARTIES = [];
let LATEST_YEAR = null;

// ── LOGIN ───────────────────────────────────────────────────────────────────
async function attemptLogin() {
  const userInput = document.getElementById('loginUser').value.trim();
  const passInput = document.getElementById('loginPass').value;
  const btn       = document.getElementById('loginBtn');
  const errEl     = document.getElementById('loginError');

  if (!userInput || !passInput) { showLoginError('Please enter both username and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errEl.style.display = 'none';

  try {
    if (userInput === 'admin' && passInput === 'admin') {
      sessionStorage.setItem('sk_rev_logged_in', '1');
      document.getElementById('loginOverlay').style.display = 'none';
      const loadOv = document.getElementById('loadingOverlay');
      loadOv.style.display = 'flex';
      loadOv.style.opacity = '1';

      const statusEl = document.getElementById('loadingStatus');
      const subEl    = document.getElementById('loadingSubStatus');
      const messages = [
        ['Connecting to data source…', 'This may take a moment'],
        ['Fetching revenue records…', 'Pulling latest figures'],
        ['Processing account data…', 'Crunching the numbers'],
        ['Building your dashboard…', 'Almost there']
      ];
      let msgIdx = 0;
      const msgInterval = setInterval(() => {
        msgIdx++;
        if (msgIdx < messages.length) {
          statusEl.textContent = messages[msgIdx][0];
          subEl.textContent    = messages[msgIdx][1];
        }
      }, 1800);

      await loadData();

      clearInterval(msgInterval);
      statusEl.textContent = 'Ready!';
      subEl.textContent = '';
      loadOv.style.opacity = '0';
      setTimeout(() => { loadOv.style.display = 'none'; }, 500);
    } else {
      showLoginError('Invalid username or password. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (err) {
    console.error(err);
    showLoginError('Could not load data. Check your connection and try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function logout() {
  sessionStorage.removeItem('sk_rev_logged_in');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Sign In';
  document.getElementById('loginError').style.display = 'none';
}

// ── DATA LOAD ───────────────────────────────────────────────────────────────
async function loadData() {
  const response = await fetch(DATA_URL + '?_=' + Date.now());
  // Capture file's Last-Modified timestamp from response headers
  const lastModified = response.headers.get('Last-Modified') || response.headers.get('last-modified');
  if (lastModified) {
    const lmDate = new Date(lastModified);
    const lmStr = lmDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
                  ' ' + lmDate.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('fileTimestampVal').textContent = lmStr;
    document.getElementById('fileTimestamp').style.display = 'inline';
  }
  RAW = await response.json();

  YEARS       = [...new Set(RAW.map(d => d.year))].sort((a,b) => a - b);
  const SHEET_ORDER = ['National US', 'National Canada', 'Specialty US', 'Mid Tier'];
  SHEETS      = [...new Set(RAW.map(d => d.sheet))].sort((a, b) => {
    const ai = SHEET_ORDER.indexOf(a);
    const bi = SHEET_ORDER.indexOf(b);
    const aIdx = ai === -1 ? 999 : ai;
    const bIdx = bi === -1 ? 999 : bi;
    return aIdx - bIdx;
  });
  PARTIES     = [...new Set(RAW.map(d => d.retailer))].sort();
  LATEST_YEAR = Math.max(...YEARS);

  // Clear existing year tabs and content before rebuilding
  document.querySelectorAll('.tab-btn[data-tab^="year-"]').forEach(b => b.remove());
  document.querySelectorAll('.tab-content[id^="tab-year-"]').forEach(c => c.remove());

  buildTabs();
  buildPartyList();
  populateAccountTypeFilter();
  renderAll();
  setupTabListeners();

  // Show live indicator
  const indicator = document.getElementById('liveIndicator');
  if (indicator) indicator.classList.add('visible');
}

// ── BUILD YEAR TABS ─────────────────────────────────────────────────────────
function buildTabs() {
  const tabBar  = document.getElementById('tabBar');
  const main    = document.querySelector('.main');

  YEARS.slice().reverse().forEach((year, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.tab = 'year-' + year;
    btn.textContent = '📅 ' + year;
    tabBar.appendChild(btn);

    // Tab content container
    const div = document.createElement('div');
    div.className = 'tab-content';
    div.id = 'tab-year-' + year;
    div.innerHTML = `<div id="year-${year}-content"></div>`;
    main.appendChild(div);
  });
}

// ── PARTY MULTI-SELECT ──────────────────────────────────────────────────────
function buildPartyList(accountType) {
  const list = document.getElementById('partyList');
  list.innerHTML = '';
  // Get parties relevant to the selected account type (or all if none selected)
  let relevantParties;
  if (accountType) {
    relevantParties = [...new Set(RAW.filter(d => d.sheet === accountType).map(d => d.retailer))].sort();
  } else {
    relevantParties = PARTIES;
  }
  relevantParties.forEach(party => {
    const item = document.createElement('label');
    item.className = 'party-item';
    item.innerHTML = `<input type="checkbox" value="${esc(party)}" checked onchange="onPartyChange()"><span>${esc(party)}</span>`;
    list.appendChild(item);
  });
  updatePartyTrigger();
}

function filterPartyList() {
  const q = document.getElementById('partySearch').value.toLowerCase();
  document.querySelectorAll('.party-item').forEach(item => {
    item.style.display = item.querySelector('span').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function togglePartyPanel() {
  const trigger = document.getElementById('partyTrigger');
  const panel   = document.getElementById('partyPanel');
  trigger.classList.toggle('open');
  panel.classList.toggle('open');
}

function onPartyChange() {
  updatePartyTrigger();
  applyFilters();
}

function updatePartyTrigger() {
  const checked = getSelectedParties();
  const allVisible = [...document.querySelectorAll('#partyList input[type=checkbox]')];
  const label   = document.getElementById('partyTriggerLabel');
  if (checked.length === 0)           label.textContent = 'No Parties';
  else if (checked.length === allVisible.length) label.textContent = 'All Parties';
  else                                label.textContent = checked.length + ' Selected';
}

function getSelectedParties() {
  return [...document.querySelectorAll('#partyList input[type=checkbox]:checked')].map(cb => cb.value);
}

function selectAllParties() {
  document.querySelectorAll('#partyList input[type=checkbox]').forEach(cb => cb.checked = true);
  onPartyChange();
}

function clearAllParties() {
  document.querySelectorAll('#partyList input[type=checkbox]').forEach(cb => cb.checked = false);
  onPartyChange();
}

// Close party panel when clicking outside
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.party-dropdown-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('partyTrigger').classList.remove('open');
    document.getElementById('partyPanel').classList.remove('open');
  }
});

// ── ACCOUNT TYPE FILTER ─────────────────────────────────────────────────────
function populateAccountTypeFilter() {
  const sel = document.getElementById('accountTypeFilter');
  // Clear existing options except the first "All" option
  while (sel.options.length > 1) sel.remove(1);
  sel.value = '';
  SHEETS.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
}

function onAccountTypeChange() {
  const accountType = document.getElementById('accountTypeFilter').value;
  buildPartyList(accountType);
  applyFilters();
}

// ── TAB LISTENERS ───────────────────────────────────────────────────────────
function setupTabListeners() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

let currentTab = 'dashboard';
function switchTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tabName));

  // Show/hide filter bar: for year tabs and comparatives
  const isYearTab = tabName.startsWith('year-');
  const isComparative = tabName === 'comparatives';
  document.getElementById('filterBar').style.display = (isYearTab || isComparative) ? 'flex' : 'none';
  // Adjust tab bar sticky top
  document.querySelector('.tab-bar').style.top = (isYearTab || isComparative) ? '108px' : '60px';

  renderActiveTab();
}

// ── FILTERS ─────────────────────────────────────────────────────────────────
function getFilters() {
  return {
    accountType: document.getElementById('accountTypeFilter').value,
    parties:     getSelectedParties()
  };
}

function applyFilters() {
  renderActiveTab();
}

function resetFilters() {
  document.getElementById('accountTypeFilter').value = '';
  buildPartyList(); // Rebuild with all parties
  document.getElementById('partySearch').value = '';
  filterPartyList();
  renderActiveTab();
}

// ── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderComparatives({ accountType: '', parties: PARTIES });
  YEARS.forEach(y => {
    const el = document.getElementById('year-' + y + '-content');
    if (el) renderYearTab(y, el, { accountType:'', parties: PARTIES });
  });
}

function renderActiveTab() {
  if (currentTab === 'dashboard') {
    renderDashboard(); // Dashboard ignores filters
  } else if (currentTab === 'comparatives') {
    renderComparatives(getFilters());
  } else if (currentTab.startsWith('year-')) {
    const year = parseInt(currentTab.replace('year-', ''));
    const el   = document.getElementById('year-' + year + '-content');
    if (el) renderYearTab(year, el, getFilters());
  }
}

// ── DASHBOARD TAB ─────────────────────────────────────────────────────────────
function renderDashboard() {
  renderDashKpis();
  renderDashSummary();
}

function renderDashKpis() {
  // Latest year totals
  const ly  = RAW.filter(d => d.year === LATEST_YEAR);

  const sum = (arr, key) => arr.reduce((a,b) => a + (b[key]||0), 0);

  const curTotal   = sum(ly, 'total_value');
  const curShipped = sum(ly, 'ytd_shipped_value');
  const curLYTD    = sum(ly, 'lytd_shipped_value');
  const curUnits   = sum(ly, 'total_units');
  const curOrders  = sum(ly, 'order_count');
  const curOnOrder = sum(ly, 'on_order_value');

  // YTD Shipped Value vs LYTD Shipped Value growth
  const ytdGrowth = curLYTD ? (curShipped - curLYTD) / curLYTD : null;

  // Update badge text with actual year
  const badge = document.getElementById('dashSummaryBadge');
  if (badge) badge.textContent = LATEST_YEAR;

  const grid = document.getElementById('dashKpiGrid');
  grid.innerHTML = `
    ${kpiCard('💰 Total Revenue', fmtVal(curTotal), LATEST_YEAR, null, LATEST_YEAR)}
    ${kpiCard('📦 YTD Shipped Value', fmtVal(curShipped), LATEST_YEAR, ytdGrowth, 'vs LYTD')}
    ${kpiCard('⏳ On Order Value', fmtVal(curOnOrder), LATEST_YEAR, null, LATEST_YEAR)}
    ${kpiCard('🔢 Total Units', fmtNum(curUnits, 0), LATEST_YEAR, null, LATEST_YEAR)}
    ${kpiCard('📋 Order Count', fmtNum(curOrders,0), LATEST_YEAR, null, LATEST_YEAR)}
  `;
}

function kpiCard(label, value, year, growth, sub) {
  let badge = '';
  if (growth !== null && growth !== undefined) {
    const cls = growth >= 0 ? 'up' : 'dn';
    const arrow = growth >= 0 ? '▲' : '▼';
    badge = `<div class="kpi-badge ${cls}">${arrow} ${Math.abs(growth*100).toFixed(1)}% ${sub}</div>`;
  }
  return `
    <div class="kpi-card">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${value}</div>
      ${badge || (sub ? `<div class="kpi-sub">${sub}</div>` : '')}
    </div>`;
}

function renderDashSummary() {
  const container = document.getElementById('dashSummaryContainer');
  let html = '';

  YEARS.slice().reverse().forEach((year, idx) => {
    const isLatest = year === LATEST_YEAR;
    const marginTop = idx === 0 ? '0' : '28px';

    // Compute totals per sheet for this year
    const yearData = RAW.filter(d => d.year === year);
    const totalYTDShippedValue = yearData.reduce((a, b) => a + (b.ytd_shipped_value || 0), 0);

    // For non-latest years, get previous year data for LY growth
    const prevYear = year - 1;
    const prevYearData = RAW.filter(d => d.year === prevYear);

    html += `
      <div style="margin-top:${marginTop};">
        <div class="sec-header" style="margin-top:0;">
          <div class="sec-title">📋 ${year} Revenue Summary <span class="sec-badge" style="background:var(--accent-light);color:var(--accent);">By Account Type</span></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Account Type</th>
                <th class="th-right">On Order Units</th>
                <th class="th-right">YTD Shipped</th>
                <th class="th-right">Total Units</th>
                <th class="th-right">On Order Value</th>
                <th class="th-right">YTD Shipped Value</th>
                <th class="th-right">Total Value</th>
                <th class="th-right">Order Count</th>
                ${isLatest ? '<th class="th-right">LYTD Shipped Qty</th><th class="th-right">LYTD Shipped Value</th>' : ''}
                <th class="th-right">LY Growth Qty</th>
                <th class="th-right">LY Growth Value</th>
                <th class="th-right">Share</th>
              </tr>
            </thead>
            <tbody>`;

    let grandTotals = initTotals();

    SHEETS.forEach(sheet => {
      const rows = yearData.filter(d => d.sheet === sheet);
      if (!rows.length) return;
      const t = totalise(rows);
      accumulateTotals(grandTotals, t);

      // Correct share: this sheet's ytd_shipped_value / total ytd_shipped_value
      const share = totalYTDShippedValue ? t.ytd_shipped_value / totalYTDShippedValue : 0;

      // Correct LY growth
      let lyGrowthQty = null;
      let lyGrowthValue = null;

      if (isLatest) {
        // Current year: YTD Shipped vs LYTD Shipped Qty/Value
        if (t.lytd_shipped_qty && t.lytd_shipped_qty > 0) {
          lyGrowthQty = (t.ytd_shipped - t.lytd_shipped_qty) / t.lytd_shipped_qty;
        }
        if (t.lytd_shipped_value && t.lytd_shipped_value > 0) {
          lyGrowthValue = (t.ytd_shipped_value - t.lytd_shipped_value) / t.lytd_shipped_value;
        }
      } else {
        // Rest years: YTD Shipped vs prev year YTD Shipped
        const prevRows = prevYearData.filter(d => d.sheet === sheet);
        if (prevRows.length) {
          const prevT = totalise(prevRows);
          if (prevT.ytd_shipped && prevT.ytd_shipped > 0) {
            lyGrowthQty = (t.ytd_shipped - prevT.ytd_shipped) / prevT.ytd_shipped;
          }
          if (prevT.ytd_shipped_value && prevT.ytd_shipped_value > 0) {
            lyGrowthValue = (t.ytd_shipped_value - prevT.ytd_shipped_value) / prevT.ytd_shipped_value;
          }
        }
      }

      html += dashSummaryRow(sheet, t, isLatest, share, lyGrowthQty, lyGrowthValue);
    });

    // Grand total LY growth
    let gtLyGrowthQty = null;
    let gtLyGrowthValue = null;
    if (isLatest) {
      if (grandTotals.lytd_shipped_qty > 0) {
        gtLyGrowthQty = (grandTotals.ytd_shipped - grandTotals.lytd_shipped_qty) / grandTotals.lytd_shipped_qty;
      }
      if (grandTotals.lytd_shipped_value > 0) {
        gtLyGrowthValue = (grandTotals.ytd_shipped_value - grandTotals.lytd_shipped_value) / grandTotals.lytd_shipped_value;
      }
    } else {
      const prevTotalYTDQty = prevYearData.reduce((a, b) => a + (b.ytd_shipped || 0), 0);
      const prevTotalYTDVal = prevYearData.reduce((a, b) => a + (b.ytd_shipped_value || 0), 0);
      if (prevTotalYTDQty > 0) {
        gtLyGrowthQty = (grandTotals.ytd_shipped - prevTotalYTDQty) / prevTotalYTDQty;
      }
      if (prevTotalYTDVal > 0) {
        gtLyGrowthValue = (grandTotals.ytd_shipped_value - prevTotalYTDVal) / prevTotalYTDVal;
      }
    }

    html += `<tr class="tr-grandtotal">
      <td>TOTAL</td>
      <td class="td-right">${fmtNum(grandTotals.on_order_units)}</td>
      <td class="td-right">${fmtNum(grandTotals.ytd_shipped)}</td>
      <td class="td-right">${fmtNum(grandTotals.total_units)}</td>
      <td class="td-right">${fmtVal(grandTotals.on_order_value)}</td>
      <td class="td-right">${fmtVal(grandTotals.ytd_shipped_value)}</td>
      <td class="td-right">${fmtVal(grandTotals.total_value)}</td>
      <td class="td-right">${fmtNum(grandTotals.order_count,0)}</td>
      ${isLatest ? `<td class="td-right">${fmtNum(grandTotals.lytd_shipped_qty)}</td><td class="td-right">${fmtVal(grandTotals.lytd_shipped_value)}</td>` : ''}
      <td class="td-right">${fmtGrowth(gtLyGrowthQty)}</td>
      <td class="td-right">${fmtGrowth(gtLyGrowthValue)}</td>
      <td class="td-right">100%</td>
    </tr>`;

    html += `</tbody></table></div></div>`;
  });

  container.innerHTML = html;
}

// Dashboard summary row with custom share and growth
function dashSummaryRow(label, t, isLatest, share, lyGrowthQty, lyGrowthValue) {
  return `<tr>
    <td class="td-bold">${esc(label)}</td>
    <td class="td-right">${fmtNum(t.on_order_units)}</td>
    <td class="td-right">${fmtNum(t.ytd_shipped)}</td>
    <td class="td-right td-accent">${fmtNum(t.total_units)}</td>
    <td class="td-right">${fmtVal(t.on_order_value)}</td>
    <td class="td-right">${fmtVal(t.ytd_shipped_value)}</td>
    <td class="td-right td-accent">${fmtVal(t.total_value)}</td>
    <td class="td-right">${fmtNum(t.order_count,0)}</td>
    ${isLatest ? `<td class="td-right td-muted">${fmtNum(t.lytd_shipped_qty)}</td><td class="td-right td-muted">${fmtVal(t.lytd_shipped_value)}</td>` : ''}
    <td class="td-right">${fmtGrowth(lyGrowthQty)}</td>
    <td class="td-right">${fmtGrowth(lyGrowthValue)}</td>
    <td class="td-right">${fmtPct(share)}</td>
  </tr>`;
}

// ── COMPARATIVES TAB ─────────────────────────────────────────────────────────
function renderComparatives(filters) {
  const container = document.getElementById('comparativesContent');

  // Filter data based on account type and/or parties
  let filteredData = RAW;
  if (filters.accountType) {
    filteredData = filteredData.filter(d => d.sheet === filters.accountType);
  }
  const allVisibleParties = [...document.querySelectorAll('#partyList input[type=checkbox]')].map(cb => cb.value);
  if (filters.parties && filters.parties.length < allVisibleParties.length) {
    filteredData = filteredData.filter(d => filters.parties.includes(d.retailer));
  }

  // Determine title based on filter state
  let filterDesc = 'All Accounts';
  if (filters.accountType && filters.parties && filters.parties.length < allVisibleParties.length) {
    filterDesc = filters.accountType + ' · ' + (filters.parties.length === 1 ? filters.parties[0] : filters.parties.length + ' Parties');
  } else if (filters.accountType) {
    filterDesc = filters.accountType;
  } else if (filters.parties && filters.parties.length < allVisibleParties.length) {
    filterDesc = filters.parties.length === 1 ? filters.parties[0] : filters.parties.length + ' Parties';
  }

  // Aggregate data per year
  const yearsDesc = YEARS.slice().reverse();
  const yearTotals = {};
  yearsDesc.forEach(year => {
    const yearRows = filteredData.filter(d => d.year === year);
    yearTotals[year] = totalise(yearRows);
  });

  // Helper to compute LY growth for a year
  function calcGrowth(year, qtyKey, valKey) {
    const t = yearTotals[year];
    const isLatest = year === LATEST_YEAR;
    let gQty = null, gVal = null;
    if (isLatest) {
      if (t.lytd_shipped_qty > 0) gQty = (t.ytd_shipped - t.lytd_shipped_qty) / t.lytd_shipped_qty;
      if (t.lytd_shipped_value > 0) gVal = (t.ytd_shipped_value - t.lytd_shipped_value) / t.lytd_shipped_value;
    } else {
      const prevT = yearTotals[year - 1];
      if (prevT && prevT.ytd_shipped > 0) gQty = (t.ytd_shipped - prevT.ytd_shipped) / prevT.ytd_shipped;
      if (prevT && prevT.ytd_shipped_value > 0) gVal = (t.ytd_shipped_value - prevT.ytd_shipped_value) / prevT.ytd_shipped_value;
    }
    return { gQty, gVal };
  }

  // Metric groups with sections
  const sections = [
    { section: 'Units', metrics: [
      { key: 'on_order_units',    label: 'On Order Units',    fmt: 'num' },
      { key: 'ytd_shipped',       label: 'YTD Shipped',       fmt: 'num' },
      { key: 'total_units',       label: 'Total Units',       fmt: 'num', highlight: true },
    ]},
    { section: 'Revenue', metrics: [
      { key: 'on_order_value',    label: 'On Order Value',    fmt: 'val' },
      { key: 'ytd_shipped_value', label: 'YTD Shipped Value', fmt: 'val' },
      { key: 'total_value',       label: 'Total Value',       fmt: 'val', highlight: true },
    ]},
    { section: 'Operations', metrics: [
      { key: 'order_count',       label: 'Order Count',       fmt: 'num' },
    ]},
    { section: 'Year-over-Year', metrics: [
      { key: 'lytd_shipped_qty',  label: 'LYTD Shipped Qty',  fmt: 'num' },
      { key: 'lytd_shipped_value',label: 'LYTD Shipped Value',fmt: 'val' },
      { key: 'ly_growth_qty',     label: 'LY Growth:  Qty',   fmt: 'growth' },
      { key: 'ly_growth_value',   label: 'LY Growth:  Value', fmt: 'growth' },
      { key: 'share',             label: 'Share',             fmt: 'pct' },
    ]},
  ];

  let html = `
    <div class="sec-header" style="margin-top:0;">
      <div class="sec-title">📈 Year-over-Year Comparative <span class="yoy-filter-badge">${esc(filterDesc)}</span></div>
    </div>
    <div class="yoy-wrap">
      <table class="yoy-table">
        <thead>
          <tr>
            <th>Metric</th>
            ${yearsDesc.map(y => `<th>${y}</th>`).join('')}
          </tr>
        </thead>
        <tbody>`;

  sections.forEach(sec => {
    // Section header row
    html += `<tr class="yoy-section-row"><td colspan="${yearsDesc.length + 1}">${sec.section}</td></tr>`;

    sec.metrics.forEach(m => {
      const rowClass = m.highlight ? ' class="yoy-highlight"' : (m.fmt === 'growth' ? ' class="yoy-growth-row"' : '');
      html += `<tr${rowClass}>
        <td>${m.label}</td>`;

      yearsDesc.forEach(year => {
        const t = yearTotals[year];

        if (m.key === 'ly_growth_qty') {
          const g = calcGrowth(year);
          html += `<td>${fmtGrowth(g.gQty)}</td>`;
        } else if (m.key === 'ly_growth_value') {
          const g = calcGrowth(year);
          html += `<td>${fmtGrowth(g.gVal)}</td>`;
        } else if (m.key === 'share') {
          html += `<td>100.0%</td>`;
        } else if (m.fmt === 'num') {
          html += `<td>${fmtNum(t[m.key])}</td>`;
        } else if (m.fmt === 'val') {
          html += `<td>${fmtVal(t[m.key])}</td>`;
        } else {
          html += `<td>—</td>`;
        }
      });

      html += `</tr>`;
    });
  });

  html += `</tbody></table></div>`;

  container.innerHTML = html;
}

// ── YEAR TAB ─────────────────────────────────────────────────────────────────
function renderYearTab(year, container, filters) {
  const isLatest = year === LATEST_YEAR;

  // Filter data
  let data = RAW.filter(d => d.year === year);

  // Get prev year data (same filters) for LY growth calc
  let prevData = RAW.filter(d => d.year === year - 1);
  if (filters.accountType) prevData = prevData.filter(d => d.sheet === filters.accountType);
  if (filters.parties && filters.parties.length < [...document.querySelectorAll('#partyList input[type=checkbox]')].length) {

  html += `

  } else {

      html += `<tr class="tr-account-header"><td class="sticky-col sticky-col-0" style="padding:8px 13px;">▸ ${sheet}</td><td class="sticky-col sticky-col-1" style="padding:8px 13px;"></td><td class="sticky-col sticky-col-2" style="padding:8px 13px;"></td><td colspan="${isLatest ? 12 : 10}" style="padding:8px 13px;"></td></tr>`;

      let sheetTotals = initTotals();
      sheetRows.forEach(r => {
        accumulateTotals(sheetTotals, r);
        html += detailRow(r, isLatest);
      });

      // Compute LY growth for this account subtotal
      let stGrowthQty = null, stGrowthVal = null;
      if (isLatest) {
        if (sheetTotals.lytd_shipped_qty > 0) stGrowthQty = (sheetTotals.ytd_shipped - sheetTotals.lytd_shipped_qty) / sheetTotals.lytd_shipped_qty;
        if (sheetTotals.lytd_shipped_value > 0) stGrowthVal = (sheetTotals.ytd_shipped_value - sheetTotals.lytd_shipped_value) / sheetTotals.lytd_shipped_value;
      } else {
        const prevSheetRows = prevData.filter(d => d.sheet === sheet);
        if (prevSheetRows.length) {
          const prevT = totalise(prevSheetRows);
          if (prevT.ytd_shipped > 0) stGrowthQty = (sheetTotals.ytd_shipped - prevT.ytd_shipped) / prevT.ytd_shipped;
          if (prevT.ytd_shipped_value > 0) stGrowthVal = (sheetTotals.ytd_shipped_value - prevT.ytd_shipped_value) / prevT.ytd_shipped_value;
        }
      }

      html += subTotalRow(sheet + ' Total', sheetTotals, isLatest, stGrowthQty, stGrowthVal);
    });

    // Grand total
    const filteredTotals = initTotals();
    data.forEach(r => accumulateTotals(filteredTotals, r));

    // Compute LY growth for grand total
    let gtGrowthQty = null, gtGrowthVal = null;
    if (isLatest) {
      if (filteredTotals.lytd_shipped_qty > 0) gtGrowthQty = (filteredTotals.ytd_shipped - filteredTotals.lytd_shipped_qty) / filteredTotals.lytd_shipped_qty;
      if (filteredTotals.lytd_shipped_value > 0) gtGrowthVal = (filteredTotals.ytd_shipped_value - filteredTotals.lytd_shipped_value) / filteredTotals.lytd_shipped_value;
    } else if (prevData.length) {
      const prevGT = totalise(prevData);
      if (prevGT.ytd_shipped > 0) gtGrowthQty = (filteredTotals.ytd_shipped - prevGT.ytd_shipped) / prevGT.ytd_shipped;
      if (prevGT.ytd_shipped_value > 0) gtGrowthVal = (filteredTotals.ytd_shipped_value - prevGT.ytd_shipped_value) / prevGT.ytd_shipped_value;

    html += grandTotalRow('GRAND TOTAL', filteredTotals, isLatest, false, gtGrowthQty, gtGrowthVal);
  }

  html += `</tbody></table></div>`;

  container.innerHTML = html;
  fixStickyOffsets(container);
}

// Compute left offsets for sticky columns based on actual rendered widths
function fixStickyOffsets(container) {
  const table = container.querySelector('.year-table-wrap table');
  if (!table) return;
  const headerCells = table.querySelectorAll('thead th');
  if (headerCells.length < 3) return;
  const w0 = headerCells[0].getBoundingClientRect().width;
  const w1 = headerCells[1].getBoundingClientRect().width;
  table.querySelectorAll('.sticky-col-0').forEach(el => { el.style.left = '0px'; });
  table.querySelectorAll('.sticky-col-1').forEach(el => { el.style.left = w0 + 'px'; });
  table.querySelectorAll('.sticky-col-2').forEach(el => { el.style.left = (w0 + w1) + 'px'; });
}

// ── AGGREGATION HELPERS ───────────────────────────────────────────────────────
function initTotals() {
  return {
    on_order_units: 0, ytd_shipped: 0, total_units: 0,
    on_order_value: 0, ytd_shipped_value: 0, total_value: 0,
    order_count: 0, lytd_shipped_qty: 0, lytd_shipped_value: 0,
    share_sum: 0, ly_growth_qty_avg: null, ly_growth_value_avg: null,
    _lyq_count: 0, _lyv_count: 0, _lyq_sum: 0, _lyv_sum: 0
  };
}

function accumulateTotals(t, r) {
  t.on_order_units     += r.on_order_units     || 0;
  t.ytd_shipped        += r.ytd_shipped        || 0;
  t.total_units        += r.total_units        || 0;
  t.on_order_value     += r.on_order_value     || 0;
  t.ytd_shipped_value  += r.ytd_shipped_value  || 0;
  t.total_value        += r.total_value        || 0;
  t.order_count        += r.order_count        || 0;
  t.lytd_shipped_qty   += r.lytd_shipped_qty   || 0;
  t.lytd_shipped_value += r.lytd_shipped_value || 0;
  t.share_sum          += r.share              || 0;
  if (r.ly_growth_qty  && r.ly_growth_qty  !== 0 && r.ly_growth_qty  > -1) { t._lyq_sum += r.ly_growth_qty;  t._lyq_count++; }
  if (r.ly_growth_value && r.ly_growth_value !== 0 && r.ly_growth_value > -1) { t._lyv_sum += r.ly_growth_value; t._lyv_count++; }
  t.ly_growth_qty_avg   = t._lyq_count  ? t._lyq_sum  / t._lyq_count  : null;
  t.ly_growth_value_avg = t._lyv_count  ? t._lyv_sum  / t._lyv_count  : null;
}

function totalise(rows) {
  const t = initTotals();
  rows.forEach(r => accumulateTotals(t, r));
  return t;
}

// ── FORMAT HELPERS ────────────────────────────────────────────────────────────
function fmtNum(v, decimals=0) {
  if (v === null || v === undefined) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  if (decimals === 0) return n.toLocaleString('en-US', {maximumFractionDigits:0});
  return n.toLocaleString('en-US', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}

function fmtVal(v) {
  if (v === null || v === undefined) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return (n * 100).toFixed(1) + '%';
}

function fmtGrowth(v) {
  if (v === null || v === undefined) return '<span class="td-muted">—</span>';
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return '<span class="td-muted">—</span>';
  if (n <= -1) return '<span class="td-muted">—</span>';
  const pct  = (n * 100).toFixed(1) + '%';
  const cls  = n >= 0 ? 'td-green' : 'td-red';
  const arrow = n >= 0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${pct}</span>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setRefreshState(loading) {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  const indicator = document.getElementById('liveIndicator');
  if (loading) {
    btn.disabled = true;
    btn.classList.add('spinning');
    if (indicator) indicator.classList.remove('visible');
  } else {
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}

async function refreshData() {
  try {
    setRefreshState(true);
    await loadData();
    setRefreshState(false);
    // Switch back to dashboard after refresh
    switchTab('dashboard');
  } catch (err) {
    console.error('Refresh error:', err);
    setRefreshState(false);
  }
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
// The button always exports a complete workbook snapshot (all data, unfiltered):
//   Sheet 1 "Dashboard"    → per-year Revenue Summary tables, then the YoY summary below
//   Sheet 2 "Comparative"  → the year-over-year comparative table
//   Sheet 3+ "<year>"      → each year's party-level detail on its own sheet
const XLS_FMT = { num: '#,##0', val: '$#,##0.00', pct: '0.0%', text: null };

// Convert a growth fraction into a cell value (blank when not meaningful — mirrors fmtGrowth)
function gCell(v) {
  if (v === null || v === undefined) return '';
  const n = parseFloat(v);
  if (isNaN(n) || n === 0 || n <= -1) return '';
  return n;
}

// Build a worksheet from an array-of-arrays + a parallel grid of Excel number-format codes.
// fmtGrid[r][c] is a format code (or null/undefined). Only applied to numeric cells.
function aoaToSheetGrid(aoa, fmtGrid, colWidths) {
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const cell = ws[addr];
      if (!cell || typeof cell.v !== 'number') continue;
      const z = (fmtGrid[R] && fmtGrid[R][C]) || null;
      if (z) cell.z = z;
    }
  }
  if (colWidths) ws['!cols'] = colWidths;
  return ws;
}

// ── BLOCK: one year's Revenue Summary (by account type) ──
// Returns { aoa, fmt } so it can be stacked onto the Dashboard sheet.
function blockYearSummary(year) {
  const isLatest = year === LATEST_YEAR;
  const yearData = RAW.filter(d => d.year === year);
  const totalYTDShippedValue = yearData.reduce((a, b) => a + (b.ytd_shipped_value || 0), 0);
  const prevYearData = RAW.filter(d => d.year === year - 1);

  const headers = ['Account Type', 'On Order Units', 'YTD Shipped', 'Total Units',
    'On Order Value', 'YTD Shipped Value', 'Total Value', 'Order Count'];
  const colFmt = ['text', 'num', 'num', 'num', 'val', 'val', 'val', 'num'];
  if (isLatest) { headers.push('LYTD Shipped Qty', 'LYTD Shipped Value'); colFmt.push('num', 'val'); }
  headers.push('LY Growth Qty', 'LY Growth Value', 'Share');
  colFmt.push('pct', 'pct', 'pct');

  const fmtRow = colFmt.map(t => XLS_FMT[t]);
  const aoa = [[year + ' Revenue Summary'], headers];
  const fmt = [[null], headers.map(() => null)];
  const grand = initTotals();

  SHEETS.forEach(sheet => {
    const rows = yearData.filter(d => d.sheet === sheet);
    if (!rows.length) return;
    const t = totalise(rows);
    accumulateTotals(grand, t);
    const share = totalYTDShippedValue ? t.ytd_shipped_value / totalYTDShippedValue : 0;

    let gQty = null, gVal = null;
    if (isLatest) {
      if (t.lytd_shipped_qty > 0)   gQty = (t.ytd_shipped - t.lytd_shipped_qty) / t.lytd_shipped_qty;
      if (t.lytd_shipped_value > 0) gVal = (t.ytd_shipped_value - t.lytd_shipped_value) / t.lytd_shipped_value;
    } else {
      const prevRows = prevYearData.filter(d => d.sheet === sheet);
      if (prevRows.length) {
        const p = totalise(prevRows);
        if (p.ytd_shipped > 0)       gQty = (t.ytd_shipped - p.ytd_shipped) / p.ytd_shipped;
        if (p.ytd_shipped_value > 0) gVal = (t.ytd_shipped_value - p.ytd_shipped_value) / p.ytd_shipped_value;
      }
    }

    const row = [sheet, t.on_order_units, t.ytd_shipped, t.total_units,
      t.on_order_value, t.ytd_shipped_value, t.total_value, t.order_count];
    if (isLatest) row.push(t.lytd_shipped_qty, t.lytd_shipped_value);
    row.push(gCell(gQty), gCell(gVal), share);
    aoa.push(row);
    fmt.push(fmtRow);
  });

  // Grand total
  let gtQty = null, gtVal = null;
  if (isLatest) {
    if (grand.lytd_shipped_qty > 0)   gtQty = (grand.ytd_shipped - grand.lytd_shipped_qty) / grand.lytd_shipped_qty;
    if (grand.lytd_shipped_value > 0) gtVal = (grand.ytd_shipped_value - grand.lytd_shipped_value) / grand.lytd_shipped_value;
  } else {
    const pQty = prevYearData.reduce((a, b) => a + (b.ytd_shipped || 0), 0);
    const pVal = prevYearData.reduce((a, b) => a + (b.ytd_shipped_value || 0), 0);
    if (pQty > 0) gtQty = (grand.ytd_shipped - pQty) / pQty;
    if (pVal > 0) gtVal = (grand.ytd_shipped_value - pVal) / pVal;
  }
  const gtRow = ['TOTAL', grand.on_order_units, grand.ytd_shipped, grand.total_units,
    grand.on_order_value, grand.ytd_shipped_value, grand.total_value, grand.order_count];
  if (isLatest) gtRow.push(grand.lytd_shipped_qty, grand.lytd_shipped_value);
  gtRow.push(gCell(gtQty), gCell(gtVal), 1);
  aoa.push(gtRow);
  fmt.push(fmtRow);

  return { aoa, fmt };
}

// ── BLOCK: the year-over-year comparative table (all accounts, all data) ──
// Returns { aoa, fmt }.
function blockComparative() {
  const data = RAW;
  const yearsDesc = YEARS.slice().reverse();
  const yearTotals = {};
  yearsDesc.forEach(y => { yearTotals[y] = totalise(data.filter(d => d.year === y)); });

  function calcGrowth(year) {
    const t = yearTotals[year];
    let gQty = null, gVal = null;
    if (year === LATEST_YEAR) {
      if (t.lytd_shipped_qty > 0)   gQty = (t.ytd_shipped - t.lytd_shipped_qty) / t.lytd_shipped_qty;
      if (t.lytd_shipped_value > 0) gVal = (t.ytd_shipped_value - t.lytd_shipped_value) / t.lytd_shipped_value;
    } else {
      const p = yearTotals[year - 1];
      if (p && p.ytd_shipped > 0)       gQty = (t.ytd_shipped - p.ytd_shipped) / p.ytd_shipped;
      if (p && p.ytd_shipped_value > 0) gVal = (t.ytd_shipped_value - p.ytd_shipped_value) / p.ytd_shipped_value;
    }
    return { gQty, gVal };
  }

  const sections = [
    { section: 'Units',          metrics: [['on_order_units','On Order Units','num'],['ytd_shipped','YTD Shipped','num'],['total_units','Total Units','num']] },
    { section: 'Revenue',        metrics: [['on_order_value','On Order Value','val'],['ytd_shipped_value','YTD Shipped Value','val'],['total_value','Total Value','val']] },
    { section: 'Operations',     metrics: [['order_count','Order Count','num']] },
    { section: 'Year-over-Year', metrics: [['lytd_shipped_qty','LYTD Shipped Qty','num'],['lytd_shipped_value','LYTD Shipped Value','val'],['ly_growth_qty','LY Growth: Qty','growth'],['ly_growth_value','LY Growth: Value','growth'],['share','Share','pct']] },
  ];

  const headers = ['Metric', ...yearsDesc.map(String)];
  const aoa = [headers];
  const fmt = [headers.map(() => null)];

  sections.forEach(sec => {
    aoa.push([sec.section]);            // section header row
    fmt.push([null]);
    sec.metrics.forEach(([key, label, mf]) => {
      const code = XLS_FMT[mf === 'growth' ? 'pct' : mf] || null;
      const row = [label];
      const frow = [null];
      yearsDesc.forEach(year => {
        const t = yearTotals[year];
        if (key === 'ly_growth_qty')        row.push(gCell(calcGrowth(year).gQty));
        else if (key === 'ly_growth_value') row.push(gCell(calcGrowth(year).gVal));
        else if (key === 'share')           row.push(1);
        else                                row.push(t[key] || 0);
        frow.push(code);
      });
      aoa.push(row);
      fmt.push(frow);
    });
  });

  return { aoa, fmt, ncols: headers.length };
}

// ── BLOCK: the 5 KPI "cards" (latest year) laid out across one row ──
// Returns { aoa, fmt }: a title row, a row of labels, and a row of values.
function blockKpiCards() {
  const ly = RAW.filter(d => d.year === LATEST_YEAR);
  const sum = (k) => ly.reduce((a, b) => a + (b[k] || 0), 0);
  const labels = ['Total Revenue', 'YTD Shipped Value', 'On Order Value', 'Total Units', 'Order Count'];
  const values = [sum('total_value'), sum('ytd_shipped_value'), sum('on_order_value'), sum('total_units'), sum('order_count')];
  const valFmt = [XLS_FMT.val, XLS_FMT.val, XLS_FMT.val, XLS_FMT.num, XLS_FMT.num];
  return {
    aoa: [[LATEST_YEAR + ' Revenue Summary'], labels, values],
    fmt: [[null], labels.map(() => null), valFmt]
  };
}

// ── SHEET 1: Dashboard (KPI cards row, then per-year summaries stacked, then YoY summary) ──
function composeDashboardSheet() {
  const aoa = [], fmt = [];
  const push = (b) => b.aoa.forEach((r, i) => { aoa.push(r); fmt.push(b.fmt[i] || []); });
  const blank = (n = 1) => { for (let i = 0; i < n; i++) { aoa.push([]); fmt.push([]); } };

  // KPI cards row first (no YoY here)
  push(blockKpiCards());
  blank(2);

  YEARS.slice().reverse().forEach((y, idx) => {
    if (idx > 0) blank(2);
    push(blockYearSummary(y));
  });

  const maxCols = aoa.reduce((m, r) => Math.max(m, r.length), 0);
  const widths = Array.from({ length: maxCols }, (_, i) => ({ wch: i === 0 ? 26 : 16 }));
  return { name: 'Dashboard', ws: aoaToSheetGrid(aoa, fmt, widths) };
}

// ── SHEET 2: Comparative ──
function composeComparativeSheet() {
  const b = blockComparative();
  const widths = Array.from({ length: b.ncols }, (_, i) => ({ wch: i === 0 ? 22 : 16 }));
  return { name: 'Comparative', ws: aoaToSheetGrid(b.aoa, b.fmt, widths) };
}

// ── SHEET 3+: one sheet per year (party-level detail, all data) ──
function composeYearSheet(year) {
  const isLatest = year === LATEST_YEAR;
  const data = RAW.filter(d => d.year === year);
  const prevData = RAW.filter(d => d.year === year - 1);

  const headers = ['Account Type', 'Country', 'Party / Retailer', 'On Order Units', 'YTD Shipped',
    'Total Units', 'On Order Value', 'YTD Shipped Value', 'Total Value', 'Order Count'];
  const colFmt = ['text', 'text', 'text', 'num', 'num', 'num', 'val', 'val', 'val', 'num'];
  if (isLatest) { headers.push('LYTD Shipped Qty', 'LYTD Shipped Value'); colFmt.push('num', 'val'); }
  headers.push('LY Growth Qty', 'LY Growth Value', 'Share');
  colFmt.push('pct', 'pct', 'pct');

  const fmtRow = colFmt.map(t => XLS_FMT[t]);
  const aoa = [headers];
  const fmt = [headers.map(() => null)];
  const pad = (arr) => { while (arr.length < headers.length) arr.push(''); return arr; };

  SHEETS.forEach(sheet => {
    const sheetRows = data.filter(d => d.sheet === sheet);
    if (!sheetRows.length) return;

    aoa.push(pad(['▸ ' + sheet])); fmt.push([]);   // account-type header row

    const st = initTotals();
    sheetRows.forEach(r => {
      accumulateTotals(st, r);
      const row = [r.sheet, r.country, r.retailer, r.on_order_units, r.ytd_shipped,
        r.total_units, r.on_order_value, r.ytd_shipped_value, r.total_value, r.order_count];
      if (isLatest) row.push(r.lytd_shipped_qty, r.lytd_shipped_value);
      row.push(gCell(r.ly_growth_qty), gCell(r.ly_growth_value), (r.share || 0));
      aoa.push(row); fmt.push(fmtRow);
    });

    let sQty = null, sVal = null;
    if (isLatest) {
      if (st.lytd_shipped_qty > 0)   sQty = (st.ytd_shipped - st.lytd_shipped_qty) / st.lytd_shipped_qty;
      if (st.lytd_shipped_value > 0) sVal = (st.ytd_shipped_value - st.lytd_shipped_value) / st.lytd_shipped_value;
    } else {
      const prevSheet = prevData.filter(d => d.sheet === sheet);
      if (prevSheet.length) {
        const p = totalise(prevSheet);
        if (p.ytd_shipped > 0)       sQty = (st.ytd_shipped - p.ytd_shipped) / p.ytd_shipped;
        if (p.ytd_shipped_value > 0) sVal = (st.ytd_shipped_value - p.ytd_shipped_value) / p.ytd_shipped_value;
      }
    }
    const stRow = ['∑ ' + sheet + ' Total', '', '', st.on_order_units, st.ytd_shipped,
      st.total_units, st.on_order_value, st.ytd_shipped_value, st.total_value, st.order_count];
    if (isLatest) stRow.push(st.lytd_shipped_qty, st.lytd_shipped_value);
    stRow.push(gCell(sQty), gCell(sVal), st.share_sum);
    aoa.push(stRow); fmt.push(fmtRow);
  });

  // Grand total
  if (data.length) {
    const gt = initTotals();
    data.forEach(r => accumulateTotals(gt, r));
    let gQty = null, gVal = null;
    if (isLatest) {
      if (gt.lytd_shipped_qty > 0)   gQty = (gt.ytd_shipped - gt.lytd_shipped_qty) / gt.lytd_shipped_qty;
      if (gt.lytd_shipped_value > 0) gVal = (gt.ytd_shipped_value - gt.lytd_shipped_value) / gt.lytd_shipped_value;
    } else if (prevData.length) {
      const p = totalise(prevData);
      if (p.ytd_shipped > 0)       gQty = (gt.ytd_shipped - p.ytd_shipped) / p.ytd_shipped;
      if (p.ytd_shipped_value > 0) gVal = (gt.ytd_shipped_value - p.ytd_shipped_value) / p.ytd_shipped_value;
    }
    const gtRow = ['GRAND TOTAL', '', '', gt.on_order_units, gt.ytd_shipped,
      gt.total_units, gt.on_order_value, gt.ytd_shipped_value, gt.total_value, gt.order_count];
    if (isLatest) gtRow.push(gt.lytd_shipped_qty, gt.lytd_shipped_value);
    gtRow.push(gCell(gQty), gCell(gVal), 1);
    aoa.push(gtRow); fmt.push(fmtRow);
  }

  return { name: String(year).slice(0, 31), ws: aoaToSheetGrid(aoa, fmt, colWidthsFromHeaders(headers)) };
}

function colWidthsFromHeaders(headers) {
  return headers.map(h => ({ wch: Math.max(12, String(h).length + 2) }));
}

// ── Main download handler — builds the complete workbook ──
function downloadExcel() {
  if (typeof XLSX === 'undefined') {
    alert('The Excel library could not be loaded. Please check your internet connection and try again.');
    return;
  }
  if (!RAW || !RAW.length) {
    alert('No data has loaded yet. Please wait for the dashboard to finish loading.');
    return;
  }

  try {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, composeDashboardSheet().ws, 'Dashboard');
    XLSX.utils.book_append_sheet(wb, composeComparativeSheet().ws, 'Comparative');
    YEARS.slice().reverse().forEach(year => {
      const s = composeYearSheet(year);
      XLSX.utils.book_append_sheet(wb, s.ws, s.name);
    });

    const today = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `Skillmatics_Revenue_${today}.xlsx`);
  } catch (err) {
    console.error('Excel export error:', err);
    alert('Sorry, something went wrong while building the Excel file.');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPass').focus();
  });

  // Auto-login if session is still active (survives refresh)
  if (sessionStorage.getItem('sk_rev_logged_in') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    const loadOv = document.getElementById('loadingOverlay');
    loadOv.style.display = 'flex';
    loadOv.style.opacity = '1';

    const statusEl = document.getElementById('loadingStatus');
    const subEl    = document.getElementById('loadingSubStatus');
    const messages = [
      ['Connecting to data source…', 'This may take a moment'],
      ['Fetching revenue records…', 'Pulling latest figures'],
      ['Processing account data…', 'Crunching the numbers'],
      ['Building your dashboard…', 'Almost there']
    ];
    let msgIdx = 0;
    const msgInterval = setInterval(() => {
      msgIdx++;
      if (msgIdx < messages.length) {
        statusEl.textContent = messages[msgIdx][0];
        subEl.textContent    = messages[msgIdx][1];
      }
    }, 1800);

    loadData().then(() => {
      clearInterval(msgInterval);
      statusEl.textContent = 'Ready!';
      subEl.textContent = '';
      loadOv.style.opacity = '0';
      setTimeout(() => { loadOv.style.display = 'none'; }, 500);
    }).catch(err => {
      console.error('Auto-load error:', err);
      clearInterval(msgInterval);
      sessionStorage.removeItem('sk_rev_logged_in');
      loadOv.style.display = 'none';
      document.getElementById('loginOverlay').style.display = 'flex';
      showLoginError('Session expired. Please sign in again.');
    });
  }
});
