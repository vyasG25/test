<html lang="en">

<meta charset="UTF-8">

<title>Skillmatics — US Specialty Accounts Dashboard</title>

<!-- Data is loaded from a JSON API source (pure client-side JSON.parse, with repair for malformed exports) -->
<style>
  :root {
    --bg:#f3f1ed; --surface:#fff; --surface2:#faf9f6; --border:#e2ded6; --border2:#d4cfc5;
    --text:#1e1c18; --text2:#5e5a52; --text3:#9b958c;
    --accent:#1a5f3a; --accent-light:#e4f2eb;
    --accent2:#6b4fa0; --accent2-light:#f0ebf7;
    --warm:#c97a3c; --warm-light:#fdf0e4;
    --blue:#3a6f96; --blue-light:#e6eff7; --blue-dark:#2b5a7e; --blue-grad:linear-gradient(135deg,#3a6f96,#2b5a7e);
    --gold:#b8892e; --gold-light:#fdf5e2;
    --red:#b83c42; --red-light:#fde8ea; --dark-red:#7b1a2a; --dark-red-light:#f5e0e3;
    --green:#2d7a4e; --green-light:#e2f5ec;
    --teal:#2a7a7a; --teal-light:#e2f2f2;
    --shadow:0 1px 3px rgba(30,28,24,.07),0 4px 12px rgba(30,28,24,.04);
    --shadow-md:0 4px 16px rgba(30,28,24,.1);
    --r:12px; --rs:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── ANIMATIONS ── */
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes loadFadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes loadLogoIn{0%{opacity:0;transform:translateY(16px) scale(.93);}100%{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes loadRise{0%{opacity:0;transform:translateY(18px);}100%{opacity:1;transform:translateY(0);}}
  @keyframes orbDrift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(80px,-56px) scale(1.22);}}
  @keyframes orbDrift2{0%,100%{transform:translate(0,0) scale(1.08);}50%{transform:translate(-90px,64px) scale(.85);}}
  @keyframes orbDrift3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(54px,76px) scale(1.28);}}
  @keyframes orbDrift4{0%,100%{transform:translate(0,0) scale(1.04);}50%{transform:translate(-60px,-44px) scale(.9);}}
  @keyframes gridDrift{0%{background-position:0 0;}100%{background-position:46px 46px;}}
  @keyframes ringSpinSlow{to{transform:rotate(360deg);}}
  @keyframes checkDraw{from{stroke-dashoffset:48;}to{stroke-dashoffset:0;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  /* Product card floater animations — each drifts on its own unique path */
  @keyframes cardFloat1{0%,100%{transform:translate(0,0) rotate(-6deg);}33%{transform:translate(14px,-22px) rotate(-4deg);}66%{transform:translate(-8px,12px) rotate(-8deg);}}
  @keyframes cardFloat2{0%,100%{transform:translate(0,0) rotate(8deg);}33%{transform:translate(-18px,16px) rotate(6deg);}66%{transform:translate(10px,-14px) rotate(10deg);}}
  @keyframes cardFloat3{0%,100%{transform:translate(0,0) rotate(-3deg);}40%{transform:translate(20px,18px) rotate(-6deg);}80%{transform:translate(-12px,-8px) rotate(-1deg);}}
  @keyframes cardFloat4{0%,100%{transform:translate(0,0) rotate(5deg);}50%{transform:translate(-14px,-20px) rotate(3deg);}}
  @keyframes cardFloat5{0%,100%{transform:translate(0,0) rotate(-9deg);}45%{transform:translate(16px,14px) rotate(-11deg);}90%{transform:translate(-6px,-10px) rotate(-7deg);}}
  @keyframes cardFloat6{0%,100%{transform:translate(0,0) rotate(4deg);}35%{transform:translate(-20px,10px) rotate(6deg);}70%{transform:translate(12px,-16px) rotate(2deg);}}
  @keyframes cardFloat7{0%,100%{transform:translate(0,0) rotate(-7deg);}50%{transform:translate(18px,-12px) rotate(-5deg);}}
  @keyframes cardFloat8{0%,100%{transform:translate(0,0) rotate(11deg);}40%{transform:translate(-10px,18px) rotate(9deg);}80%{transform:translate(14px,-8px) rotate(13deg);}}
  @keyframes shimmer{0%,100%{opacity:.13;}50%{opacity:.22;}}

  /* ── ANIMATED LOADING OVERLAY ── */
  #loadingOverlay{overflow:hidden;background:#f3f1ed;}
  .load-bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}

  /* Subtle neutral dot grid only (no colored orbs) */
  .load-grid{position:absolute;inset:-50px;background-image:radial-gradient(rgba(30,28,24,.06) 1.4px, transparent 1.4px);background-size:42px 42px;animation:gridDrift 6s linear infinite;
    -webkit-mask-image:radial-gradient(ellipse 78% 74% at 50% 50%, #000 30%, transparent 88%);mask-image:radial-gradient(ellipse 78% 74% at 50% 50%, #000 30%, transparent 88%);}

  /* ── PRODUCT CARD FLOATERS ── */
  .load-cards{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .lcard{
    position:absolute;
    border-radius:18px;
    background:#f0ede7;
    box-shadow:0 10px 36px rgba(30,28,24,.14), 0 2px 6px rgba(30,28,24,.08);
    border:2px solid rgba(255,255,255,.92);
    overflow:hidden;
    will-change:transform;
  }
  .lcard img{width:100%;height:100%;object-fit:cover;display:block;}

  .lcard:nth-child(1){left:0.9%;top:-0.0%;width:184px;height:184px;animation:cardFloat1 19s ease-in-out infinite;animation-delay:-17s;opacity:0.44;}

  /* Vignette — gently fades cards near the very center so the ring + logo stay readable */
  .load-cards::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 45% 42% at 50% 50%, #f3f1ed 26%, transparent 66%);
    pointer-events:none;
  }

  /* Foreground content */
  .load-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:0 24px;}
  .load-content .load-logo,.load-content .load-ring-wrap,.load-content .load-steps{opacity:0;animation:loadRise .7s cubic-bezier(.2,.7,.2,1) forwards;}
  .load-content .load-logo{animation:loadLogoIn .85s cubic-bezier(.2,.7,.2,1) forwards;}
  .load-content .load-ring-wrap{animation-delay:.14s;}
  .load-content .load-steps{animation-delay:.42s;}

  .load-logo{margin-bottom:36px;}
  .load-logo .brand-wordmark-img{height:64px;width:auto;display:block;}
  .load-logo .brand-wordmark-text{font-size:54px;}

  .load-ring-wrap{position:relative;width:196px;height:196px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
  .load-ring{display:block;width:196px;height:196px;}
  .load-ring-deco{transform-box:view-box;transform-origin:60px 60px;animation:ringSpinSlow 18s linear infinite;}
  #loadArc{transition:stroke-dashoffset .18s linear;}
  #loadComet{transform-box:view-box;transform-origin:60px 60px;transition:transform .18s linear;filter:drop-shadow(0 0 5px rgba(26,95,58,.55));}
  .load-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:baseline;gap:2px;font-family:'Playfair Display',serif;color:var(--text);}
  .load-num #loadingPct{font-size:48px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-1.5px;}
  .load-num-pct{font-size:20px;font-weight:600;color:var(--accent);transform:translateY(-2px);}
  .load-check{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
  .load-check path{stroke-dasharray:48;stroke-dashoffset:48;}
  .load-check.draw path{animation:checkDraw .55s cubic-bezier(.6,0,.3,1) forwards;}

  .load-status{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:var(--text);text-align:center;min-height:26px;transition:opacity .26s ease;letter-spacing:.1px;}
  .load-sub{font-size:12.5px;color:var(--text3);text-align:center;margin-top:7px;min-height:17px;transition:opacity .26s ease;letter-spacing:.25px;}
  .load-steps{display:flex;align-items:center;gap:7px;width:100%;max-width:300px;margin-top:28px;}
  .lstep{flex:1;height:4px;border-radius:3px;background:var(--border2);overflow:hidden;position:relative;}
  .lstep .lstep-fill{position:absolute;inset:0;border-radius:3px;background:linear-gradient(90deg,#2d8a57,var(--accent));transform:scaleX(0);transform-origin:left;transition:transform .55s cubic-bezier(.2,.7,.2,1);}
  .lstep.on .lstep-fill{transform:scaleX(1);}
  @media (prefers-reduced-motion: reduce){
    .load-grid,.load-ring-deco,.lcard{animation:none !important;}
    .load-content .load-logo,.load-content .load-ring-wrap,.load-content .load-steps{animation:none !important;opacity:1 !important;}
    #loadComet{transition:none !important;}
  }

  /* ── TOP BAR ── */
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-name{display:flex;align-items:center;line-height:1;}
  /* Actual Skillmatics wordmark image (matches the logo exactly when online) */
  .brand-wordmark-img{height:auto;width:auto;display:block;}
  /* Text fallback styled to resemble the Skillmatics logo */
  .brand-wordmark-text{font-family:'Nunito',sans-serif;font-style:italic;font-weight:800;font-size:23px;letter-spacing:-.5px;color:#1d81c4;}
  .brand-divider{width:1px;height:24px;background:var(--border2);}
  .brand-title{font-size:16.5px;font-weight:700;color:#1d81c4;letter-spacing:-.2px;white-space:nowrap;}
  .header-right{display:flex;align-items:center;gap:0;}
  .hdr-actions{display:flex;align-items:center;gap:8px;}

  /* ── LIVE INDICATOR ── */
  .hdr-status{display:flex;align-items:center;gap:12px;padding-right:16px;border-right:1px solid var(--border);margin-right:12px;}
  .live-indicator{display:flex;align-items:center;gap:8px;padding:5px 11px;background:var(--accent-light);border:1px solid var(--accent);border-radius:20px;opacity:0;transition:opacity .4s;}
  .live-indicator.visible{opacity:1;}
  .live-dot-wrap{position:relative;width:10px;height:10px;flex-shrink:0;}
  .live-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:0;left:0;}
  .live-ring{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:0;left:0;opacity:.6;animation:liveRing 2s ease-out infinite;}
  @keyframes liveRing{0%{transform:scale(1);opacity:.6;}70%{transform:scale(2.4);opacity:0;}100%{transform:scale(2.4);opacity:0;}}
  .live-text{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}
  .last-updated{font-size:11px;color:var(--text3);}

  /* ── REFRESH BUTTON ── */
  .refresh-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;background:#e0f2f1;color:#004d40;border:1px solid #80cbc4;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .refresh-btn:hover:not(:disabled){background:#b2dfdb;border-color:#4db6ac;}
  .refresh-btn:disabled{opacity:.55;cursor:not-allowed;}
  .refresh-icon{display:inline-block;transition:transform .3s;}
  .refresh-btn.spinning .refresh-icon{animation:spin .7s linear infinite;}

  /* ── LOGOUT BUTTON ── */
  .logout-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:none;color:var(--text2);border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .2s;white-space:nowrap;}
  .logout-btn:hover{background:var(--red-light);color:var(--red);border-color:var(--red);}
  .logout-btn svg{flex-shrink:0;}

  /* ── FILTER BAR ── */
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:60px;z-index:96;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .filter-group{display:flex;align-items:center;gap:7px;}
  .filter-label{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;}
  .filter-select{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none;transition:border-color .2s;min-width:100px;}
  .filter-select:focus{border-color:var(--accent);}
  .date-input{padding:7px 9px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
  .date-input:focus{border-color:var(--accent);}
  .filter-sep{width:1px;height:22px;background:var(--border2);}
  .btn-reset{padding:7px 13px;background:var(--warm-light);color:var(--warm);border:1px solid var(--warm);border-radius:var(--rs);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:all .2s;}
  .btn-reset:hover{background:var(--warm);color:#fff;}

  /* Multi-select dropdown */
  .ms-wrap{position:relative;}
  .ms-trigger{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none;min-width:120px;max-width:200px;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none;transition:border-color .2s;}
  .ms-trigger.open{border-color:var(--accent);}
  .ms-trigger > span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ms-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);min-width:220px;max-width:340px;}
  .ms-panel.open{display:block;}
  .ms-search{width:100%;padding:10px 12px;border:none;border-bottom:1px solid var(--border);font-size:13px;font-family:inherit;outline:none;background:var(--surface2);border-radius:var(--r) var(--r) 0 0;}
  .ms-list{max-height:220px;overflow-y:auto;padding:4px 0;}
  .ms-item{display:flex;align-items:center;gap:9px;padding:6px 13px;cursor:pointer;transition:background .12s;font-size:13px;}
  .ms-item:hover{background:var(--bg);}
  .ms-item input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0;}
  .ms-actions{padding:7px 11px;border-top:1px solid var(--border);display:flex;gap:6px;}
  .ms-action-btn{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .12s;font-family:inherit;}
  .ms-action-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* ── COMPACT SEGMENTED FILTERS ── */
  .fbar{display:flex;align-items:center;gap:9px;width:100%;flex-wrap:wrap;}
  /* A labelled segment groups related filters (Period / Location / Product) */
  .seg{display:flex;align-items:center;gap:7px;padding:5px 9px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);}
  .seg-period{background:linear-gradient(135deg,#eef4fb,#e1ecf8);border-color:#cfe0f0;}
  .seg-location{background:linear-gradient(135deg,#ecf6f0,#dcefe4);border-color:#c5e3d1;}
  .seg-product{background:linear-gradient(135deg,#fdf4e6,#fbe9cf);border-color:#efdcb4;}
  .seg-party{background:linear-gradient(135deg,#ecf6f0,#dcefe4);border-color:#c5e3d1;}
  .seg-period .seg-label{color:#2b5a7e;} .seg-location .seg-label{color:#1a6f47;} .seg-party .seg-label{color:#1a6f47;} .seg-product .seg-label{color:#9a6f1f;}
  .seg-label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
  .seg-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .fbar-spacer{flex:1;}
  .fbar-records{font-size:11px;color:var(--text3);white-space:nowrap;}

  /* One-click multi-select chip */
  .mc{position:relative;}
  .mc-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .mc-btn:hover{border-color:var(--accent);color:var(--text);}
  .mc-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .mc-btn.open{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);}
  .mc-badge{display:none;align-items:center;justify-content:center;min-width:15px;height:15px;padding:0 4px;border-radius:8px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;}
  .mc-badge.show{display:inline-flex;}
  .mc-chev{font-size:8px;color:var(--text3);}
  .mc-btn.active .mc-chev{color:var(--accent);}
  .mc-panel{display:none;position:absolute;top:calc(100% + 5px);left:0;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);width:250px;max-width:84vw;}
  .mc-panel.open{display:block;animation:fadeIn .14s ease;}
  /* compact date inputs inside Period segment */
  .mc-date{padding:4px 7px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:all .15s;}
  .mc-date:hover{border-color:var(--accent);}
  .mc-date.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .mc-dlbl{font-size:10px;font-weight:600;color:var(--text3);}
  .mc-dash{color:var(--text3);font-size:12px;}

  /* ── MAIN ── */
  .main{padding:22px 28px;}

  /* ── UPLOAD PROMPT ── */
  .upload-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;animation:fadeIn .5s ease;}
  .upload-prompt-icon{width:80px;height:80px;border-radius:20px;background:var(--blue-light);border:2px dashed var(--blue);display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:32px;color:var(--blue-dark);transition:all .2s;}
  .upload-prompt:hover .upload-prompt-icon{background:var(--blue);color:#fff;border-style:solid;transform:scale(1.05);}
  .upload-prompt h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;color:var(--text);}
  .upload-prompt p{font-size:14px;color:var(--text3);margin-bottom:20px;max-width:420px;line-height:1.5;}
  .upload-prompt-btn{padding:12px 28px;background:var(--blue-grad);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s;position:relative;overflow:hidden;}
  .upload-prompt-btn:hover{opacity:.88;}
  .upload-prompt-btn input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
  .upload-prompt .upload-hint{font-size:11px;color:var(--text3);margin-top:12px;}

  /* ── SECTION HEADERS ── */
  .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:28px;}
  .sec-header:first-of-type{margin-top:0;}
  .sec-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);display:flex;align-items:center;gap:9px;}
  .sec-badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:.4px;text-transform:uppercase;}

  /* ── TAB NAVIGATION ── */
  .tab-nav-sticky{position:sticky;top:60px;z-index:95;background:var(--bg);padding:7px 0;margin-bottom:9px;}
  .tab-nav{display:inline-flex;gap:3px;padding:4px;background:linear-gradient(180deg,#fbfaf7,#f1eee8);border:1px solid var(--border2);border-radius:12px;box-shadow:0 2px 10px rgba(40,30,15,.06),inset 0 1px 0 #fff;}
  .tab-btn{position:relative;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid transparent;background:transparent;color:var(--text2);font-size:11.5px;font-weight:600;font-family:inherit;cursor:pointer;border-radius:9px;transition:color .18s,background .18s,box-shadow .2s,border-color .18s,transform .12s;white-space:nowrap;overflow:hidden;}
  .tab-ic{width:14px;height:14px;flex-shrink:0;opacity:.6;transition:opacity .18s,transform .2s;}
  .tab-btn:hover{color:var(--text);background:var(--surface);border-color:var(--border2);transform:translateY(-1px);box-shadow:0 3px 9px rgba(40,30,15,.10);}
  .tab-btn:hover .tab-ic{opacity:.9;}
  .tab-btn.active{color:#fff;background:var(--blue-grad);border-color:transparent;box-shadow:0 4px 14px rgba(43,90,126,.38),inset 0 1px 0 rgba(255,255,255,.22);}
  .tab-btn.active .tab-ic{opacity:1;}
  .tab-btn.active::before{content:"";position:absolute;inset:0;border-radius:9px;padding:1px;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .tab-btn.active:hover{color:#fff;transform:translateY(-1px);box-shadow:0 6px 18px rgba(43,90,126,.46),inset 0 1px 0 rgba(255,255,255,.22);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .25s ease;}
  @media(max-width:768px){.tab-nav{display:flex;width:100%;overflow-x:auto;}.tab-btn{padding:8px 12px;font-size:12px;flex:1;justify-content:center;}.tab-btn span{display:none;}.tab-ic{opacity:.9;}}

  /* ── METRIC CARDS ── */
  .metric-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;}
  @media(max-width:1200px){.metric-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:768px){.metric-grid{grid-template-columns:repeat(2,1fr);}}

  /* ── EXECUTIVE KPI CARDS (multi-value) ── */
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  @media(max-width:1024px){.kpi-grid{grid-template-columns:1fr;}}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;transition:box-shadow .2s;}
  .kpi-card:hover{box-shadow:var(--shadow);}
  .kpi-card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:13px;}
  .kpi-row{display:flex;align-items:stretch;}
  .kpi-col{flex:1;display:flex;flex-direction:column;gap:5px;padding:0 12px;min-width:0;}
  .kpi-row.left .kpi-col{align-items:flex-start;text-align:left;}
  .kpi-row.center .kpi-col{align-items:center;text-align:center;}
  .kpi-col:first-child{padding-left:0;}
  .kpi-col:last-child{padding-right:0;}
  .kpi-val{font-size:24px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:var(--text);white-space:nowrap;}
  .kpi-val.sm{font-size:21px;}
  .kpi-sub{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .kpi-divider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}
  .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:17px 19px;transition:box-shadow .2s;display:flex;flex-direction:column;justify-content:center;}
  .metric-card:hover{box-shadow:var(--shadow);}
  .metric-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;}
  .metric-value{font-size:25px;font-weight:600;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;}
  .metric-value.sm{font-size:19px;}
  .metric-sub{font-size:12px;color:var(--text3);margin-top:5px;}

  /* ── PERIOD-OVER-PERIOD (redesigned) ── */
  .pop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:1100px){.pop-grid{grid-template-columns:1fr;}}

  .pop-card{position:relative;z-index:1;background:linear-gradient(180deg,var(--cl),var(--surface) 38%);border:1px solid var(--border);border-radius:var(--r);transition:box-shadow .25s ease,transform .25s ease,border-color .25s ease;}
  .pop-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--c);}
  .pop-card:has(.pop-sel-panel.open){z-index:300;}
  .pop-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;background:var(--c);}

  .pop-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px 0;}
  .pop-title-wrap{display:flex;align-items:center;gap:8px;min-width:0;}
  .pop-dot{width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 0 3px var(--cl);flex-shrink:0;}
  .pop-title{font-size:11.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;}

  /* period selector — reuses the EXACT global multi-select dropdown shell (.mc/.ms) */
  .pop-sel{position:relative;}
  .pop-sel-btn{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;max-width:150px;transition:all .15s;}
  .pop-sel-btn .pop-sel-cur{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pop-sel-btn:hover{border-color:var(--c);color:var(--text);}
  .pop-sel-btn.open{border-color:var(--c);box-shadow:0 0 0 2px var(--cl);color:var(--text);}
  .pop-sel-btn .mc-chev{font-size:8px;color:var(--text3);}
  .pop-sel-btn.open .mc-chev{color:var(--c);}
  .pop-sel-panel{display:none;position:absolute;top:calc(100% + 5px);left:auto;right:0;z-index:300;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow-md);width:212px;min-width:0;max-width:84vw;}
  .pop-sel-panel.open{display:block;animation:fadeIn .14s ease;}
  .pop-sel-panel .ms-list{max-height:240px;overflow-y:auto;padding:4px 0;}
  .pop-sel-panel .ms-item input{accent-color:var(--c);}
  .pop-sel-panel .ms-item.sel{background:var(--cl);}
  .pop-sel-panel .ms-item.sel span{color:var(--text);font-weight:600;}

  /* accent dotted divider — color style borrowed from the summary cards */
  .pop-dotline{margin:13px 18px 2px;border-top:1.5px dotted var(--c);opacity:.5;}

  /* hero: readable Title eyebrow + caption, then the big DM Sans number + growth pill */
  .pop-hero{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:12px 18px 0;}
  .pop-hero-main{min-width:0;}
  .pop-hero-cap{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:9px;letter-spacing:.1px;}
  .pop-hero-cap .pop-cap-period{color:var(--c);font-weight:700;}
  .pop-hero-cap .pop-cap-upto{color:var(--text3);font-weight:500;}
  .pop-hero-val{font-family:'DM Sans',sans-serif;font-size:31px;font-weight:700;line-height:1;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.6px;}
  .pop-growth{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:20px;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;line-height:1;}
  .pop-growth.up{background:var(--green-light);color:var(--green);}
  .pop-growth.dn{background:var(--red-light);color:var(--red);}
  .pop-growth.na{background:var(--surface2);color:var(--text3);font-weight:600;border:1px solid var(--border);}
  .pop-growth .g-arrow{font-size:9px;}

  /* current-vs-prior comparison bars (prior bar uses a clearly visible solid grey) */
  .pop-compare{padding:18px 18px 4px;display:flex;flex-direction:column;gap:12px;}
  .pop-bar-row{display:grid;grid-template-columns:46px 1fr auto auto;align-items:center;gap:10px;}
  .pop-bar-tag{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);}
  .pop-bar-row.is-prev .pop-bar-tag{color:var(--text3);}
  .pop-bar-track{height:10px;border-radius:6px;background:#ece8e1;overflow:hidden;box-shadow:inset 0 0 0 1px var(--border);}
  .pop-bar-fill{height:100%;border-radius:6px;transition:width .55s cubic-bezier(.4,0,.2,1);min-width:4px;}
  .pop-bar-fill.cur{background:var(--c);}
  .pop-bar-fill.prev{background:#8c867c;}
  .pop-bar-val{font-size:12px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .pop-bar-row.is-prev .pop-bar-val{color:var(--text2);font-weight:600;}
  .pop-bar-asp{font-size:10.5px;font-weight:700;color:var(--text1);font-variant-numeric:tabular-nums;white-space:nowrap;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;letter-spacing:.2px;}
  .pop-bar-row.is-prev .pop-bar-asp{color:var(--text2);font-weight:600;}

  /* metric footer — 2-row layout: [ LABEL  +delta% ] / [ value ] */
  .pop-metrics{display:grid;grid-template-columns:repeat(3,1fr);margin-top:16px;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 var(--r) var(--r);overflow:hidden;}
  .pop-metric{padding:12px 14px 13px;position:relative;}
  .pop-metric + .pop-metric::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--border);}
  .pm-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:6px;}
  .pm-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);}
  .pm-delta{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .pm-delta.up{color:var(--green);}
  .pm-delta.dn{color:var(--red);}
  .pm-delta.na{color:var(--text3);}
  .pm-val{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1;}

  /* ── TOP ITEMS ── */
  .top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  @media(max-width:900px){.top-grid{grid-template-columns:repeat(2,1fr);}}
  .top-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:17px 19px;}
  .top-card-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:11px;}
  .ti{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
  .ti:last-child{border-bottom:none;padding-bottom:0;}
  .ti-rank{width:21px;height:21px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;margin-top:1px;}
  .rank1{background:var(--gold-light);color:var(--gold);} .rank2{background:#f0f0f0;color:#888;} .rank3{background:#fdf0e0;color:#c08030;}
  .ti-info{flex:1;min-width:0;}
  .ti-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ti-code{font-size:11px;color:var(--text3);margin-top:1px;}
  .ti-qty{font-size:16px;font-weight:600;color:var(--blue-dark);flex-shrink:0;}

  /* ── TOP SKU PERFORMANCE (by period) ── */
  .sku-toggle{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .sku-tog-btn{padding:7px 15px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text2);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .sku-tog-btn:hover{border-color:var(--blue);color:var(--text);}
  .sku-tog-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(43,90,126,.20);}
  /* Qty/Value pill toggle — distinct purple scheme so it reads as a separate control */
  .sku-tog-sep{width:1px;align-self:stretch;background:var(--border2);margin:0 4px;}
  .sku-metric-toggle{display:inline-flex;align-items:center;gap:2px;padding:2px;border:1px solid var(--accent2);border-radius:20px;background:var(--accent2-light);}
  .smt-btn{padding:5px 16px;border:none;border-radius:16px;background:transparent;color:var(--accent2);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .smt-btn:hover{color:var(--accent2);opacity:.85;}
  .smt-btn.active{background:var(--accent2);color:#fff;box-shadow:0 1px 4px rgba(107,79,160,.25);}
  .sku-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  @media(max-width:1100px){.sku-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:680px){.sku-grid{grid-template-columns:1fr;}}
  .sku-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px 7px;transition:box-shadow .2s;}
  .sku-card:hover{box-shadow:var(--shadow);}
  .sku-card-head{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding-bottom:10px;margin-bottom:3px;border-bottom:1px solid var(--border);}
  .sku-card-head .sku-ico{font-size:14px;line-height:1;}
  .sku-row{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--border);}
  .sku-row:last-child{border-bottom:none;}
  .sku-rank{width:22px;height:22px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;}
  .sku-name{flex:1;min-width:0;font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sku-qty{font-size:15px;font-weight:700;color:var(--blue-dark);flex-shrink:0;font-variant-numeric:tabular-nums;}
  .sku-empty{padding:14px 0;color:var(--text3);font-size:12.5px;text-align:center;}

  /* ── TOP PERFORMER BANNER (gold, full-width; uses globally filtered data) ── */
  .top-performer-wrap{margin-bottom:14px;}
  .top-performer{display:flex;align-items:center;justify-content:space-between;gap:20px;width:100%;
    background:var(--gold-light);border:1px solid var(--gold);border-radius:var(--r);padding:16px 22px;flex-wrap:wrap;}
  .tp-left{display:flex;align-items:center;gap:15px;min-width:0;}
  .tp-ico{width:42px;height:42px;border-radius:11px;background:rgba(184,137,46,.14);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
  .tp-id{min-width:0;}
  .tp-eyebrow{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
  .tp-name{font-size:18px;font-weight:700;color:var(--text);line-height:1.2;overflow-wrap:anywhere;word-break:break-word;}
  .tp-metrics{display:flex;align-items:stretch;flex-wrap:wrap;}
  .tp-metric{display:flex;flex-direction:column;align-items:flex-end;text-align:right;padding:0 18px;position:relative;}
  .tp-metric + .tp-metric::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:1px;background:rgba(184,137,46,.28);}
  .tp-metric:last-child{padding-right:0;}
  .tp-val{font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:var(--text);white-space:nowrap;}
  .tp-val.units{color:var(--blue-dark);}
  .tp-val.value{color:var(--warm);}
  .tp-val.gold{color:var(--gold);}
  .tp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:6px;}
  @media(max-width:768px){
    .top-performer{flex-direction:column;align-items:flex-start;gap:14px;}
