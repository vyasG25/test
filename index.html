  </div>
  <div class="ex-cmp-grid">
    ${cmpCard(zmomMonLabel(curMon), 'vs ' + zmomMonLabel(prevMon), ovM[curMon] || 0, ovM[prevMon] || 0, dvM[curMon] || 0, dvM[prevMon] || 0)}
    ${cmpCard(`Q${curQ} ${curQy}`, `vs Q${prevQn} ${prevQy}`, exWin(ovM, curQM), exWin(ovM, prevQM), exWin(dvM, curQM), exWin(dvM, prevQM))}
    ${cmpCard(`YTD ${maxYear}`, `vs YTD ${maxYear-1}`, exWin(ovM, ytdCur), exWin(ovM, ytdPrev), exWin(dvM, ytdCur), exWin(dvM, ytdPrev))}
  </div>`;

  // ── 4 · TREND ANALYSIS ──
  const TM = {
    ov: { label: 'Order Value', map: ovM, color: 'var(--ex-blue)', fmt: fmtV },
    oq: { label: 'Order Qty', map: oqM, color: 'var(--ex-purple)', fmt: v => fmt(Math.round(v)) },
    dv: { label: 'Dispatch Value', map: dvM, color: 'var(--ex-green)', fmt: fmtV },
    dq: { label: 'Dispatch Qty', map: dqM, color: 'var(--ex-teal)', fmt: v => fmt(Math.round(v)) },
  };
  if (!TM[exTrendMetric]) exTrendMetric = 'ov';
  const tm = TM[exTrendMetric];
  const tVals = last12.map(m => tm.map[m] || 0);
  const tTotal = tVals.reduce((a, b) => a + b, 0);
  // last 8 quarters
  const qList = [];
  { let k = qKey(maxKey); for (let i = 0; i < 8; i++) { qList.unshift(k); const [yy, qq] = k.split('-Q'); let y = +yy, n = +qq - 1; if (n < 1) { n = 4; y--; } k = `${y}-Q${n}`; } }
  const qSum = qk => { const [y, q] = qk.split('-Q'); return exWin(tm.map, qMonths(+y, +q)); };
  const qVals = qList.map(qSum), qMx = Math.max(...qVals, 1);
  H += `
  <div class="sec-header">
    <div class="sec-title">Trend Analysis <span class="sec-badge ex-badge-blue">12-Month</span></div>
    <div class="ex-sub">Rolling momentum with an 8-quarter rhythm</div>
  </div>
  <div class="ex-trend">
    <div class="ex-trend-head">
      <div class="ex-chart-big"><b style="color:${tm.color}">${tm.fmt(tTotal)}</b><span class="ex-cmp-prev">${tm.label} · last 12 months</span></div>
      <div class="ex-trend-pick">
        ${Object.entries(TM).map(([k, o]) => `<button class="ex-pill ${k === exTrendMetric ? 'on' : ''}" data-extm="${k}">${o.label}</button>`).join('')}
      </div>
    </div>
    ${exArea(tVals, tm.color)}
    <div style="display:flex;justify-content:space-between;margin-top:7px;">
      ${last12.filter((_, i) => i % 2 === 0).map(m => `<span class="ex-cmp-prev">${zmomMonLabel(m)}</span>`).join('')}
    </div>
    <div class="ex-qbars">
      <div class="ex-qbars-title">${tm.label} · Last 8 Quarters</div>
      ${qList.map((qk, i) => `<div class="ex-qrow">
        <span class="ex-qlabel">${qk.replace('-', " '").replace('Q', 'Q')}</span>
        <div class="ex-qtrack"><div class="ex-qfill" style="width:${(qVals[i] / qMx * 100).toFixed(1)}%;background:linear-gradient(90deg,${tm.color},${tm.color})"></div></div>
        <span class="ex-qval">${tm.fmt(qVals[i])}</span></div>`).join('')}
    </div>
  </div>`;

  // ── 5 · TOP PERFORMERS ──
  const DIMS = {
    sku: { label: 'Products', icon: '◆', noun: 'product' },
    retailer: { label: 'Retailers', icon: '●', noun: 'retailer' },
    salesrep: { label: 'Sales Reps', icon: '◆', noun: 'rep' },
    distributor: { label: 'Sales Agencies', icon: '■', noun: 'agency' },
    brand: { label: 'Brands', icon: '▲', noun: 'brand' },
  };
  if (!G[exTopDim]) exTopDim = 'sku';
  const bucket = G[exTopDim];
  const totV = Object.values(bucket).reduce((a, o) => a + o.v, 0) || 1;
  const top = Object.entries(bucket).map(([k, o]) => ({ k, ...o, g: exGN(exWin(o.m, last12), exWin(o.m, prev12)) }))
    .sort((a, b) => b.v - a.v).slice(0, 10);
  const topMx = top.length ? top[0].v : 1;
  H += `
  <div class="sec-header">
    <div class="sec-title">Top Performers <span class="sec-badge ex-badge-gold">Top 10</span></div>
    <div class="ex-sub">Ranked by value · contribution &amp; 12-month growth</div>
  </div>
  <div class="ex-tp">
    <div class="ex-tp-tabs">
      ${Object.entries(DIMS).map(([k, d]) => `<button class="ex-tab ${k === exTopDim ? 'on' : ''}" data-extop="${k}">${d.label}</button>`).join('')}
    </div>
    <div class="ex-tp-list">
      ${top.map((t, i) => {
        const m = exMono(t.k.split(' - ')[1] || t.k);
        const contrib = (t.v / totV * 100);
        const spark = last12.map(mk => t.m[mk] || 0);
        const gp = t.g == null ? '<span class="ex-g na">New</span>' : exG(exWin(t.m, last12), exWin(t.m, prev12));
        return `<div class="ex-trow">
          <div class="ex-rank ${i < 3 ? 'r' + (i + 1) : ''}">${i + 1}</div>
          <div class="ex-tp-id">
            <div class="ex-mono" style="background:${m.color}">${m.ini}</div>
            <div style="min-width:0"><div class="ex-tp-name">${escapeHtml(t.k)}</div>
              <div class="ex-tp-meta">${fmt(Math.round(t.q))} qty · ${t.orders ? '' : ''}${fmtMoney(t.v)}</div></div>
          </div>
          <div class="ex-contrib">
            <div class="ex-contrib-lbl">${contrib.toFixed(1)}% of total</div>
            <div class="ex-contrib-track"><div class="ex-contrib-fill" style="width:${(t.v / topMx * 100).toFixed(1)}%;background:${m.color}"></div></div>
          </div>
          <div>${gp}</div>
          ${exSpark(spark, m.color).replace('class="ex-spark"', 'class="ex-tspark"')}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // ── 6 · BUSINESS MIX ──
  const mixCard = (title, bucketObj, unit) => {
    const ent = Object.entries(bucketObj).map(([k, o]) => ({ k, v: o.v })).sort((a, b) => b.v - a.v);
    const tot = ent.reduce((a, e) => a + e.v, 0) || 1;
    const shown = ent.slice(0, 6);
    const otherV = ent.slice(6).reduce((a, e) => a + e.v, 0);
    const rows = shown.map(e => {
      const m = exMono(e.k.split(' - ')[1] || e.k);
      return `<div class="ex-mbar">
        <div class="ex-mbar-top"><span class="ex-mbar-k">${escapeHtml(e.k)}</span><span class="ex-mbar-v">${(e.v / tot * 100).toFixed(1)}% · ${fmtV(e.v)}</span></div>
        <div class="ex-mbar-track"><div class="ex-mbar-fill" style="width:${(e.v / tot * 100).toFixed(1)}%;background:${m.color}"></div></div>
      </div>`;
    }).join('');
    const other = otherV > 0 ? `<div class="ex-mbar"><div class="ex-mbar-top"><span class="ex-mbar-k" style="color:var(--text3)">Other (${ent.length - 6})</span><span class="ex-mbar-v">${(otherV / tot * 100).toFixed(1)}%</span></div><div class="ex-mbar-track"><div class="ex-mbar-fill" style="width:${(otherV / tot * 100).toFixed(1)}%;background:var(--border2)"></div></div></div>` : '';
    return `<div class="ex-mix"><div class="ex-mix-title">${title}<span>${ent.length} ${unit}</span></div>${rows}${other}</div>`;
  };
  H += `
  <div class="sec-header">
    <div class="sec-title">Business Mix <span class="sec-badge ex-badge-purple">Composition</span></div>
    <div class="ex-sub">Where the value concentrates — share of total order value</div>
  </div>
  <div class="ex-mix-grid">
    ${mixCard('Brand Mix', G.brand, 'brands')}
    ${mixCard('Sales Agency Mix', G.distributor, 'agencies')}
    ${mixCard('Product Mix', G.sku, 'products')}
    ${mixCard('Retailer Mix', G.retailer, 'retailers')}
  </div>`;

  // ── 7 · EXECUTIVE HIGHLIGHTS ──
  const topOf = (b, by) => { let bk = null, bv = -Infinity; for (const k in b) { const val = by(b[k]); if (val > bv) { bv = val; bk = k; } } return bk == null ? null : { k: bk, o: b[bk], v: bv }; };
  const growthOf = b => { let bk = null, bg = -Infinity, bv = 0; for (const k in b) { const o = b[k]; const c = exWin(o.m, last12), p = exWin(o.m, prev12); if (p > totV * 0.002) { const g = (c - p) / p; if (g > bg) { bg = g; bk = k; bv = c; } } } return bk == null ? null : { k: bk, g: bg * 100, v: bv }; };
  const topRetV = topOf(G.retailer, o => o.v);
  const topRetActive = topOf(poByEntity, s => s.size);
  const topSku = topOf(G.sku, o => o.v);
  const topAgency = topOf(G.distributor, o => o.v);
  const topRep = topOf(G.salesrep, o => o.v);
  const growRet = growthOf(G.retailer);
  const growSku = growthOf(G.sku);
  const growBrand = growthOf(G.brand);
  // biggest dispatch month
  let bigDispM = null, bigDispV = -1; for (const m in dvM) if (dvM[m] > bigDispV) { bigDispV = dvM[m]; bigDispM = m; }
  // largest single order (by po) & largest invoice (by inv)
  const poVal = {}, invVal = {}; for (const r of rows) { if (r.po_no) poVal[r.po_no] = (poVal[r.po_no] || 0) + (r.value || 0); if (r.invoice_no) invVal[r.invoice_no] = (invVal[r.invoice_no] || 0) + (r.value || 0); }
  const bigPO = topOf(poVal ? Object.fromEntries(Object.entries(poVal).map(([k, v]) => [k, { v }])) : {}, o => o.v);
  let bigPOk = null, bigPOv = -1; for (const k in poVal) if (poVal[k] > bigPOv) { bigPOv = poVal[k]; bigPOk = k; }
  let bigINVk = null, bigINVv = -1; for (const k in invVal) if (invVal[k] > bigINVv) { bigINVv = invVal[k]; bigINVk = k; }
  // largest back order line
  let bigBO = null; for (const r of backRows) if (!bigBO || r.back_order_qty > bigBO.back_order_qty) bigBO = r;

  const HIC = (cssColor, lightVar, icon, label, val, sub) => `
    <div class="ex-hi" style="--hc:${cssColor};--hc-l:${lightVar}">
      <div class="ex-hi-ic">${icon}</div><div class="ex-hi-l">${label}</div>
      <div class="ex-hi-v" title="${escapeHtml(String(val).replace(/<[^>]+>/g,''))}">${val}</div><div class="ex-hi-s">${sub}</div></div>`;
  const i_star = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="m12 2 3 6.5 7 .9-5 4.8 1.3 7L12 18l-6.5 3.2L7 14.2 2 9.4l7-.9z"/></svg>';
  const i_trend = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>';
  const i_user = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>';
  const i_box = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v10l9 4 9-4V7l-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg>';
  const i_cal = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>';
  const i_doc = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
  const i_fire = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-2 1-3 1-3s0 2 2 2c1.5 0 2-1.5 1-4 1-1 1-1 1-1z"/></svg>';
  const i_bag = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h12l1 13H5z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>';

  H += `
  <div class="sec-header">
    <div class="sec-title">Executive Highlights <span class="sec-badge ex-badge-gold">Auto-insights</span></div>
    <div class="ex-sub">The standout movers in the filtered book</div>
  </div>
  <div class="ex-hi-grid">
    ${growRet ? HIC('var(--ex-green)', 'var(--green-light)', i_trend, 'Fastest-growing retailer', escapeHtml(growRet.k), `+${growRet.g.toFixed(0)}% · ${fmtV(growRet.v)} (12 mo)`) : ''}
    ${growSku ? HIC('var(--ex-blue)', 'var(--blue-light)', i_trend, 'Fastest-growing SKU', escapeHtml(growSku.k.split(' - ')[1] || growSku.k), `+${growSku.g.toFixed(0)}% · ${fmtV(growSku.v)} (12 mo)`) : ''}
    ${growBrand ? HIC('var(--ex-purple)', 'var(--accent2-light)', i_fire, 'Fastest-growing brand', escapeHtml(growBrand.k), `+${growBrand.g.toFixed(0)}% growth (12 mo)`) : ''}
    ${topAgency ? HIC('var(--ex-teal)', 'var(--teal-light)', i_box, 'Largest sales agency', escapeHtml(topAgency.k), `${fmtV(topAgency.v)} · ${(topAgency.v / totV * 100).toFixed(0)}% of value`) : ''}
    ${topRep ? HIC('var(--ex-blue)', 'var(--blue-light)', i_user, 'Top sales rep', escapeHtml(topRep.k), `${fmtV(topRep.v)} booked`) : ''}
    ${bigDispM ? HIC('var(--ex-green)', 'var(--green-light)', i_cal, 'Biggest dispatch month', zmomMonLabel(bigDispM), `${fmtV(bigDispV)} dispatched`) : ''}
    ${bigBO ? HIC('var(--ex-red)', 'var(--red-light)', i_box, 'Largest back order', escapeHtml((bigBO.product_code || '').split(' - ')[1] || bigBO.product_code || '—'), `${fmt(Math.round(bigBO.back_order_qty))} qty · ${escapeHtml(bigBO.retailer_name || '')}`) : ''}
    ${bigPOk ? HIC('var(--ex-gold)', 'var(--gold-light)', i_bag, 'Largest order', 'PO ' + escapeHtml(bigPOk), `${fmtV(bigPOv)} single order`) : ''}
    ${topRetActive ? HIC('var(--ex-warm)', 'var(--warm-light)', i_user, 'Most active retailer', escapeHtml(topRetActive.k), `${topRetActive.v} orders placed`) : ''}
    ${bigINVk ? HIC('var(--ex-acc)', 'var(--accent-light)', i_doc, 'Largest invoice', escapeHtml(bigINVk), `${fmtV(bigINVv)} invoiced`) : ''}
  </div>`;

  // ── 8 · OPERATIONAL HEALTH ──
  const aov = nOrders ? ordV / nOrders : 0;
  const aiv = nInv ? invV / nInv : 0;
  const aoq = nOrders ? ordQ / nOrders : 0;
  const adq = nOrders ? dispQ / nOrders : 0;
  const op = (c, label, val, sub) => `<div class="ex-op"><div class="ex-op-l"><i style="background:${c}"></i>${label}</div><div class="ex-op-v">${val}</div><div class="ex-op-s">${sub}</div></div>`;
  H += `
  <div class="sec-header">
    <div class="sec-title">Operational Health <span class="sec-badge ex-badge-blue">Footprint</span></div>
    <div class="ex-sub">Volume, breadth and averages across the filtered book</div>
  </div>
  <div class="ex-op-grid">
    ${op('var(--ex-blue)', 'Orders', fmt(nOrders), 'distinct POs')}
    ${op('var(--ex-green)', 'Invoices', fmt(nInv), 'distinct invoices')}
    ${op('var(--ex-purple)', 'Retailers', fmt(retSet.size), 'active accounts')}
    ${op('var(--ex-teal)', 'Products', fmt(skuSet.size), 'SKUs ordered')}
    ${op('var(--ex-gold)', 'Sales Agencies', fmt(distSet.size), 'distributors')}
    ${op('var(--ex-warm)', 'Sales Reps', fmt(repSet.size), 'representatives')}
    ${op('var(--ex-blue)', 'Avg Order Value', fmtMoney(aov), 'per PO')}
    ${op('var(--ex-acc)', 'Avg Invoice Value', fmtMoney(aiv), 'per invoice')}
    ${op('var(--ex-purple)', 'Avg Order Qty', fmt(Math.round(aoq)), 'units per PO')}
    ${op('var(--ex-teal)', 'Avg Dispatch Qty', fmt(Math.round(adq)), 'units shipped per PO')}
  </div>`;

  // ── 9 · ALERTS & EXCEPTIONS ──
  // largest pending customers (undispatched value by retailer)
  const pendByRet = {}; for (const r of rows) if (!r.dispatch_dt && r.retailer_name) pendByRet[r.retailer_name] = (pendByRet[r.retailer_name] || 0) + (r.value || 0);
  const pendTop = Object.entries(pendByRet).sort((a, b) => b[1] - a[1]).slice(0, 4);
  // top back orders by qty
  const boTop = backRows.slice().sort((a, b) => b.back_order_qty - a.back_order_qty).slice(0, 4);
  // late dispatches: lead time > 30 days
  let lateCnt = 0, lateMax = 0, lateRef = null;
  for (const r of rows) if (r.dispatch_dt && r.order_dt) { const lt = (new Date(r.dispatch_dt) - new Date(r.order_dt)) / 86400000; if (lt > 30) { lateCnt++; if (lt > lateMax) { lateMax = lt; lateRef = r; } } }
  // products with no order in last 90 days (from maxKey month end)
  const cutoff = (() => { const d = new Date(maxKey + '-01'); d.setMonth(d.getMonth() + 1); d.setDate(d.getDate() - 90); return d.toISOString().slice(0, 10); })();
  const stale = Object.entries(lastByProduct).filter(([k, d]) => d < cutoff).sort((a, b) => a[1].localeCompare(b[1]));
  const avgLead = leadCnt ? (leadSum / leadCnt) : 0;

  const alertList = items => items.length ? `<div class="ex-alert-list">${items.map(it => `<div class="ex-alert-item"><span>${escapeHtml(it[0])}</span><b>${it[1]}</b></div>`).join('')}</div>` : '<div class="ex-alert-d ex-ok">All clear — nothing flagged.</div>';
  const alert = (color, lightVar, icon, label, count, body) => `
    <div class="ex-alert" style="--ac:${color};--ac-l:${lightVar}">
      <div class="ex-alert-ic">${icon}</div>
      <div class="ex-alert-body">
        <div class="ex-alert-l">${label}${count != null ? `<span class="ex-alert-count">${count}</span>` : ''}</div>
        ${body}
      </div></div>`;
  const i_warn = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>';

  H += `
  <div class="sec-header">
    <div class="sec-title">Alerts &amp; Exceptions <span class="sec-badge ex-badge-warm">Needs attention</span></div>
    <div class="ex-sub">What to act on today</div>
  </div>
  <div class="ex-alert-grid">
    ${alert('var(--ex-red)', 'var(--red-light)', IC.back, 'Large back orders', backRows.length || null,
      backRows.length ? alertList(boTop.map(r => [`${(r.product_code || '').split(' - ')[1] || r.product_code} · ${r.retailer_name || ''}`, fmt(Math.round(r.back_order_qty)) + ' qty'])) : '<div class="ex-alert-d ex-ok">No open back orders.</div>')}
    ${alert('var(--ex-warm)', 'var(--warm-light)', i_warn, 'Largest pending customers', pendTop.length || null,
      pendTop.length ? alertList(pendTop.map(([k, v]) => [k, fmtV(v)])) : '<div class="ex-alert-d ex-ok">Nothing awaiting dispatch.</div>')}
    ${alert('var(--ex-purple)', 'var(--accent2-light)', IC.clock, 'Future-dated orders', futRows.length || null,
      `<div class="ex-alert-d"><b>${fmt(Math.round(futQ))}</b> qty (${fmtV(futV)}) scheduled to ship ahead across <b>${futRows.length}</b> lines.</div>`)}
    ${alert('var(--ex-blue)', 'var(--blue-light)', IC.truck, 'Dispatch lead time', null,
      `<div class="ex-alert-d">Average <b>${avgLead.toFixed(1)} days</b> order→dispatch. <b>${lateCnt}</b> lines took over 30 days${lateRef ? `; longest <b>${Math.round(lateMax)}d</b> (${escapeHtml(lateRef.retailer_name || '')})` : ''}.</div>`)}
    ${alert('var(--ex-gold)', 'var(--gold-light)', i_box, 'Dormant products', stale.length || null,
      stale.length ? `<div class="ex-alert-d"><b>${stale.length}</b> products have had no orders in 90+ days.</div>${alertList(stale.slice(0, 3).map(([k, d]) => [(k.split(' - ')[1] || k), 'last ' + fmtDate(d)]))}` : '<div class="ex-alert-d ex-ok">Every product ordered within 90 days.</div>')}
    ${alert('var(--ex-green)', 'var(--green-light)', IC.check, 'Order→Dispatch conversion', null,
      `<div class="ex-alert-d"><b>${pct(dispV).toFixed(1)}%</b> of order value dispatched; <b>${fmtV(recV - dispV)}</b> still in the pipeline across ${pendOrdersCount(rows)} orders.</div>`)}
  </div>`;

  // ── footer ──
  H += `
  <div class="ex-foot">
    <div class="ex-foot-l">Showing ${rows.length.toLocaleString('en-US')} of ${RAW.length.toLocaleString('en-US')} order lines · order book ${fmtDate(rows.reduce((a, r) => r.order_dt && (!a || r.order_dt < a) ? r.order_dt : a, '') || maxKey)} – ${fmtDate(maxKey + '-01')}</div>
    <div class="ex-foot-r">Skillmatics · US Specialty Accounts</div>
  </div>`;

  H += '</div>';
  host.innerHTML = H;

  // ── wire interactive controls ──
  host.querySelectorAll('[data-extm]').forEach(b => b.addEventListener('click', () => { exTrendMetric = b.dataset.extm; renderDashboard(); }));
  host.querySelectorAll('[data-extop]').forEach(b => b.addEventListener('click', () => { exTopDim = b.dataset.extop; renderDashboard(); }));
}

// distinct POs with at least one undispatched line
function pendOrdersCount(rows) {
  const s = new Set();
  for (const r of rows) if (!r.dispatch_dt && r.po_no) s.add(r.po_no);
  return s.size;
}

</script>
<script>
